[project]
name = "agent-server"
version = "0.1.0"
description = "Self-hosted FastAPI agent server with LLM backend via LiteLLM"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "sqlalchemy[asyncio]",
    "asyncpg",
    "psycopg2-binary",
    "alembic",
    "pydantic-settings",
    "httpx",
    "openai",
    "pyyaml",
    "pgvector",
    "playwright",
    "faster-whisper",
    "numpy",
    "slack-bolt",
    "aiohttp",
    "jinja2>=3.1.6",
    "python-multipart",
    "watchfiles",
    "pathspec",
    "pyjwt",
    "bcrypt",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "aiosqlite",
]

[tool.setuptools.packages.find]
include = ["app*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests", "integrations"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
