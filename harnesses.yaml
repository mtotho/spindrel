harnesses:
  claude-code:
    command: claude
    args: ["-p", "{prompt}", "--dangerously-skip-permissions", "--output-format", "json", "--max-turns", "30"]
    working_directory: "{working_directory}"
    timeout: 1800

  cursor:
    command: cursor
    args: ["--agent", "{prompt}"]
    working_directory: "{working_directory}"
    timeout: 600
