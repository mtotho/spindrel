# Spindrel quickstart — paced for readability + closing sign-off.
#
# Earlier cuts felt rushed: 5–7s scenes don't give the eye time to land on a
# caption + the visual underneath, and the deck ended on the docs hero with
# no recap or sign-off. This pass bumps per-scene holds 50–80%, slows the
# crossfade, and ends on a Spindrel outro card with the GitHub + docs links.

meta:
  title: "Spindrel quickstart"
  slug: quickstart
  output_dir: docs/videos/
  resolution: [1920, 1080]
  fps: 30
  transition: crossfade
  transition_duration: 0.8
  watermark:
    text: "docs.spindrel.dev"
    opacity: 0.45
  caption_style:
    position: bottom
    font_size: 38
    padding: 56
    bg_opacity: 0.6

sections:
  - id: intro
    title: "What is Spindrel?"
    scenes: [hero_spatial]

  - id: spatial_explore
    title: "Pan, zoom, dive"
    scenes: [spatial_pan_tour, spatial_widget_dive]

  - id: scheduled_work
    title: "Scheduled work, on a clock"
    scenes: [heartbeat_fire]

  - id: stay_in_the_loop
    title: "Stay in the loop"
    scenes: [attention_canvas_still, attention_hub_still, notifications_still]

  - id: bring_your_model
    title: "Bring your own agent"
    scenes: [harness_overview_still, harness_bot_editor_still, harness_chat_still]

  - id: first_channel
    title: "One channel, one bot"
    scenes: [channel_chat]

  - id: dashboards
    title: "Dashboards from tool results"
    scenes: [widget_dashboard, doc_widget_system]

  - id: pipelines
    title: "Pipelines that stream progress"
    scenes: [pipeline_live]

  - id: read_more
    title: "Read more in the docs"
    scenes: [doc_index_hero]
    title_card: false

  - id: outro
    title: "Spindrel"
    scenes: [outro_card]
    title_card: false

scenes:
  - id: hero_spatial
    kind: playwright
    duration: 11
    color_scheme: dark
    caption: "Your workspace, as a place — every channel, every widget, every scheduled job."
    # Live recording of Spindrel's home — the spatial canvas. Stage with
    # `python -m scripts.screenshots stage --only spatial` so the canvas
    # populates with the demo cast before this clip records.
    #
    # Cinematic flow: snap to default, slow zoom-out to take in the whole
    # constellation, then a smooth dive down to the Now Well. `panTo` tweens
    # the camera with an ease-in-out cubic so the motion reads as intentional
    # rather than a teleport — the inline-style world transform has no CSS
    # transition, the tween lives in `window.__spindrelSpatial.panTo`.
    actions:
      - goto: "/"
      - wait_for: "css=[data-spatial-canvas=\"true\"]"
        state: visible
      # Initial settle — channels paint, halos fade in, connection lines draw.
      - wait_ms: 1800
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.recenter()"
      - wait_ms: 800
      # Slow zoom-out to a wider framing — viewport center stays at world
      # origin, scale eases from 1.0 → 0.55 over 2.5s.
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.panTo({ x: 720, y: 450, scale: 0.55 }, 2500)"
      - wait_ms: 2700
      # Smooth dive to the Now Well over 3s. WELL_X=0, WELL_Y=2200,
      # WELL_R_MAX=650 (spatialGeometry.ts) — frame at scale 0.85 puts the
      # nebula glow + orbit ring centered.
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.panTo({ x: 720, y: -1420, scale: 0.85 }, 3000)"
      - wait_ms: 3200

  - id: heartbeat_fire
    kind: playwright
    duration: 11
    color_scheme: dark
    caption: "Heartbeats orbit the Now Well — when the clock arrives, they fire."
    # Live recording. Stages the spatial canvas, fast-forwards one heartbeat's
    # scheduled_at to ~4s in the future via the page-exposed React Query
    # client, then holds while the fire-pulse animation plays out. The
    # synthetic-imminent injection avoids waiting for a real :00 boundary
    # — the visual is what we're after, not the server-side fire.
    actions:
      - goto: "/"
      - wait_for: "css=[data-spatial-canvas=\"true\"]"
        state: visible
      - wait_ms: 1500
      # Fly to Now Well so the orbit ring fills the frame. Direct call
      # via the window-exposed action.
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.flyToNow()"
      - wait_ms: 2000
      # Inject an imminent heartbeat into the upcoming-activity cache. The
      # canvas's fire-pulse detector triggers when scheduled_at <= tickedNow,
      # so a ~4.5s offset gives the diamond a beat to orbit before the pulse.
      - js: |
          (() => {
            const qc = window.__spindrelQueryClient;
            if (!qc) { console.warn('queryClient not exposed'); return; }
            const key = ['spatial-upcoming-activity', 50, undefined];
            const current = qc.getQueryData(key) || { items: [] };
            const items = Array.isArray(current.items) ? [...current.items] : [];
            // Prefer an existing heartbeat — preserves real bot/channel ids
            // so the tile colors and orbit angle stay deterministic.
            let idx = items.findIndex(it => it.type === 'heartbeat');
            if (idx < 0) idx = 0;
            const at = new Date(Date.now() + 4500).toISOString();
            if (items[idx]) {
              items[idx] = { ...items[idx], scheduled_at: at };
            } else {
              items.push({
                type: 'heartbeat',
                scheduled_at: at,
                bot_id: '00000000-0000-0000-0000-000000000000',
                bot_name: 'demo',
                channel_id: null,
                channel_name: null,
                title: 'Demo heartbeat',
                interval_minutes: 1,
              });
            }
            qc.setQueryData(key, { items });
          })()
      # Hold long enough for: drift inward (~2s) + pulse (~1.4s) + settle (~2s).
      - wait_ms: 5500

  # Smooth pan tour across the constellation — three cinematic stops at
  # different zoom levels so the eye reads the structure: cluster of
  # channels w/ halos → wider view that includes the well → tight close-up
  # on the well showing labeled orbit rings + diamonds.
  - id: spatial_pan_tour
    kind: playwright
    duration: 13
    color_scheme: dark
    caption: "Pan, zoom, fly anywhere — same canvas, different altitudes."
    actions:
      - goto: "/"
      - wait_for: "css=[data-spatial-canvas=\"true\"]"
        state: visible
      - wait_ms: 1600
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.recenter()"
      - wait_ms: 700
      # Stop 1 — mid-zoom on a channel cluster, halos prominent.
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.panTo({ x: 920, y: 650, scale: 0.55 }, 2400)"
      - wait_ms: 2600
      # Stop 2 — wider framing that reveals the Now Well's nebula glow at
      # the bottom of the constellation.
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.panTo({ x: 720, y: 100, scale: 0.42 }, 2200)"
      - wait_ms: 2200
      # Stop 3 — close-up on the well at scale ~1.1, ring labels readable.
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.panTo({ x: 720, y: -1970, scale: 1.1 }, 2400)"
      - wait_ms: 2400

  # Channel-level dive: pan to a busy cluster at high zoom so the widget
  # tiles around the channel, their connection curves, and per-channel
  # halos are all simultaneously legible.
  - id: spatial_widget_dive
    kind: playwright
    duration: 9
    color_scheme: dark
    caption: "Each channel pulls its widgets in close — pinned tool results live next to the conversation."
    actions:
      - goto: "/"
      - wait_for: "css=[data-spatial-canvas=\"true\"]"
        state: visible
      - wait_ms: 1500
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.recenter()"
      - wait_ms: 700
      # Pan-and-zoom to the QA cluster (where stage_spatial pins Notes /
      # Todos / Standing-order). Scale 1.5 puts the channel tile + 2-3
      # widget tiles + connection curves in the same frame.
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.panTo({ x: 1135, y: 735, scale: 1.5 }, 2800)"
      - wait_ms: 2400
      # Subtle drift — same scale, slightly offset to suggest manual
      # navigation rather than a static camera.
      - js: "window.__spindrelSpatial && window.__spindrelSpatial.panTo({ x: 1050, y: 700, scale: 1.5 }, 1600)"
      - wait_ms: 1600

  # Bring-your-own-agent triptych — three stills make the case that any bot
  # can be swapped for the real Claude Code SDK (Codex SDK next), with
  # Spindrel keeping the channel, schedule, workspace, and skill/tool wiring
  # while the SDK runs the loop.
  - id: harness_overview_still
    kind: still
    asset: docs/images/harness-overview.png
    duration: 7
    ken_burns:
      start: [1.05, 0.50, 0.30]
      end:   [1.00, 0.50, 0.55]
    caption: "Bring your own agent — Claude Code today, Codex SDK next."

  - id: harness_bot_editor_still
    kind: still
    asset: docs/images/harness-bot-editor.png
    duration: 7
    ken_burns:
      start: [1.04, 0.50, 0.55]
      end:   [1.00, 0.50, 0.50]
    caption: "Bind any bot to a harness — Spindrel keeps the channel, workspace, schedule."

  - id: harness_chat_still
    kind: still
    asset: docs/images/harness-chat-result.png
    duration: 9
    ken_burns:
      start: [1.05, 0.50, 0.65]
      end:   [1.00, 0.50, 0.50]
    caption: "Native loop, native tools — your channel runs Claude end to end."

  - id: channel_chat
    kind: still
    asset: docs/images/chat-main.png
    duration: 8
    ken_burns:
      start: [1.04, 0.50, 0.40]
      end:   [1.00, 0.50, 0.55]
    caption: "Each channel is a persistent conversation with its own bot, widgets, and workspace files."

  - id: widget_dashboard
    kind: still
    asset: docs/images/widget-dashboard.png
    duration: 9
    ken_burns:
      start: [1.00, 0.35, 0.50]
      end:   [1.05, 0.65, 0.55]
    caption: "Pin tool results as live widgets — build per-channel dashboards out of the things your bot already runs."

  - id: pipeline_live
    kind: still
    asset: docs/images/chat-pipeline-live.png
    duration: 9
    ken_burns:
      start: [1.06, 0.50, 0.30]
      end:   [1.00, 0.50, 0.55]
    caption: "Pipelines chain steps — gather, summarize, post — streaming progress into the chat."

  # B2 — doc views. Captured live from the running mkdocs site at render time.
  - id: doc_widget_system
    kind: doc_callout
    guide: guides/widget-system.md
    highlight: "h1"
    duration: 6
    color_scheme: dark
    zoom: 1.18
    caption: "The widget system — pin tool results, build dashboards from them."

  - id: doc_index_hero
    kind: doc_hero
    guide: guides/index.md
    duration: 9
    color_scheme: dark
    caption: "Every feature has a guide — same site, same tokens, one source of truth."

  # Stay-in-the-loop triptych — three stills connect the spatial canvas
  # (where bot/system attention surfaces) to the in-browser hub (triage)
  # to the notifications admin (push it out somewhere). Same shared
  # primitive end to end.
  - id: attention_canvas_still
    kind: still
    asset: docs/images/attention-canvas.png
    duration: 7
    ken_burns:
      start: [1.05, 0.50, 0.45]
      end:   [1.00, 0.50, 0.50]
    caption: "When something needs you, it shows up where the work lives — beacons attach to the channel, bot, or widget that raised them."

  - id: attention_hub_still
    kind: still
    asset: docs/images/attention-hub.png
    duration: 8
    ken_burns:
      start: [1.04, 0.55, 0.50]
      end:   [1.00, 0.50, 0.50]
    caption: "The Attention Hub is one triage surface for everything: bot warnings, system failures, your own notes."

  - id: notifications_still
    kind: still
    asset: docs/images/notifications-overview.png
    duration: 7
    ken_burns:
      start: [1.05, 0.50, 0.45]
      end:   [1.00, 0.50, 0.50]
    caption: "Push it anywhere — channels, integrations, devices, or a group that fans out to all three."

  # Closing sign-off — links the source + docs and gives the eye somewhere to
  # land before the end. Asset is generated by
  # `python -m scripts.screenshots.video.render_outro`.
  - id: outro_card
    kind: still
    asset: docs/images/quickstart-outro.png
    duration: 6
