# Spindrel quickstart — Phase B1 proof.
#
# 4 scenes × ~5s + 4 title cards × 1.4s ≈ 26s total. All scenes use the
# existing Flagship A1 screenshots in docs/images/.
#
# Schema is stable across all Track-B phases. `doc_hero`, `doc_callout`,
# `playwright`, and `manual` scenes can be added to this file at any time,
# but will fail with a phase-marker error until the matching clip module
# is implemented. Reserved-but-unused `audio:` fields are ignored in B1.

meta:
  title: "Spindrel quickstart"
  slug: quickstart
  output_dir: docs/videos/
  resolution: [1920, 1080]
  fps: 30
  transition: crossfade
  transition_duration: 0.5
  watermark:
    text: "spindrel.dev"
    opacity: 0.45
  caption_style:
    position: bottom
    font_size: 38
    padding: 56
    bg_opacity: 0.6

sections:
  - id: intro
    title: "What is Spindrel?"
    scenes: [hero_spatial]

  - id: first_channel
    title: "One channel, one bot"
    scenes: [channel_chat]

  - id: dashboards
    title: "Dashboards from tool results"
    scenes: [widget_dashboard, doc_widget_system]

  - id: pipelines
    title: "Pipelines that stream progress"
    scenes: [pipeline_live]

  - id: read_more
    title: "Read more in the docs"
    scenes: [doc_index_hero]
    title_card: false

scenes:
  - id: hero_spatial
    kind: playwright
    duration: 6
    color_scheme: dark
    caption: "Your workspace, as a place — every channel, every widget, every scheduled job."
    # Live recording of Spindrel's home — the spatial canvas. Stage with
    # `python -m scripts.screenshots stage --only spatial` so the canvas
    # populates with the demo cast before this clip records.
    actions:
      - goto: "/"
      - wait_for: "css=[data-spatial-canvas=\"true\"]"
        state: visible
      # Initial settle — channels paint, halos fade in, connection lines draw.
      - wait_ms: 1500
      # Recenter is a no-op camera nudge if no prior camera; at default
      # scale 1.0 it's a quiet beat that lets viewers register the layout.
      - click: "css=[aria-label=\"Recenter canvas\"]"
      - wait_ms: 1500
      # Fly to Now Well — the dramatic pan downward across the constellation
      # to the orbiting scheduled-task ring. ~600ms tween + 2s hold.
      - click: "css=[aria-label=\"Fly to Now Well\"]"
      - wait_ms: 2000

  - id: channel_chat
    kind: still
    asset: docs/images/chat-main.png
    duration: 5
    ken_burns:
      start: [1.04, 0.50, 0.40]
      end:   [1.00, 0.50, 0.55]
    caption: "Each channel is a persistent conversation with its own bot, widgets, and workspace files."

  - id: widget_dashboard
    kind: still
    asset: docs/images/widget-dashboard.png
    duration: 6
    ken_burns:
      start: [1.00, 0.35, 0.50]
      end:   [1.05, 0.65, 0.55]
    caption: "Pin tool results as live widgets — build per-channel dashboards out of the things your bot already runs."

  - id: pipeline_live
    kind: still
    asset: docs/images/chat-pipeline-live.png
    duration: 6
    ken_burns:
      start: [1.06, 0.50, 0.30]
      end:   [1.00, 0.50, 0.55]
    caption: "Pipelines chain steps — gather, summarize, post — streaming progress into the chat."

  # B2 — doc views. Captured live from the running mkdocs site at render time.
  - id: doc_widget_system
    kind: doc_callout
    guide: guides/widget-system.md
    highlight: "h1"
    duration: 4
    color_scheme: dark
    zoom: 1.18
    caption: "The widget system — pin tool results, build dashboards from them."

  - id: doc_index_hero
    kind: doc_hero
    guide: guides/index.md
    duration: 7
    color_scheme: dark
    caption: "Every feature has a guide — same site, same tokens, one source of truth."
