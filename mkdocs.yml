site_name: Spindrel
site_description: Self-hosted LLM agent server
site_url: https://spindrel.dev

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Setup: setup.md
    - Docker Deployment: docker-deployment.md
    - Migration: migration.md
    - Backup & Restore: backup.md
  - Guides:
    - Slack Integration: guides/slack.md
    - Agent Client: guides/clients.md
    - Delegation: guides/delegation.md
    - Harnesses: guides/harnesses.md
  - Integrations:
    - Creating an Integration: integrations/index.md
    - Example Integration: integrations/example.md
    - Design Philosophy: integrations/design.md
  - Reference:
    - Architecture: reference/architecture.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
