site_name: Spindrel
site_description: Self-hosted LLM agent server
site_url: https://spindrel.dev

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Setup: setup.md
    - Docker Deployment: docker-deployment.md
    - Migration: migration.md
    - Backup & Restore: backup.md
  - Guides:
    - How Spindrel Works: guides/how-spindrel-works.md
    - Templates & Activation: guides/templates-and-activation.md
    - Workflows: guides/workflows.md
    - Heartbeats: guides/heartbeats.md
    - Custom Tools & Extensions: guides/custom-tools.md
    - HTML Widgets: guides/html-widgets.md
    - Slack Integration: guides/slack.md
    - Discord Integration: guides/discord.md
    - BlueBubbles (iMessage): guides/bluebubbles.md
    - Gmail Integration: guides/gmail.md
    - Developer API: guides/api.md
    - Lifecycle Webhooks: guides/webhooks.md
    - Agent Client: guides/clients.md
    - Delegation: guides/delegation.md
    - Sub-Agents: guides/subagents.md
    - Secrets & Redaction: guides/secrets.md
    - Content Ingestion: guides/ingestion.md
    - Chat History: guides/chat-history.md
    - Usage & Billing: guides/usage-and-billing.md
  - Integrations:
    - Creating an Integration: integrations/index.md
    - Example Integration: integrations/example.md
    - Activation & Templates: integrations/activation-and-templates.md
    - Design Philosophy: integrations/design.md
  - Reference:
    - Architecture: reference/architecture.md
    - RAG Pipeline: reference/rag-pipeline.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
