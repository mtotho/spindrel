id: discord
name: Discord
icon: MessageSquare
description: Discord bot integration with real-time messaging and emoji reactions.
version: "1.0"

settings:
  - key: DISCORD_TOKEN
    type: string
    label: "Bot token from Discord Developer Portal > Bot > Token"
    required: true
    secret: true
  - key: AGENT_API_KEY
    type: string
    label: "API key for the agent server"
    required: true
    secret: true
  - key: AGENT_BASE_URL
    type: string
    label: "Agent server URL (default: http://localhost:8000)"

api_permissions: slack_integration

events:
  - { type: message_received, label: Message received, description: "New message in a bound channel", category: message }
  - { type: reaction_added, label: Reaction added, description: "Emoji reaction added to a message", category: message }

binding:
  client_id_prefix: "discord:"
  client_id_placeholder: "discord:123456789012345678"
  client_id_description: "Discord channel ID (enable Developer Mode, right-click channel > Copy Channel ID)"
  display_name_placeholder: "#general"

capabilities:
  - text
  - rich_text
  - threading
  - reactions
  - attachments
  - image_upload
  - file_upload
  - streaming_edit
  - rich_tool_results
  - approval_buttons
  - display_names
  - mentions

tool_result_rendering:
  modes: [compact, full, none]
  content_types:
    - text/plain
    - text/markdown
    - application/json
    - application/vnd.spindrel.components+json
    - application/vnd.spindrel.diff+text
    - application/vnd.spindrel.file-listing+json
  view_keys:
    - core.search_results
    - core.command_result
    - core.machine_target_status
  interactive: false
  unsupported_fallback: badge
  placement: same_message
  limits:
    max_table_rows: 12
    max_links: 8
    max_code_chars: 1700

provides:
  - target
  - renderer
  - hooks
  - router
  - tools
  - skills

process:
  cmd: ["python", "integrations/discord/discord_bot.py"]
  description: "Discord bot (gateway mode)"
  required_env: ["DISCORD_TOKEN", "AGENT_API_KEY"]
  watch_paths: ["integrations/discord/"]
