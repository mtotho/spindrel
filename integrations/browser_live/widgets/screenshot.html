<div class="sd-card" id="root">
  <header class="sd-card-header sd-hstack-between">
    <div class="sd-stack" style="gap: 0;">
      <h3 class="sd-title" id="title">Screenshot</h3>
      <span class="sd-meta" id="meta"></span>
    </div>
    <div class="sd-hstack-sm">
      <button class="sd-btn sd-btn-subtle" id="open-btn" type="button" title="Open page">↗ Open</button>
      <button class="sd-btn sd-btn-subtle" id="download-btn" type="button" title="Download PNG">⬇ PNG</button>
    </div>
  </header>
  <div class="sd-card-body">
    <div class="sd-frame" id="frame" style="cursor: zoom-in; background: var(--sd-surface-overlay);">
      <img id="img" alt="" style="display: block; width: 100%; height: auto; border-radius: var(--sd-radius-sm);" />
    </div>
  </div>
</div>
<script>
(function () {
  var sp = window.spindrel;
  var data = (sp && (sp.result || sp.toolResult)) || {};
  var titleEl = document.getElementById("title");
  var metaEl = document.getElementById("meta");
  var img = document.getElementById("img");
  var openBtn = document.getElementById("open-btn");
  var downloadBtn = document.getElementById("download-btn");

  var url = data.url || "";
  var pageTitle = data.title || "Screenshot";
  var dataUrl = data.image_data_url || "";
  var dims = data.width && data.height ? data.width + "×" + data.height : "";

  titleEl.textContent = pageTitle;
  metaEl.textContent = [url, dims].filter(Boolean).join(" · ");
  img.src = dataUrl;
  img.alt = pageTitle;

  openBtn.disabled = !url;
  openBtn.addEventListener("click", function () {
    if (url) window.open(url, "_blank", "noopener");
  });

  downloadBtn.disabled = !dataUrl;
  downloadBtn.addEventListener("click", function () {
    var a = document.createElement("a");
    a.href = dataUrl;
    var slug = (pageTitle || "screenshot").replace(/[^a-z0-9]+/gi, "-").slice(0, 60);
    a.download = slug + ".png";
    a.click();
  });

  function lightbox() {
    var backdrop = document.createElement("div");
    backdrop.style.cssText = [
      "position: fixed", "inset: 0",
      "background: rgba(0,0,0,0.9)", "z-index: 9999",
      "display: flex", "align-items: center", "justify-content: center",
      "padding: 24px", "cursor: zoom-out"
    ].join(";");
    var big = document.createElement("img");
    big.src = dataUrl;
    big.style.cssText = "max-width: 100%; max-height: 100%; border-radius: var(--sd-radius-md);";
    backdrop.appendChild(big);
    backdrop.addEventListener("click", function () { backdrop.remove(); });
    document.body.appendChild(backdrop);
  }
  img.addEventListener("click", lightbox);
})();
</script>
