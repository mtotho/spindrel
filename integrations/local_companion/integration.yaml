id: local_companion
name: Local Companion
icon: Monitor
description: Paired local machine companion for shell access with a live per-session lease.
version: "0.1"

provides:
  - tools
  - router

tool_widgets:
  local_status:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "Machine control"
    view_key: core.machine_target_status
    sample_payload:
      session_id: "00000000-0000-0000-0000-000000000001"
      connected_target_count: 1
      lease:
        lease_id: "00000000-0000-0000-0000-000000000002"
        target_id: "00000000-0000-0000-0000-000000000003"
        user_id: "00000000-0000-0000-0000-000000000004"
        granted_at: "2026-04-23T16:00:00Z"
        expires_at: "2026-04-23T16:15:00Z"
        capabilities: ["shell"]
        connection_id: "00000000-0000-0000-0000-000000000005"
        connected: true
        target_label: "Desk"
      targets:
        - target_id: "00000000-0000-0000-0000-000000000003"
          driver: "companion"
          label: "Desk"
          hostname: "workstation"
          platform: "linux"
          capabilities: ["shell"]
          connected: true
          connection_id: "00000000-0000-0000-0000-000000000005"
    template:
      v: 1
      components:
        - type: heading
          text: "Machine control"
          level: 3
    state_poll:
      tool: local_status
      args: {}
      refresh_interval_seconds: 5

  local_inspect_command:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{target_label}}"
    view_key: core.command_result
    sample_payload:
      command: "git status --short"
      working_dir: ""
      target_id: "00000000-0000-0000-0000-000000000003"
      target_label: "Desk"
      target_hostname: "workstation"
      target_platform: "linux"
      stdout: " M app/main.py\n?? notes.txt\n"
      stderr: ""
      exit_code: 0
      duration_ms: 87
      truncated: false
    template:
      v: 1
      components:
        - type: heading
          text: "{{command}}"
          level: 3

  local_exec_command:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{target_label}}"
    view_key: core.command_result
    sample_payload:
      command: "npm test -- --runInBand"
      working_dir: "/home/user/project"
      target_id: "00000000-0000-0000-0000-000000000003"
      target_label: "Desk"
      target_hostname: "workstation"
      target_platform: "linux"
      stdout: "PASS src/example.test.ts\n"
      stderr: ""
      exit_code: 0
      duration_ms: 1242
      truncated: false
    template:
      v: 1
      components:
        - type: heading
          text: "{{command}}"
          level: 3
