id: local_companion
name: Local Companion
icon: Monitor
description: Paired local machine companion for shell access with a live per-session lease.
version: "0.1"

provides:
  - router
  - machine_control

api_permissions:
  - integrations:read
  - integrations:write

machine_control:
  provider_id: local_companion
  label: Local Companion
  driver: companion
  task_automation:
    enabled: true
    label: Local Companion
    target_label: Local Companion target
    description: Run readonly scheduled task inspection steps against a currently connected companion target.
    capabilities:
      - inspect
