id: homeassistant
name: Home Assistant
icon: Home
description: Smart home control via Home Assistant MCP integration.
version: "1.0"

# MCP servers are configured externally (official HA MCP + community ha-mcp).
# No settings needed — this integration provides skills and widget templates.

tool_widgets:
  # Official HA MCP tools — intent-based
  # Result shape: {response_type, data: {targets[], success[{name, type, id}], failed[]}}
  HassTurnOn:
    content_type: application/vnd.spindrel.components+json
    display: inline
    template:
      v: 1
      components:
        - type: toggle
          label: "{{data.success | pluck: name | join: , }}"
          value: true
          color: success
          action:
            dispatch: tool
            tool: HassTurnOff
            args:
              area: "{{data.success[0].id}}"
            optimistic: true

  HassTurnOff:
    content_type: application/vnd.spindrel.components+json
    display: inline
    template:
      v: 1
      components:
        - type: toggle
          label: "{{data.success | pluck: name | join: , }}"
          value: false
          action:
            dispatch: tool
            tool: HassTurnOn
            args:
              area: "{{data.success[0].id}}"
            optimistic: true

  HassLightSet:
    content_type: application/vnd.spindrel.components+json
    display: inline
    template:
      v: 1
      components:
        - type: status
          text: "Light adjusted"
          color: accent
        - type: text
          content: "{{data.success | pluck: name | join: , }}"
          style: muted
