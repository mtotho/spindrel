id: homeassistant
name: Home Assistant
icon: Home
description: Smart home control via Home Assistant MCP integration.
version: "1.0"

# MCP servers are configured externally (official HA MCP + community ha-mcp).
# No settings needed — this integration provides skills and widget templates.

tool_families:
  official:
    label: Official Home Assistant MCP
    tools: [GetLiveContext, HassTurnOn, HassTurnOff, HassLightSet]
  community:
    label: Community ha-mcp
    tools: [ha_get_state, ha_search_entities]

# Shared state_poll config — all HA widgets use the same poll mechanism.
# GetLiveContext returns all entity states; the transform filters to the
# specific entity by display_label.
_ha_state_poll: &ha_state_poll
  tool: GetLiveContext
  args: {}
  transform: "integrations.homeassistant.widget_transforms:entity_state"
  template:
    v: 1
    components:
      # Toggle — action flips to the opposite state
      - type: toggle
        when: "{{is_on}}"
        label: "{{entity_name}}"
        description: "On"
        on_label: "On"
        off_label: "Off"
        value: true
        color: success
        action:
          dispatch: tool
          tool: HassTurnOff
          args:
            name: "{{entity_name}}"
          optimistic: true
      - type: toggle
        when: "{{is_off}}"
        label: "{{entity_name}}"
        description: "Off"
        on_label: "On"
        off_label: "Off"
        value: false
        action:
          dispatch: tool
          tool: HassTurnOn
          args:
            name: "{{entity_name}}"
          optimistic: true
      # Brightness slider — only for HassLightSet pins, gated by the
      # transform (is_on AND pin tool is HassLightSet).
      - type: slider
        when: "{{show_brightness}}"
        label: Brightness
        value: "{{brightness}}"
        min: 0
        max: 100
        step: 5
        unit: "%"
        color: accent
        action:
          dispatch: tool
          tool: HassLightSet
          args:
            name: "{{entity_name}}"
          value_key: brightness

widget_presets:
  homeassistant-entity-toggle-chip:
    name: Entity Toggle Chip
    description: Compact status chip with on/off control for one Home Assistant entity.
    icon: ToggleLeft
    layout_hints:
      preferred_zone: chip
      max_cells: {w: 4, h: 1}
    tool_name: GetLiveContext
    tool_family: official
    tool_dependencies: [GetLiveContext, HassTurnOn, HassTurnOff]
    binding_schema:
      type: object
      required: [entity_id]
      properties:
        entity_id:
          type: string
          title: Entity
          description: Choose a toggle-capable entity.
          ui:
            control: picker
            source: homeassistant.toggle_entities
    binding_sources:
      homeassistant.toggle_entities:
        tool: GetLiveContext
        args: {}
        transform: "integrations.homeassistant.bindings:live_context_options"
        params:
          toggle_only: true
    default_config:
      preset_variant: toggle_chip
      action_target: name
    runtime:
      tool_args: {}

  homeassistant-entity-chip:
    name: Entity Chip
    description: Compact status/value chip for one Home Assistant entity.
    icon: Activity
    layout_hints:
      preferred_zone: grid
      min_cells: {w: 3, h: 3}
    tool_name: GetLiveContext
    tool_family: official
    tool_dependencies: [GetLiveContext, HassTurnOn, HassTurnOff]
    binding_schema:
      type: object
      required: [entity_id]
      properties:
        entity_id:
          type: string
          title: Entity
          description: Choose any Home Assistant entity.
          ui:
            control: picker
            source: homeassistant.entities
        allow_action:
          type: boolean
          title: Show action
          description: Show a power toggle when the entity supports one.
          default: true
          ui:
            control: switch
        primary_info:
          type: string
          title: Primary information
          description: Choose the main entity property shown on the chip.
          default: name
          ui:
            control: picker
            options_from_field: entity_id
            options_from_meta: properties
        secondary_info:
          type: string
          title: Secondary information
          description: Optional secondary entity property shown after the primary value.
          default: none
          ui:
            control: picker
            options_from_field: entity_id
            options_from_meta: properties
    binding_sources:
      homeassistant.entities:
        tool: GetLiveContext
        args: {}
        transform: "integrations.homeassistant.bindings:live_context_options"
    default_config:
      preset_variant: entity_chip
      allow_action: true
      primary_info: name
      secondary_info: none
      action_target: name
    runtime:
      tool_args: {}

  homeassistant-light-card:
    name: Light Card
    description: Light status card with power and optional brightness control.
    icon: Lightbulb
    layout_hints:
      preferred_zone: grid
      min_cells: {w: 4, h: 4}
    tool_name: GetLiveContext
    tool_family: official
    tool_dependencies: [GetLiveContext, HassTurnOn, HassTurnOff, HassLightSet]
    binding_schema:
      type: object
      required: [entity_id]
      properties:
        entity_id:
          type: string
          title: Light
          description: Choose a light entity.
          ui:
            control: picker
            source: homeassistant.light_entities
        show_brightness:
          type: boolean
          title: Show brightness
          description: Expose the brightness slider when the light is on.
          default: true
          ui:
            control: switch
    binding_sources:
      homeassistant.light_entities:
        tool: GetLiveContext
        args: {}
        transform: "integrations.homeassistant.bindings:live_context_options"
        params:
          domains: [light]
    default_config:
      preset_variant: light_card
      show_brightness: true
      action_target: name
    runtime:
      tool_args: {}

  homeassistant-sensor-card:
    name: Sensor Card
    description: Read-only sensor card with current value and freshness.
    icon: Thermometer
    layout_hints:
      preferred_zone: grid
      min_cells: {w: 3, h: 3}
    tool_name: GetLiveContext
    tool_family: official
    tool_dependencies: [GetLiveContext]
    binding_schema:
      type: object
      required: [entity_id]
      properties:
        entity_id:
          type: string
          title: Sensor
          description: Choose a sensor entity.
          ui:
            control: picker
            source: homeassistant.sensor_entities
    binding_sources:
      homeassistant.sensor_entities:
        tool: GetLiveContext
        args: {}
        transform: "integrations.homeassistant.bindings:live_context_options"
        params:
          domains: [sensor]
    default_config:
      preset_variant: sensor_card
      action_target: name
    runtime:
      tool_args: {}

tool_widgets:
  # Official HA MCP tools — intent-based
  # Result shape: {response_type, data: {targets[], success[{name, type, id}], failed[]}}

  HassTurnOn:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.success | where: type=entity | pluck: name | first}}"
    state_poll: *ha_state_poll
    sample_payload:
      response_type: action_done
      data:
        success:
          - name: Office Desk LED Strip
            type: entity
            id: light.office_desk_led_strip
        failed: []
    template:
      v: 1
      components:
        - type: toggle
          label: "{{data.success | where: type=entity | pluck: name | first}}"
          description: "On"
          on_label: "On"
          off_label: "Off"
          value: true
          color: success
          action:
            dispatch: tool
            tool: HassTurnOff
            args:
              name: "{{data.success | where: type=entity | pluck: name | first}}"
            optimistic: true

  HassTurnOff:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.success | where: type=entity | pluck: name | first}}"
    state_poll: *ha_state_poll
    sample_payload:
      response_type: action_done
      data:
        success:
          - name: Office Desk LED Strip
            type: entity
            id: light.office_desk_led_strip
        failed: []
    template:
      v: 1
      components:
        - type: toggle
          label: "{{data.success | where: type=entity | pluck: name | first}}"
          description: "Off"
          on_label: "On"
          off_label: "Off"
          value: false
          action:
            dispatch: tool
            tool: HassTurnOn
            args:
              name: "{{data.success | where: type=entity | pluck: name | first}}"
            optimistic: true

  HassLightSet:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.success | where: type=entity | pluck: name | first}}"
    state_poll: *ha_state_poll
    # Template is intentionally state-neutral: HassLightSet's result shape has no
    # brightness/on-state echo, so we can't infer the new state from it. The
    # pinned-widget state_poll (above) fetches live HA state and renders the
    # real toggle + brightness slider.
    sample_payload:
      response_type: action_done
      data:
        success:
          - name: Office Desk LED Strip
            type: entity
            id: light.office_desk_led_strip
        failed: []
    template:
      v: 1
      components:
        - type: status
          text: "Light adjusted"
          color: accent

  # Community ha-mcp: single entity lookup — e.g. a temperature sensor.
  # One adaptive entity widget:
  # - light -> light card with optional brightness control
  # - sensor -> sensor card
  # - toggle-capable domains -> compact toggle chip
  # - everything else -> value chip / entity chip
  #
  # display_label remains entity_id for now because the current preview → pin
  # flow can seed widget_config from it on create. After pinning, refresh uses
  # config.entity_id rather than scraping the label forever.
  ha_get_state:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.entity_id}}"
    transform: "integrations.homeassistant.widget_transforms:render_single_entity_widget"
    default_config:
      show_brightness: true
    config_schema:
      type: object
      required: [entity_id]
      properties:
        entity_id:
          type: string
          title: Entity ID
          description: Home Assistant entity id to refresh, such as light.office_desk_led_strip.
        preset_variant:
          type: string
          title: Variant
          enum: [sensor_card, light_card, toggle_chip, entity_chip]
          description: Optional forced renderer variant. Leave unset for domain-based auto selection.
        show_brightness:
          type: boolean
          title: Show brightness
          default: true
        allow_action:
          type: boolean
          title: Show action
          default: false
        primary_info:
          type: string
          title: Primary information
          default: name
        secondary_info:
          type: string
          title: Secondary information
          default: none
        action_target:
          type: string
          title: Action target
          enum: [entity_id, name]
          default: entity_id
          description: Use entity_id for community ha-mcp style action targets, or name for official HA MCP actions.
    sample_payload:
      data:
        entity_id: light.office_desk_led_strip
        state: "on"
        attributes:
          friendly_name: Office Desk LED Strip
          brightness: 180
        last_changed: "2026-04-18T03:15:51.821593+00:00"
    state_poll:
      tool: ha_get_state
      args:
        entity_id: "{{config.entity_id}}"
      transform: "integrations.homeassistant.widget_transforms:single_entity_state"
      refresh_interval_seconds: 30
      template:
        v: 1
        components:
          - type: heading
            when: "{{is_sensor_card}}"
            text: "{{friendly_name}}"
            level: 3
          - type: heading
            when: "{{is_light_card}}"
            text: "{{friendly_name}}"
            level: 3
          - type: status
            when: "{{is_sensor_card}}"
            text: "{{display_value}}"
            color: accent
          - type: status
            when: "{{is_entity_chip}}"
            text: "{{chip_text}}"
            color: "{{chip_color}}"
          - type: toggle
            when: "{{show_toggle_off}}"
            label: "{{friendly_name}}"
            description: "On"
            on_label: "On"
            off_label: "Off"
            value: true
            color: success
            action:
              dispatch: tool
              tool: "{{toggle_off_tool}}"
              args:
                name: "{{toggle_target_entity_id}}"
              optimistic: true
          - type: toggle
            when: "{{show_toggle_on}}"
            label: "{{friendly_name}}"
            description: "Off"
            on_label: "On"
            off_label: "Off"
            value: false
            action:
              dispatch: tool
              tool: "{{toggle_on_tool}}"
              args:
                name: "{{toggle_target_entity_id}}"
              optimistic: true
          - type: slider
            when: "{{show_brightness}}"
            label: Brightness
            value: "{{brightness}}"
            min: 0
            max: 100
            step: 5
            unit: "%"
            color: accent
            action:
              dispatch: tool
              tool: HassLightSet
              args:
                name: "{{toggle_target_entity_id}}"
              value_key: brightness
    template:
      v: 1
      components:
        - type: status
          text: "{{data.attributes.friendly_name}}"
          color: info

  # Community ha-mcp: search results list. The section is collapsed by
  # default so the chat thread stays compact — clicking the section header
  # expands the tile grid. Inline `map:` filter reshapes the result array,
  # no Python transform needed.
  ha_search_entities:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.query}} — {{data.total_matches}} matches"
    sample_payload:
      data:
        query: kitchen
        total_matches: 2
        count: 2
        results:
          - entity_id: light.kitchen_ceiling_lights
            friendly_name: Kitchen Ceiling Lights
            state: "on"
          - entity_id: sensor.kitchen_temperature
            friendly_name: Kitchen Temperature
            state: "71.7"
    template:
      v: 1
      components:
        - type: status
          text: "{{data.total_matches}} match(es) for \"{{data.query}}\""
          color: info
        - type: section
          label: "Results ({{data.count}})"
          collapsible: true
          defaultOpen: false
          children:
            - type: tiles
              min_width: 180
              items: "{{data.results | map: {label: friendly_name, value: state, caption: entity_id}}}"

  # Official HA MCP: full-home context dump. The raw result is a YAML
  # blob inside the JSON wrapper's `result` field — no template dot-path
  # can reach per-entity fields, so the Python transform rebuilds the
  # component tree with total / per-domain counts and an "active now"
  # section. The YAML template below is a minimal fallback used only if
  # the transform can't parse the payload.
  GetLiveContext:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "Home Assistant — Live State"
    transform: "integrations.homeassistant.widget_transforms:live_context_summary"
    default_config:
      filter: ""
    config_schema:
      type: object
      properties:
        filter:
          type: string
          title: Filter
          description: Filter summary mode by area, domain, or entity name.
        entity_id:
          type: string
          title: Entity ID
          description: Optional entity id. When set, renders one entity instead of the full-home summary.
        preset_variant:
          type: string
          title: Variant
          enum: [sensor_card, light_card, toggle_chip, entity_chip]
        show_brightness:
          type: boolean
          title: Show brightness
          default: true
        allow_action:
          type: boolean
          title: Show action
          default: false
        primary_info:
          type: string
          title: Primary information
          default: name
        secondary_info:
          type: string
          title: Secondary information
          default: none
    sample_payload:
      success: true
      result: |
        Live Context: overview
        - names: Office Desk LED Strip
          domain: light
          state: 'on'
          areas: Office
          attributes:
            brightness: '180'
        - names: Kitchen Temperature
          domain: sensor
          state: '71.7'
          areas: Kitchen
          attributes:
            unit_of_measurement: °F
    # state_poll drives the pinned-card view. Needed so that clicking a
    # filter button (dispatch: widget_config) triggers a re-render —
    # _dispatch_widget_config returns envelope=None unless a state_poll
    # is configured. The transform shares a computation helper with the
    # main template transform so both renders show the same data.
    state_poll:
      tool: GetLiveContext
      args: {}
      transform: "integrations.homeassistant.widget_transforms:live_context_poll"
      refresh_interval_seconds: 120
      template:
        v: 1
        components:
          - type: heading
            when: "{{is_sensor_card}}"
            text: "{{friendly_name}}"
            level: 3
          - type: heading
            when: "{{is_light_card}}"
            text: "{{friendly_name}}"
            level: 3
          - type: status
            when: "{{is_sensor_card}}"
            text: "{{display_value}}"
            color: accent
          - type: status
            when: "{{is_entity_chip}}"
            text: "{{chip_text}}"
            color: "{{chip_color}}"
          - type: toggle
            when: "{{show_toggle_off}}"
            label: "{{friendly_name}}"
            description: "On"
            on_label: "On"
            off_label: "Off"
            value: true
            color: success
            action:
              dispatch: tool
              tool: "{{toggle_off_tool}}"
              args:
                name: "{{toggle_target_entity_id}}"
              optimistic: true
          - type: toggle
            when: "{{show_toggle_on}}"
            label: "{{friendly_name}}"
            description: "Off"
            on_label: "On"
            off_label: "Off"
            value: false
            action:
              dispatch: tool
              tool: "{{toggle_on_tool}}"
              args:
                name: "{{toggle_target_entity_id}}"
              optimistic: true
          - type: button
            when: "{{show_brightness_button_hide}}"
            label: Hide brightness
            subtle: true
            action:
              dispatch: widget_config
              config:
                show_brightness: false
          - type: button
            when: "{{show_brightness_button_show}}"
            label: Show brightness
            subtle: true
            action:
              dispatch: widget_config
              config:
                show_brightness: true
          - type: slider
            when: "{{show_brightness}}"
            label: Brightness
            value: "{{brightness}}"
            min: 0
            max: 100
            step: 5
            unit: "%"
            color: accent
            action:
              dispatch: tool
              tool: HassLightSet
              args:
                name: "{{toggle_target_entity_id}}"
              value_key: brightness
          - type: status
            when: "{{is_live_summary}}"
            text: "{{status_text}}"
            color: "{{status_color}}"
          - type: button
            when: "{{filter_active}}"
            label: "Clear filter"
            subtle: true
            action:
              dispatch: widget_config
              config:
                filter: ""
          - type: tiles
            when: "{{domain_counts | not_empty}}"
            min_width: 140
            items: "{{domain_counts}}"
          - type: section
            when: "{{active | not_empty}}"
            label: "Active now"
            collapsible: true
            defaultOpen: false
            children:
              - type: tiles
                min_width: 180
                items: "{{active}}"
          - type: section
            when: "{{area_buttons | not_empty}}"
            label: "Filter by area"
            collapsible: true
            defaultOpen: false
            children:
              each: "{{area_buttons}}"
              template:
                type: button
                label: "{{_.label}}"
                subtle: true
                action:
                  dispatch: widget_config
                  config:
                    filter: "{{_.filter_value}}"
          - type: section
            when: "{{domain_buttons | not_empty}}"
            label: "Filter by domain"
            collapsible: true
            defaultOpen: false
            children:
              each: "{{domain_buttons}}"
              template:
                type: button
                label: "{{_.label}}"
                subtle: true
                action:
                  dispatch: widget_config
                  config:
                    filter: "{{_.filter_value}}"
    template:
      v: 1
      components:
        - type: status
          text: "Home Assistant live state"
          color: info
