id: homeassistant
name: Home Assistant
icon: Home
description: Smart home control via Home Assistant MCP integration.
version: "1.0"

# MCP servers are configured externally (official HA MCP + community ha-mcp).
# No settings needed — this integration provides skills and widget templates.

tool_widgets:
  # Official HA MCP tools — intent-based
  # Result shape: {response_type, data: {targets[], success[{name, type, id}], failed[]}}

  HassTurnOn:
    content_type: application/vnd.spindrel.components+json
    display: inline
    template:
      v: 1
      components:
        - type: status
          text: "On"
          color: success
        - type: toggle
          label: Power
          value: true
          color: success
          action:
            dispatch: tool
            tool: HassTurnOff
            args:
              name: "{{data.success[0].name}}"
            optimistic: true
        - type: properties
          layout: inline
          items: "{{data.success | map: {label: type, value: name}}}"

  HassTurnOff:
    content_type: application/vnd.spindrel.components+json
    display: inline
    template:
      v: 1
      components:
        - type: status
          text: "Off"
          color: muted
        - type: toggle
          label: Power
          value: false
          action:
            dispatch: tool
            tool: HassTurnOn
            args:
              name: "{{data.success[0].name}}"
            optimistic: true
        - type: properties
          layout: inline
          items: "{{data.success | map: {label: type, value: name}}}"

  HassLightSet:
    content_type: application/vnd.spindrel.components+json
    display: inline
    template:
      v: 1
      components:
        - type: status
          text: "Light adjusted"
          color: accent
        - type: toggle
          label: Power
          value: true
          color: success
          action:
            dispatch: tool
            tool: HassTurnOff
            args:
              name: "{{data.success[0].name}}"
            optimistic: true
        - type: slider
          label: Brightness
          value: "{{data.brightness | default: 100}}"
          min: 0
          max: 100
          step: 5
          unit: "%"
          color: accent
          action:
            dispatch: tool
            tool: HassLightSet
            args:
              name: "{{data.success[0].name}}"
            value_key: brightness
        - type: properties
          layout: inline
          items: "{{data.success | map: {label: type, value: name}}}"
