id: homeassistant
name: Home Assistant
icon: Home
description: Smart home control via Home Assistant MCP integration.
version: "1.0"

# MCP servers are configured externally (official HA MCP + community ha-mcp).
# No settings needed — this integration provides skills and widget templates.

# Shared state_poll config — all HA widgets use the same poll mechanism.
# GetLiveContext returns all entity states; the transform filters to the
# specific entity by display_label.
_ha_state_poll: &ha_state_poll
  tool: GetLiveContext
  args: {}
  transform: "integrations.homeassistant.widget_transforms:entity_state"
  template:
    v: 1
    components:
      # Status badge — show "On" or "Off" based on current state
      - type: status
        when: "{{is_on}}"
        text: "On"
        color: success
      - type: status
        when: "{{is_off}}"
        text: "Off"
        color: muted
      # Toggle — action flips to the opposite state
      - type: toggle
        when: "{{is_on}}"
        label: Power
        value: true
        color: success
        action:
          dispatch: tool
          tool: HassTurnOff
          args:
            name: "{{entity_name}}"
          optimistic: true
      - type: toggle
        when: "{{is_off}}"
        label: Power
        value: false
        action:
          dispatch: tool
          tool: HassTurnOn
          args:
            name: "{{entity_name}}"
          optimistic: true
      # Brightness slider — only for HassLightSet pins, gated by the
      # transform (is_on AND pin tool is HassLightSet).
      - type: slider
        when: "{{show_brightness}}"
        label: Brightness
        value: "{{brightness}}"
        min: 0
        max: 100
        step: 5
        unit: "%"
        color: accent
        action:
          dispatch: tool
          tool: HassLightSet
          args:
            name: "{{entity_name}}"
          value_key: brightness
      - type: properties
        layout: inline
        items:
          - label: entity
            value: "{{entity_name}}"

tool_widgets:
  # Official HA MCP tools — intent-based
  # Result shape: {response_type, data: {targets[], success[{name, type, id}], failed[]}}

  HassTurnOn:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.success | where: type=entity | pluck: name | first}}"
    state_poll: *ha_state_poll
    template:
      v: 1
      components:
        - type: status
          text: "On"
          color: success
        - type: toggle
          label: Power
          value: true
          color: success
          action:
            dispatch: tool
            tool: HassTurnOff
            args:
              name: "{{data.success | where: type=entity | pluck: name | first}}"
            optimistic: true
        - type: properties
          layout: inline
          items: "{{data.success | map: {label: type, value: name}}}"

  HassTurnOff:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.success | where: type=entity | pluck: name | first}}"
    state_poll: *ha_state_poll
    template:
      v: 1
      components:
        - type: status
          text: "Off"
          color: muted
        - type: toggle
          label: Power
          value: false
          action:
            dispatch: tool
            tool: HassTurnOn
            args:
              name: "{{data.success | where: type=entity | pluck: name | first}}"
            optimistic: true
        - type: properties
          layout: inline
          items: "{{data.success | map: {label: type, value: name}}}"

  HassLightSet:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.success | where: type=entity | pluck: name | first}}"
    state_poll: *ha_state_poll
    # Template is intentionally state-neutral: HassLightSet's result shape has no
    # brightness/on-state echo, so we can't infer the new state from it. The
    # pinned-widget state_poll (above) fetches live HA state and renders the
    # real toggle + brightness slider.
    template:
      v: 1
      components:
        - type: status
          text: "Light adjusted"
          color: accent
        - type: properties
          layout: inline
          items: "{{data.success | map: {label: type, value: name}}}"

  # Community ha-mcp: single entity lookup — e.g. a temperature sensor.
  # The initial render uses the tool's own response directly; pinning the
  # card re-calls ha_get_state with the same entity_id so the value stays
  # live without hitting the much larger GetLiveContext.
  #
  # display_label is the entity_id (not the friendly_name) because
  # state_poll.args can only reference {{display_label}} / {{tool_name}} /
  # {{config.*}} — no {{data.*}} — so the entity_id has to ride on the
  # one variable the pin persists. The card body still shows the pretty
  # friendly_name via the transform output.
  ha_get_state:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.entity_id}}"
    state_poll:
      tool: ha_get_state
      args:
        entity_id: "{{display_label}}"
      transform: "integrations.homeassistant.widget_transforms:single_entity_state"
      refresh_interval_seconds: 30
      template:
        v: 1
        components:
          - type: heading
            text: "{{friendly_name}}"
            level: 3
          - type: status
            text: "{{display_value}}"
            color: accent
          - type: properties
            layout: inline
            items:
              - label: entity
                value: "{{entity_id}}"
              - label: updated
                value: "{{last_changed | date_relative}}"
    template:
      v: 1
      components:
        - type: heading
          text: "{{data.attributes.friendly_name}}"
          level: 3
        - type: status
          text: "{{data.state}}{{data.attributes.unit_of_measurement}}"
          color: accent
        - type: properties
          layout: inline
          items:
            - label: entity
              value: "{{data.entity_id}}"
            - label: updated
              value: "{{data.last_changed | date_relative}}"

  # Community ha-mcp: search results list. The section is collapsed by
  # default so the chat thread stays compact — clicking the section header
  # expands the tile grid. Inline `map:` filter reshapes the result array,
  # no Python transform needed.
  ha_search_entities:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{data.query}} — {{data.total_matches}} matches"
    template:
      v: 1
      components:
        - type: status
          text: "{{data.total_matches}} match(es) for \"{{data.query}}\""
          color: info
        - type: section
          label: "Results ({{data.count}})"
          collapsible: true
          defaultOpen: false
          children:
            - type: tiles
              min_width: 180
              items: "{{data.results | map: {label: friendly_name, value: state, caption: entity_id}}}"

  # Official HA MCP: full-home context dump. The raw result is a YAML
  # blob inside the JSON wrapper's `result` field — no template dot-path
  # can reach per-entity fields, so the Python transform rebuilds the
  # component tree with total / per-domain counts and an "active now"
  # section. The YAML template below is a minimal fallback used only if
  # the transform can't parse the payload.
  GetLiveContext:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "Home Assistant — Live State"
    transform: "integrations.homeassistant.widget_transforms:live_context_summary"
    default_config:
      filter: ""
    # state_poll drives the pinned-card view. Needed so that clicking a
    # filter button (dispatch: widget_config) triggers a re-render —
    # _dispatch_widget_config returns envelope=None unless a state_poll
    # is configured. The transform shares a computation helper with the
    # main template transform so both renders show the same data.
    state_poll:
      tool: GetLiveContext
      args: {}
      transform: "integrations.homeassistant.widget_transforms:live_context_poll"
      refresh_interval_seconds: 120
      template:
        v: 1
        components:
          - type: status
            text: "{{status_text}}"
            color: "{{status_color}}"
          - type: button
            when: "{{filter_active}}"
            label: "Clear filter"
            subtle: true
            action:
              dispatch: widget_config
              config:
                filter: ""
          - type: tiles
            when: "{{domain_counts | not_empty}}"
            min_width: 140
            items: "{{domain_counts}}"
          - type: section
            when: "{{active | not_empty}}"
            label: "Active now"
            collapsible: true
            defaultOpen: false
            children:
              - type: tiles
                min_width: 180
                items: "{{active}}"
          - type: section
            when: "{{filter_active | not}}"
            label: "Filter by area"
            collapsible: true
            defaultOpen: false
            children:
              each: "{{area_buttons}}"
              template:
                type: button
                label: "{{_.label}}"
                subtle: true
                action:
                  dispatch: widget_config
                  config:
                    filter: "{{_.filter_value}}"
          - type: section
            when: "{{filter_active | not}}"
            label: "Filter by domain"
            collapsible: true
            defaultOpen: false
            children:
              each: "{{domain_buttons}}"
              template:
                type: button
                label: "{{_.label}}"
                subtle: true
                action:
                  dispatch: widget_config
                  config:
                    filter: "{{_.filter_value}}"
    template:
      v: 1
      components:
        - type: status
          text: "Home Assistant live state"
          color: info
