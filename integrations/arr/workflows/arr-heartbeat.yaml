id: arr-heartbeat
name: "Media Stack Heartbeat"
description: >
  Compact periodic media audit. Runs the official deterministic ARR stored script first
  and only uses additional tools to diagnose reported anomalies.

defaults:
  model: gemini/gemini-2.5-flash
  timeout: 120
  inject_prior_results: false
  result_max_chars: 2000

triggers:
  heartbeat: true
  api: true
  tool: true

tags: [media, heartbeat, arr, maintenance]
session_mode: isolated

steps:
  - id: expected_download_audit
    prompt: |
      Run:

      `run_script(skill_name="integrations/arr/media_management", script_name="expected-download-audit")`

      Parse the compact JSON printed by the script.

      If the script reports `status: ok`, return a short "all expected downloads healthy" summary.
      Do not call raw ARR tools or read the tracked JSON files again.

      If the script reports `status: needs_attention`, summarize only the named items in `items`.
      Make additional focused read-only calls only if an item needs diagnosis that the script output
      does not contain. Do not mutate monitoring settings or trigger broad searches from this workflow.
    on_failure: continue
    timeout: 120

  - id: summary
    prompt: |
      Produce the channel-facing heartbeat summary from the audit result.

      Stay silent/brief when everything is healthy. For problems, include:
      - which tracked show/movie is affected
      - whether it is missing now, upcoming missing, queued, or unmatched
      - the smallest useful next action
    when:
      step: expected_download_audit
      status: done
    timeout: 60
