id: media-request
name: "Media Request"
description: >
  Request a movie or TV show — checks if already available on Jellyfin,
  checks if already requested in Jellyseerr, confirms the match, and
  creates the request. Handles "can you get X on Jellyfin?" scenarios.

params:
  title:
    type: string
    required: true
    description: "The show or movie name to request"
  media_type:
    type: string
    default: "auto"
    description: "Type: tv, movie, or auto (detect from search results)"
  seasons:
    type: string
    default: ""
    description: "Comma-separated season numbers for TV (e.g. '1,2,3'); empty = all seasons"

defaults:
  model: gemini/gemini-2.5-flash
  carapaces: [arr]
  timeout: 120

triggers:
  tool: true
  api: true

tags: [media, request, arr]
session_mode: shared

steps:
  - id: check_availability
    prompt: |
      The user wants "{{title}}" on Jellyfin. Before requesting, check if it's already available
      or already in the pipeline.

      **Title matching:** "{{title}}" may not match exactly across platforms. Search with the
      shortest unambiguous form first (e.g., just "Paradise" not "Paradise 2025").

      **Step 1 — Already in Jellyfin?**
      Search: `jellyfin_library(action="search", search="{{title}}")`
      - Try a few title variations if no results.

      **Step 2 — Already requested?**
      Search: `jellyseerr_search(query="{{title}}")`
      - Check the `status` field on each matching result:
        - `available` → already on the server (may be a Jellyfin indexing issue if step 1 missed it)
        - `pending` or `processing` → already requested, in progress
        - No status → not yet requested

      Report your findings with exactly ONE marker:
      - "STATUS: AVAILABLE" — already in Jellyfin (include title, type, quality if visible)
      - "STATUS: REQUESTED" — already requested in Jellyseerr (include status and who requested it)
      - "STATUS: NOT_FOUND" — not available and not requested, include top TMDB matches with IDs

  - id: confirm_and_request
    prompt: |
      "{{title}}" is not yet available or requested. Create the Jellyseerr request.

      From the previous step, you should have TMDB search results. Pick the best match:
      - Match by title + year (prefer exact matches)
      - If media_type is "auto", the TMDB results include `media_type` (movie or tv)
      {% if media_type != "auto" %}
      - User specified type: {{media_type}}
      {% endif %}

      **For the best match, create the request:**
      - Movie: `jellyseerr_manage(action="request", media_id=TMDB_ID, media_type="movie")`
      - TV show: `jellyseerr_manage(action="request", media_id=TMDB_ID, media_type="tv"{% if seasons %}, seasons=[{{seasons}}]{% endif %})`
      {% if not seasons %}
      - If TV and no seasons specified, request all seasons (omit the seasons param).
      {% endif %}

      **Quality note:** Requests go through the quality profiles configured in Sonarr/Radarr.
      Default target is 1080p.

      After requesting, report:
      - "REQUESTED: [title] ([year]) — [movie/tv] — TMDB ID [id]"
      - If TV, mention which seasons were requested
    when:
      step: check_availability
      output_contains: "NOT_FOUND"

  - id: report
    prompt: |
      Write a final summary for the request of "{{title}}".

      Keep it conversational and concise. Include:
      - What you found (already available, already requested, or newly requested)
      - If newly requested: title, year, type, and expected next steps
        ("Sonarr/Radarr will search for it automatically, should start downloading soon")
      - If already available: where to find it
      - If already requested: current status and who requested it

      Example tone: "Done — requested The Bear (2022) on Jellyseerr. All 3 seasons.
      Sonarr will pick it up and start searching for releases. Should be on Jellyfin
      within a few hours depending on availability."
