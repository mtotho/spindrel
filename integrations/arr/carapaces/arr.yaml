  Home media management — TV shows (Sonarr), movies (Radarr), downloads (qBittorrent),
  streaming (Jellyfin), requests (Jellyseerr), subtitles (Bazarr).
tags: [media, sonarr, radarr, jellyfin, qbittorrent, jellyseerr]

skills:
