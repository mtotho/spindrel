id: arr
name: ARR Media Stack
icon: Tv
description: Media library management with Sonarr, Radarr, Prowlarr, qBittorrent, Jellyfin, Jellyseerr, and Bazarr.
version: "1.0"

settings:
  # Sonarr
  - key: SONARR_URL
    type: string
    label: "Sonarr base URL (e.g. http://192.168.1.x:8989)"
  - key: SONARR_API_KEY
    type: string
    label: "Sonarr API key (Settings > General)"
    secret: true
  # Radarr
  - key: RADARR_URL
    type: string
    label: "Radarr base URL (e.g. http://192.168.1.x:7878)"
  - key: RADARR_API_KEY
    type: string
    label: "Radarr API key (Settings > General)"
    secret: true
  # qBittorrent
  - key: QBIT_URL
    type: string
    label: "qBittorrent Web UI URL (e.g. http://192.168.1.x:8080)"
  - key: QBIT_USERNAME
    type: string
    label: "qBittorrent Web UI username"
  - key: QBIT_PASSWORD
    type: string
    label: "qBittorrent Web UI password"
    secret: true
  # Jellyfin
  - key: JELLYFIN_URL
    type: string
    label: "Jellyfin base URL (e.g. http://192.168.1.x:8096)"
  - key: JELLYFIN_API_KEY
    type: string
    label: "Jellyfin API key (Dashboard > API Keys)"
    secret: true
  # Jellyseerr
  - key: JELLYSEERR_URL
    type: string
    label: "Jellyseerr base URL (e.g. http://192.168.1.x:5055)"
  - key: JELLYSEERR_API_KEY
    type: string
    label: "Jellyseerr API key (Settings > General)"
    secret: true
  # Prowlarr
  - key: PROWLARR_URL
    type: string
    label: "Prowlarr base URL (e.g. http://192.168.1.x:9696)"
  - key: PROWLARR_API_KEY
    type: string
    label: "Prowlarr API key (Settings > General)"
    secret: true
  # Bazarr
  - key: BAZARR_URL
    type: string
    label: "Bazarr base URL (e.g. http://192.168.1.x:6767)"
  - key: BAZARR_API_KEY
    type: string
    label: "Bazarr API key (Settings > General)"
    secret: true
  # FlareSolverr
  - key: FLARESOLVERR_URL
    type: string
    label: "FlareSolverr base URL (e.g. http://192.168.1.x:8191) -- Cloudflare bypass for indexers"

activation:
  requires_workspace: false
  description: "Media library management with Sonarr, Radarr, Prowlarr, qBittorrent, Jellyfin, Jellyseerr, and Bazarr"

provides:
  - tools

tool_metadata:
  domains: [media]
  intent_tags:
    - media library
    - downloads
    - sonarr
    - radarr
    - jellyfin
    - qbittorrent
  exposure: ambient

tool_families:
  arr:
    label: ARR Stack
    tools:
      - arr_heartbeat_snapshot
      - sonarr_calendar
      - sonarr_series
      - sonarr_episodes
      - sonarr_series_update
      - sonarr_command
      - sonarr_wanted
      - sonarr_queue
      - sonarr_queue_manage
      - sonarr_quality_profiles
      - sonarr_quality_profile_update
      - sonarr_releases
      - sonarr_history
      - sonarr_indexers
      - radarr_movies
      - radarr_movie_update
      - radarr_command
      - radarr_queue
      - radarr_queue_manage
      - radarr_quality_profiles
      - radarr_quality_profile_update
      - radarr_releases
      - radarr_history
      - radarr_indexers
      - prowlarr_indexers
      - prowlarr_indexer_manage
      - prowlarr_indexer_schemas
      - prowlarr_search
      - prowlarr_apps
      - prowlarr_health
      - prowlarr_tags
      - qbit_torrents
      - qbit_manage
      - jellyfin_library
      - jellyfin_now_playing
      - jellyfin_users
      - jellyseerr_requests
      - jellyseerr_search
      - jellyseerr_manage
      - bazarr_subtitles
      - flaresolverr_health
      - flaresolverr_sessions
      - flaresolverr_test_fetch
      - flaresolverr_destroy_all_sessions

# Showcase: rich React widget rendering of `sonarr_calendar` — week-ahead
# episodes grouped by day with per-episode status chips. Authored as a
# user-space React widget (`runtime: react`) to demonstrate that the same
# theming + auth + state-poll plumbing works whether the body is plain
# HTML or in-browser JSX.
tool_widgets:
  sonarr_calendar:
    runtime: react
    content_type: application/vnd.spindrel.html+interactive
    display: inline
    display_label: "Sonarr — Week Ahead"
    html_template:
      path: widgets/sonarr_calendar.html
    default_config:
      days_ahead: 7
    config_schema:
      type: object
      properties:
        days_ahead:
          type: integer
          title: Days ahead
          description: How many days of upcoming episodes to fetch on each refresh.
          minimum: 1
          maximum: 28
          default: 7
    state_poll:
      tool: sonarr_calendar
      args:
        days_ahead: "{{widget_config.days_ahead}}"
      refresh_interval_seconds: 1800

# Widget presets — guided binding flows surfaced in the Add-to-canvas /
# dashboard preset pickers. Each preset wraps a tool_widget above; pinning
# a preset runs the tool once with the resolved config to seed the first
# envelope, then state_poll on the tool_widget takes over for refreshes.
widget_presets:
  arr-sonarr-week-ahead:
    name: Sonarr — Week Ahead
    description: Upcoming TV episodes from Sonarr grouped by day, auto-refreshing.
    icon: CalendarDays
    layout_hints:
      preferred_zone: grid
      min_cells: {w: 4, h: 4}
    tool_name: sonarr_calendar
    tool_family: arr
    tool_dependencies: [sonarr_calendar]
    binding_schema:
      type: object
      properties:
        days_ahead:
          type: integer
          title: Days ahead
          description: How many days of upcoming episodes to fetch.
          minimum: 1
          maximum: 28
          default: 7
    default_config:
      days_ahead: 7
    runtime:
      tool_args:
        days_ahead: "{{config.days_ahead}}"
