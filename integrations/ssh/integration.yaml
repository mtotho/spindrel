id: ssh
name: SSH
icon: Server
description: Headless machine control over OpenSSH with explicit per-session leases.
version: "0.1"

settings:
  - key: SSH_CONNECT_TIMEOUT_SECONDS
    type: number
    label: "SSH connect timeout seconds"
    default: 10
  - key: SSH_PROBE_TIMEOUT_SECONDS
    type: number
    label: "SSH probe timeout seconds"
    default: 10
  - key: SSH_COMMAND_TIMEOUT_SECONDS
    type: number
    label: "SSH command timeout seconds"
    default: 120
  - key: SSH_MAX_OUTPUT_BYTES
    type: number
    label: "Max stdout/stderr bytes captured per SSH command"
    default: 65536

provides:
  - machine_control

machine_control:
  provider_id: ssh
  label: SSH
  driver: ssh
  profile_fields:
    - key: private_key
      type: string
      label: Private Key
      description: "PEM-formatted private key used for this SSH profile"
      required: true
      secret: true
      multiline: true
    - key: known_hosts
      type: string
      label: known_hosts
      description: "Strict host verification entries for the machines that use this profile"
      required: true
      secret: true
      multiline: true
  profile_setup_guide:
    summary: |
      "Target machine" means the machine you're enrolling — the one Spindrel will SSH into. None of the commands below run on the target. Run them on your local machine (your laptop is fine); steps 2 and 3 reach the target over the network.
    steps:
      - title: Generate a dedicated keypair
        run_on: Your local machine
        description: Creates a fresh Ed25519 key just for Spindrel. The `-N ""` flag creates it without a passphrase, which Spindrel needs to use it unattended. If `~/.ssh/spindrel_ed25519` already exists, pick a different filename.
        commands:
          - label: Generate keypair
            value: ssh-keygen -t ed25519 -C "spindrel-ssh" -f ~/.ssh/spindrel_ed25519 -N ""
      - title: Authorize the public key on the target machine
        run_on: Your local machine (reaches target over SSH)
        description: |
          Replace `user@target-host` with the SSH login for the machine you're enrolling (e.g. `deploy@server-xyz`). This connects to the target and appends the public key to its `~/.ssh/authorized_keys` — you'll be prompted for the target user's password once.

          No SSH access from your local machine? Instead, copy the contents of `~/.ssh/spindrel_ed25519.pub` and append it as a single line to `~/.ssh/authorized_keys` on the target machine yourself.
        commands:
          - label: Push public key to target
            value: ssh-copy-id -i ~/.ssh/spindrel_ed25519.pub user@target-host
      - title: Capture the target's host fingerprint
        run_on: Your local machine (reaches target over SSH)
        description: Spindrel pins target host keys via known_hosts to prevent man-in-the-middle attacks. Replace `target-host` with the hostname or IP you'll enter in the Host field below. Copy the entire output — it goes in the known_hosts field.
        commands:
          - label: Fetch target host keys
            value: ssh-keyscan -t ed25519,rsa target-host
      - title: Paste credentials into the form below
        run_on: Your local machine
        description: |
          Print the private key, copy the whole output (including the `-----BEGIN…-----` / `-----END…-----` lines), and paste it into the **Private Key** field. Then paste the `ssh-keyscan` output from step 3 into the **known_hosts** field. Both values are stored encrypted; Spindrel never echoes them back.
        commands:
          - label: Print private key
            value: cat ~/.ssh/spindrel_ed25519
  enroll_fields:
    - key: host
      type: string
      label: Host
      description: "Hostname or IP address of the target machine"
      required: true
    - key: username
      type: string
      label: Username
      description: "SSH username for the target"
      required: true
    - key: port
      type: number
      label: Port
      description: "SSH port"
      default: 22
    - key: working_dir
      type: string
      label: Default Working Directory
      description: "Optional default working directory for shell commands"
