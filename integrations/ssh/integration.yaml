id: ssh
name: SSH
icon: Server
description: Headless machine control over OpenSSH with explicit per-session leases.
version: "0.1"

settings:
  - key: SSH_CONNECT_TIMEOUT_SECONDS
    type: number
    label: "SSH connect timeout seconds"
    default: 10
  - key: SSH_PROBE_TIMEOUT_SECONDS
    type: number
    label: "SSH probe timeout seconds"
    default: 10
  - key: SSH_COMMAND_TIMEOUT_SECONDS
    type: number
    label: "SSH command timeout seconds"
    default: 120
  - key: SSH_MAX_OUTPUT_BYTES
    type: number
    label: "Max stdout/stderr bytes captured per SSH command"
    default: 65536

provides:
  - machine_control

machine_control:
  provider_id: ssh
  label: SSH
  driver: ssh
  profile_fields:
    - key: private_key
      type: string
      label: Private Key
      description: "PEM-formatted private key used for this SSH profile"
      required: true
      secret: true
      multiline: true
    - key: known_hosts
      type: string
      label: known_hosts
      description: "Strict host verification entries for the machines that use this profile"
      required: true
      secret: true
      multiline: true
  profile_setup_guide:
    summary: Generate a dedicated SSH key, authorize it on the target machine, then paste the credentials below.
    steps:
      - title: Generate a dedicated keypair
        description: Run this on your workstation to create a fresh Ed25519 key for Spindrel to use. The `-N ""` flag creates the key without a passphrase, which Spindrel needs in order to use it unattended.
        commands:
          - label: Generate keypair
            value: ssh-keygen -t ed25519 -C "spindrel-ssh" -f ~/.ssh/spindrel_ed25519 -N ""
      - title: Authorize the public key on the target machine
        description: |
          Replace `user@host` with the SSH login for the machine you're enrolling. This appends the public key to `~/.ssh/authorized_keys` on the target so Spindrel can log in.
        commands:
          - label: Copy public key to target
            value: ssh-copy-id -i ~/.ssh/spindrel_ed25519.pub user@host
      - title: Capture the host fingerprint
        description: Spindrel pins host keys via known_hosts to prevent man-in-the-middle attacks. Replace `host` with the same hostname or IP you'll enroll below, then copy the entire output line.
        commands:
          - label: Fetch host keys
            value: ssh-keyscan -t ed25519,rsa host
      - title: Paste credentials into the form below
        description: |
          Print the private key and paste it into the **Private Key** field. Paste the `ssh-keyscan` output from step 3 into the **known_hosts** field. Both values are stored encrypted; Spindrel never echoes them back.
        commands:
          - label: Print private key
            value: cat ~/.ssh/spindrel_ed25519
  enroll_fields:
    - key: host
      type: string
      label: Host
      description: "Hostname or IP address of the target machine"
      required: true
    - key: username
      type: string
      label: Username
      description: "SSH username for the target"
      required: true
    - key: port
      type: number
      label: Port
      description: "SSH port"
      default: 22
    - key: working_dir
      type: string
      label: Default Working Directory
      description: "Optional default working directory for shell commands"
