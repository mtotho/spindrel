id: mission-control
name: Mission Control
description: >-
  Task tracking, project management, planning workflows, content feeds, and
  external service integration. Provides DB-backed kanban boards, structured plans
  with automatic execution, cross-channel portfolio oversight, and integration setup guides.
tags: [project-management, tasks, planning, feeds, integrations]

requires:
  tools:
    - create_task_card
    - move_task_card
    - append_timeline_event
    - draft_plan
    - update_plan_step
    - update_plan_status

skills:
  # Task & project management
  - id: integrations/mission_control/mission_control
    mode: on_demand
  - id: integrations/mission_control/planning
    mode: on_demand
  - id: integrations/mission_control/project-management
    mode: on_demand
  # External services & data
  - id: integrations/mission_control/content_feeds
    mode: on_demand
  - id: integrations/mission_control/integration-builder
    mode: on_demand

local_tools:
  - create_task_card
  - move_task_card
  - append_timeline_event
  - draft_plan
  - update_plan_step
  - update_plan_status
  - query_feed_store

system_prompt_fragment: |
  ## Mission Control

  You have structured project management and external service capabilities.
  All task/plan data is stored in the MC database. Workspace files (tasks.md,
  timeline.md, plans.md) are auto-generated read-only renderings — never edit
  them directly. Use the tools below for all mutations.

  Plan execution is automatic after approval — do NOT call schedule_task() to
  advance plan steps. The plan executor handles step sequencing.

  ### Tools Quick Reference
  | Tool | Purpose |
  |------|---------|
  | `create_task_card` | Create a kanban card (stored in MC database) |
  | `move_task_card` | Move a card between columns (auto-timestamps) |
  | `append_timeline_event` | Log an event (stored in MC database) |
  | `draft_plan` | Create a structured plan for user approval |
  | `update_plan_step` | Mark plan steps in_progress/done/skipped |
  | `update_plan_status` | Change overall plan status |

  ### Workspace File Organization

  When this channel has a workspace, organize files as follows:

  | File | Purpose | Managed by |
  |------|---------|------------|
  | `tasks.md` | Kanban board (Backlog / In Progress / Review / Done) | `create_task_card`, `move_task_card` — **read-only, never edit directly** |
  | `plans.md` | Structured execution plans | `draft_plan`, `update_plan_step` — **read-only, never edit directly** |
  | `timeline.md` | Chronological event log | `append_timeline_event` — **read-only, never edit directly** |
  | `status.md` | Project health snapshot (phase, health, blockers) | You — update manually via `file` tool |
  | `decisions.md` | Key decisions and rationale | You — update manually via `file` tool |
  | `notes.md` | Freeform working notes | You — update manually via `file` tool |

  Only create files as needed — don't pre-create empty files. For `status.md`,
  use this format: Phase, Health (green/yellow/red), Updated date, Owner, and
  a blockers section.

  ### Deep Knowledge Index

  | When you need... | Fetch this skill |
  |---|---|
  | Task board format, card metadata, status.md, kanban conventions | `get_skill('integrations/mission_control/mission_control')` |
  | Plan workflow — drafting, approval gates, automatic execution, progress tracking | `get_skill('integrations/mission_control/planning')` |
  | Cross-channel project tracking, portfolio reports, status dashboards | `get_skill('integrations/mission_control/project-management')` |
  | Feed content (email, RSS), `query_feed_store` usage, quarantine review, cross-feed digests | `get_skill('integrations/mission_control/content_feeds')` |
  | Connecting external services (email, RSS, webhooks, APIs, polling) | `get_skill('integrations/mission_control/integration-builder')` |
