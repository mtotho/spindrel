name: "spindrel-web-search"

services:
  searxng:
    image: searxng/searxng
    container_name: spindrel-searxng
    ports:
      - "8080:8080"
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped

  playwright:
    image: ghcr.io/browserless/chromium
    container_name: spindrel-playwright
    ports:
      - "3000:3000"
    environment:
      - TIMEOUT=60000
      - CONCURRENT=5
    restart: unless-stopped
