<!--
---
name: Web search results
description: SearXNG results with star + summarize + starred filter. Uses spindrel SDK helpers.
display_label: Web search
version: 2.0.0
author: web_search
tags: [search, integration]
-->
<style>
  #ws-list .res { padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start; }
  #ws-list .favicon { width: 20px; height: 20px; flex-shrink: 0; border-radius: 3px; margin-top: 3px; background: var(--sd-surface-overlay); }
  #ws-list .favicon-spacer { width: 20px; flex-shrink: 0; }
  #ws-list .body { flex: 1; min-width: 0; gap: 2px; }
  #ws-list .title-link { font-size: 14px; font-weight: 500; color: var(--sd-accent); text-decoration: none; cursor: pointer; }
  #ws-list .meta-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  #ws-list .snippet { margin: 2px 0 0; font-size: var(--sd-font-size-sm); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  #ws-list .actions { margin-top: 6px; }
  #ws-list .actions .sd-btn { padding: 2px 8px; font-size: 11px; }
  #ws-list .chip-sm { font-size: 10px; }
  #ws-list .summary { margin-top: 8px; }
  #ws-list .summary-body { padding: 10px 12px; white-space: pre-wrap; font-size: var(--sd-font-size-sm); max-height: 240px; overflow-y: auto; }
</style>
<div class="sd-card" id="root">
  <header class="sd-card-header sd-hstack-between" style="align-items: flex-start;">
    <div class="sd-stack" style="gap: 0;">
      <h3 class="sd-title" id="query-line">Results</h3>
      <span class="sd-meta" id="count-line"></span>
    </div>
    <button class="sd-btn sd-btn-subtle" id="starred-filter" aria-pressed="false" type="button" title="Show only starred">☆ <span id="starred-count">0</span></button>
  </header>
  <div class="sd-card-body">
    <div id="ws-list" class="sd-stack-sm"></div>
  </div>
</div>
<script>
(function () {
  const sp = window.spindrel;
  const queryEl = document.getElementById("query-line");
  const countEl = document.getElementById("count-line");
  const listEl = document.getElementById("ws-list");
  const starredBtn = document.getElementById("starred-filter");
  const starredCountEl = document.getElementById("starred-count");
  let onlyStarred = false;

  const esc = (s) => String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  const domainOf = (url) => { try { return new URL(url).hostname.replace(/^www\./, ""); } catch (_) { return ""; } };
  const getStarred = () => {
    const cfg = (sp.toolResult && sp.toolResult.config) || {};
    return Array.isArray(cfg.starred) ? cfg.starred.slice() : [];
  };

  function applyStarred(next) {
    if (sp.toolResult) sp.toolResult.config = { ...(sp.toolResult.config || {}), starred: next };
  }
  async function setStarred(next) {
    applyStarred(next);
    sp.bus.publish("web_search:starred_changed", { starred: next });
    if (!sp.dashboardPinId) return;
    try {
      await sp.api("/api/v1/widget-actions", { method: "POST", body: JSON.stringify({ dispatch: "widget_config", dashboard_pin_id: sp.dashboardPinId, config: { starred: next } }) });
    } catch (e) { sp.notify("error", "Could not persist star: " + ((e && e.message) || e)); }
  }

  function cardHtml(r, starred) {
    const url = r.url || "";
    const isStarred = starred.indexOf(url) >= 0;
    const dom = domainOf(url);
    const favicon = dom
      ? `<img class="favicon" src="/api/v1/favicon?domain=${encodeURIComponent(dom)}" alt="" onerror="this.style.visibility='hidden'"/>`
      : `<div class="favicon-spacer"></div>`;
    const chip = dom ? `<span class="sd-chip chip-sm">${esc(dom)}</span>` : "";
    return `<article class="sd-tile res">${favicon}
      <div class="sd-stack body">
        <a href="#" class="title-link result-title" data-url="${esc(url)}">${esc(r.title || url)}</a>
        <div class="sd-meta meta-row">${chip}</div>
        <p class="sd-muted snippet">${esc(r.content || "")}</p>
        <div class="sd-hstack-sm actions">
          <button class="sd-btn sd-btn-subtle star-btn" data-url="${esc(url)}" aria-pressed="${isStarred}" type="button" title="Save for later">${isStarred ? '★ Saved' : '☆ Save'}</button>
          <button class="sd-btn sd-btn-subtle summarize-btn" data-url="${esc(url)}" type="button">✎ Summarize</button>
          <button class="sd-btn sd-btn-subtle open-btn" data-url="${esc(url)}" type="button">Open ↗</button>
        </div>
        <div class="summary" hidden></div>
      </div></article>`;
  }

  function render() {
    const data = sp.toolResult || {};
    if (data.error) { sp.ui.status(listEl, "error", { message: data.error }); return; }
    const results = Array.isArray(data.results) ? data.results : [];
    const starred = getStarred();
    queryEl.textContent = data.query ? '“' + data.query + '”' : 'Web search';
    countEl.textContent = results.length + (results.length === 1 ? " result" : " results");
    starredCountEl.textContent = starred.length;
    starredBtn.style.opacity = starred.length ? "1" : "0.5";
    starredBtn.setAttribute("aria-pressed", onlyStarred ? "true" : "false");
    const shown = onlyStarred ? results.filter((r) => starred.indexOf(r.url) >= 0) : results;
    if (!shown.length) {
      sp.ui.status(listEl, "empty", { message: onlyStarred ? "No starred results yet." : "No results." });
      return;
    }
    listEl.innerHTML = shown.map((r) => cardHtml(r, starred)).join("");
  }

  const openUrl = (url) => { try { window.top.postMessage({ type: "spindrel:open-url", url }, "*"); } catch (_) {} };

  async function summarize(btn) {
    const url = btn.getAttribute("data-url");
    const card = btn.closest(".res");
    const panel = card.querySelector(".summary");
    if (!panel.hidden && panel.dataset.url === url) { panel.hidden = true; return; }
    btn.disabled = true;
    const oldLabel = btn.textContent;
    btn.textContent = "Summarizing…";
    panel.hidden = false;
    panel.dataset.url = url;
    panel.innerHTML = '<div class="sd-skeleton" style="height:40px;"></div>';
    try {
      const env = await sp.callTool("fetch_url", { url });
      let text = (env && (env.plain_body || env.body)) || "No content returned.";
      if (typeof text !== "string") text = JSON.stringify(text);
      if (text.length > 1400) text = text.slice(0, 1400) + "…";
      panel.innerHTML = `<div class="sd-tile summary-body">${esc(text)}</div>`;
    } catch (e) {
      const msg = (e && e.message) || "Summarize failed";
      panel.innerHTML = `<div class="sd-error">Summarize failed: ${esc(msg)}</div>`;
      sp.notify("error", msg);
    } finally {
      btn.disabled = false;
      btn.textContent = oldLabel;
    }
  }

  listEl.addEventListener("click", (ev) => {
    const hit = ev.target.closest(".star-btn, .open-btn, .result-title, .summarize-btn");
    if (!hit) return;
    const url = hit.getAttribute("data-url");
    if (hit.classList.contains("star-btn")) {
      const s = getStarred(); const i = s.indexOf(url);
      if (i >= 0) s.splice(i, 1); else s.push(url);
      setStarred(s).then(render);
    } else if (hit.classList.contains("summarize-btn")) { summarize(hit); }
    else { ev.preventDefault(); openUrl(url); }
  });

  starredBtn.addEventListener("click", () => { onlyStarred = !onlyStarred; render(); });

  sp.bus.subscribe("web_search:starred_changed", ({ starred }) => { applyStarred(starred); render(); });

  window.addEventListener("spindrel:toolresult", render);
  render();
})();
</script>
