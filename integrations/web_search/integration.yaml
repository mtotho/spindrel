id: web_search
name: Web Search
icon: Search
description: Private web search via SearXNG (self-hosted) or DuckDuckGo (lightweight).
version: "1.0"

settings:
  - key: WEB_SEARCH_MODE
    type: string
    label: "Search backend: searxng (self-hosted, private), ddgs (DuckDuckGo, lightweight), or disabled"
    default: "searxng"
  - key: WEB_SEARCH_CONTAINERS
    type: string
    label: "Start built-in SearXNG + Playwright containers (only needed in searxng mode with no external instance)"
    default: "true"
  - key: SEARXNG_URL
    type: string
    label: "URL of the SearXNG instance (only used in searxng mode). Default auto-detects Docker vs local."
  - key: PLAYWRIGHT_WS_URL
    type: string
    label: "Playwright/Chromium WebSocket URL for JS-rendered page fetching. Default auto-detects Docker vs local."

docker_compose:
  file: docker-compose.yml
  # Project name interpolates SPINDREL_INSTANCE_ID so multiple agent-server
  # instances on one Docker daemon (e.g. prod + e2e) do not collide.
  # Network wiring is declared inside docker-compose.yml itself — sidecars
  # attach to the external `${AGENT_NETWORK_NAME}` network with per-instance
  # aliases so the agent reaches them at a stable hostname.
  project_name: "spindrel-${SPINDREL_INSTANCE_ID}-web-search"
  enabled_setting: WEB_SEARCH_CONTAINERS
  config_files: [config/searxng/settings.yml]
  description: "SearXNG + Playwright for private web search"

provides:
  - tools

# Web Search opts into the core semantic search-results renderer. The component
# template below is a compatibility fallback for clients that do not understand
# view_key: core.search_results.
tool_widgets:
  web_search:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "Web search"
    view_key: core.search_results
    sample_payload:
      query: "best espresso machine under 500"
      count: 3
      results:
        - title: "The 5 Best Espresso Machines Under $500 (2026)"
          url: "https://example.com/coffee/best-espresso-under-500"
          content: "We tested a dozen sub-$500 espresso machines. The Breville Bambino Plus took the crown for its steam wand, followed by the Gaggia Classic Pro for manual enthusiasts. Rankings, pros and cons, and tasting notes inside."
        - title: "Gaggia Classic Pro — long-term review"
          url: "https://coffeeforum.example.org/gaggia-classic-pro-2-year-review"
          content: "Two years with the Gaggia Classic Pro. Maintenance costs, mods that actually help, and whether it's still worth it compared to new entrants."
        - title: "Breville Bambino Plus vs Infuser head-to-head"
          url: "https://reviews.example.net/breville-bambino-plus-vs-infuser"
          content: "The Bambino Plus and the Infuser are both popular mid-range picks. We compared espresso quality, steaming speed, and long-term reliability across 6 months."
    template:
      v: 1
      components:
        - type: heading
          text: "Search: {{query}}"
          level: 2
        - type: status
          text: "{{count}} result(s)"
          color: info
        - type: links
          items: "{{results | map: {url: url, title: title, subtitle: content} }}"
