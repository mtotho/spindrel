id: wyoming
name: Voice Assistant (Wyoming)
icon: Mic
description: >-
  Voice assistant via Wyoming protocol. Connects to Wyoming satellites
  (Raspberry Pi, ESP32, etc.), transcribes speech via Whisper, dispatches
  to a bound channel, and speaks the bot's response back via Piper TTS.
version: "0.1"

settings:
  - key: WYOMING_WHISPER_URI
    type: string
    label: "Whisper STT service URI (tcp://host:port)"
    default: "tcp://localhost:10300"
  - key: WYOMING_PIPER_URI
    type: string
    label: "Piper TTS service URI (tcp://host:port)"
    default: "tcp://localhost:10200"
  - key: WYOMING_DEFAULT_VOICE
    type: string
    label: "Default Piper voice model"
    default: "en_US-lessac-medium"
  - key: AGENT_API_KEY
    type: string
    label: "API key for the agent server"
    required: true
    secret: true
  - key: AGENT_BASE_URL
    type: string
    label: "Agent server URL (default: http://localhost:8000)"
  - key: WYOMING_CONTAINERS
    type: string
    label: "Start Whisper + Piper Docker containers (true/false)"
    default: "true"
  - key: ESPHOME_API_PASSWORD
    type: string
    label: "ESPHome API password (optional, must match device config)"
    default: ""
    secret: true

events:
  - { type: wake_word_detected, label: Wake word detected, description: "Device wake word triggered", category: device }
  - { type: transcription_complete, label: Transcription complete, description: "Speech-to-text finished", category: device }
  - { type: session_started, label: Voice session started, category: device }
  - { type: session_ended, label: Voice session ended, category: device }

binding:
  client_id_prefix: "wyoming:"
  client_id_placeholder: "wyoming:living-room"
  client_id_description: "Device name or identifier"
  suggestions_endpoint: "/integrations/wyoming/binding-suggestions"
  config_fields:
    - key: protocol
      type: select
      label: "Device Protocol"
      description: "Wyoming for Raspberry Pi satellites, ESPHome for ESP32 devices (ATOM Echo, etc.)"
      default: wyoming
      options:
        - { value: wyoming, label: "Wyoming (Pi satellite)" }
        - { value: esphome, label: "ESPHome (ATOM Echo / ESP32)" }
    - key: satellite_uri
      type: string
      label: "Device URI"
      description: "TCP address of the device (e.g. tcp://192.168.1.50:10700 for Wyoming, tcp://192.168.1.50:6053 for ESPHome)"
    - key: esphome_device_name
      type: string
      label: "ESPHome Device Name"
      description: "Device name from ESPHome YAML (used to identify device on connect). Only for ESPHome protocol."
    - key: voice
      type: string
      label: "Piper Voice"
      description: "Override the default TTS voice for this device (e.g. en_US-amy-medium). Browse voices at rhasspy.github.io/piper-samples/"

target:
  type: wyoming
  fields:
    device_id: string
    connection_id: string?

dependencies:
  python:
    - package: wyoming
      import_name: wyoming
    - package: zeroconf
      import_name: zeroconf
    - package: aioesphomeapi
      import_name: aioesphomeapi

capabilities:
  - text

provides:
  - target
  - renderer
  - router

docker_compose:
  file: docker-compose.yml
  project_name: "spindrel-${SPINDREL_INSTANCE_ID}-wyoming"
  enabled_setting: WYOMING_CONTAINERS
  connect_networks: ["${AGENT_NETWORK_NAME}"]
  network_aliases:
    whisper: "whisper-${SPINDREL_INSTANCE_ID}"
    piper: "piper-${SPINDREL_INSTANCE_ID}"
  description: "Whisper STT + Piper TTS for voice assistant pipeline"

process:
  cmd: ["python", "-m", "integrations.wyoming.pipeline_orchestrator"]
  description: "Wyoming pipeline orchestrator (connects to satellites)"
  required_env: []
  watch_paths: ["integrations/wyoming/"]
