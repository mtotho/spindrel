substitutions:
  name: atom-echo
  friendly_name: "Atom Echo"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.11.0
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

logger:

api:
  # No encryption key — Spindrel connects via plaintext protocol.
  # Set a password here AND in Spindrel's ESPHOME_API_PASSWORD setting
  # if you want basic auth.

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Optional: static IP for reliable connections
  # manual_ip:
  #   static_ip: 192.168.1.X
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0

  ap:
    ssid: "${friendly_name} Fallback"

captive_portal:

# --- Audio hardware ---

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19

microphone:
  - platform: i2s_audio
    id: echo_mic
    i2s_audio_id: i2s_audio_bus
    adc_type: external
    i2s_din_pin: GPIO23
    pdm: true

speaker:
  - platform: i2s_audio
    id: echo_speaker
    i2s_audio_id: i2s_audio_bus
    dac_type: external
    i2s_dout_pin: GPIO22
    mode: mono

# --- Voice assistant ---

voice_assistant:
  id: voice_asst
  microphone: echo_mic
  speaker: echo_speaker
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  on_client_connected:
    - lambda: id(voice_asst).start();
    - light.turn_on:
        id: led
        blue: 100%
        brightness: 50%
        effect: none

  on_client_disconnected:
    - light.turn_on:
        id: led
        red: 100%
        brightness: 50%
        effect: none

  on_listening:
    - light.turn_on:
        id: led
        blue: 100%
        brightness: 100%
        effect: pulse

  on_stt_end:
    - light.turn_on:
        id: led
        green: 100%
        brightness: 50%
        effect: none

  on_tts_start:
    - light.turn_on:
        id: led
        green: 100%
        brightness: 100%
        effect: none

  on_tts_end:
    - light.turn_on:
        id: led
        blue: 100%
        brightness: 50%
        effect: none

  on_error:
    - light.turn_on:
        id: led
        red: 100%
        brightness: 100%
        effect: fast pulse

# --- Button (trigger voice) ---

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: "Button"
    id: echo_button
    on_press:
      - voice_assistant.start:

    on_release:
      - voice_assistant.stop:

# --- LED ---

light:
  - platform: esp32_rmt_led_strip
    id: led
    pin: GPIO27
    num_leds: 1
    rmt_channel: 0
    chipset: SK6812
    rgb_order: GRB
    default_transition_length: 0s
    effects:
      - pulse:
          name: "pulse"
          transition_length: 250ms
          update_interval: 250ms
      - pulse:
          name: "fast pulse"
          transition_length: 100ms
          update_interval: 100ms
