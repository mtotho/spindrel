name: "spindrel-${SPINDREL_INSTANCE_ID:-default}-wyoming"

services:
  whisper:
    image: rhasspy/wyoming-whisper
    ports:
      - "10300:10300"
    command: --model tiny-int8 --language en
    networks:
      agent_net:
        aliases:
          - "whisper-${SPINDREL_INSTANCE_ID:-default}"
    restart: unless-stopped

  piper:
    image: rhasspy/wyoming-piper
    ports:
      - "10200:10200"
    command: --voice en_US-lessac-medium
    networks:
      agent_net:
        aliases:
          - "piper-${SPINDREL_INSTANCE_ID:-default}"
    restart: unless-stopped

networks:
  agent_net:
    external: true
    name: "${AGENT_NETWORK_NAME:-agent-server_default}"
