id: github
name: GitHub
icon: Code2
description: GitHub repository management — PR reviews, issue tracking, code push events, and release monitoring.
version: "1.0"

settings:
  - key: GITHUB_TOKEN
    type: string
    label: "PAT with repo scope"
    required: true
    secret: true
  - key: GITHUB_WEBHOOK_SECRET
    type: string
    label: "Webhook signature secret"
    required: true
    secret: true
  - key: GITHUB_BOT_LOGIN
    type: string
    label: "GitHub username of the bot/PAT owner (to ignore its own comments)"

dependencies:
  system:
    - binary: gh
      apt_package: gh
      install_hint: "Requires GitHub's apt repo. See https://github.com/cli/cli/blob/trunk/docs/install_linux.md"

api_permissions:
  - chat
  - bots:read
  - channels:read
  - channels:write
  - sessions:read
  - sessions:write

events:
  - { type: pull_request, label: Pull requests, description: "PR opened, closed, merged, or updated", category: webhook }
  - { type: push, label: Pushes, description: "Code pushed to a branch", category: webhook }
  - { type: issues, label: Issues, description: "Issue opened, closed, or updated", category: webhook }
  - { type: issue_comment, label: "Issue/PR comments", description: "Comment on an issue or pull request", category: webhook }
  - { type: pull_request_review, label: PR reviews, description: "Pull request review submitted", category: webhook }
  - { type: pull_request_review_comment, label: "PR review comments", category: webhook }
  - { type: release, label: Releases, description: "New release published", category: webhook }
  - { type: discussion, label: Discussions, category: webhook }
  - { type: discussion_comment, label: "Discussion comments", category: webhook }

webhook:
  path: /integrations/github/webhook
  description: "GitHub webhook receiver (push, PR, issue events)"

activation:
  requires_workspace: false
  description: "GitHub repository management — PR reviews, issue tracking, code push events, and release monitoring"

binding:
  client_id_prefix: "github:"
  client_id_placeholder: "github:owner/repo"
  client_id_description: "GitHub owner/repo (e.g. octocat/hello-world)"
  display_name_placeholder: "octocat/hello-world"
  config_fields:
    - key: event_filter
      type: multiselect
      label: Event Filter
      description: "Which GitHub events to process (empty = all)"
      # options auto-derived from top-level events: section

capabilities:
  - text
  - rich_text
  - mentions

provides:
  - target
  - renderer
  - router
  - tools
  - skills

tool_families:
  github:
    label: GitHub
    tools:
      - github_repo_dashboard
      - github_repo_options
      - github_set_issue_state

# Interactive widget buttons for GitHub tools.
# These tools already emit _envelope with components from Python code —
# the _envelope opt-in takes priority over these YAML templates.
# These templates serve as the YAML-first definition for when the
# tools are migrated away from inline _envelope construction.
# For now, the mutation tools (update_pr, merge_pr, update_issue)
# are defined here so widget actions can dispatch to them.

tool_widgets:
  github_repo_dashboard:
    runtime: react
    content_type: application/vnd.spindrel.html+interactive
    display: inline
    display_label: "GitHub — {{repository.full_name}}"
    html_template:
      path: widgets/repo_dashboard.html
    default_config:
      repository: ""
      limit: 20
      include_actions: true
    config_schema:
      type: object
      properties:
        repository:
          type: string
          title: Repository
          description: GitHub repository in owner/repo form. Leave empty on a GitHub-bound channel to infer it.
        limit:
          type: integer
          title: Result limit
          description: Maximum commits, PRs, issues, and workflow runs to show.
          minimum: 5
          maximum: 50
          default: 20
        include_actions:
          type: boolean
          title: Include workflow runs
          description: Include recent GitHub Actions workflow runs.
          default: true
    state_poll:
      tool: github_repo_dashboard
      args:
        repository: "{{widget_config.repository}}"
        limit: "{{widget_config.limit}}"
        include_actions: "{{widget_config.include_actions}}"
      refresh_interval_seconds: 300

  github_get_pr:
    content_type: application/vnd.spindrel.components+json
    display: inline
    sample_payload:
      number: 42
      title: Add widget preset validation
      state: open
      user:
        login: mtoth
      head:
        ref: widget-contract-cleanup
      base:
        ref: main
        repo:
          name: agent-server
          owner:
            login: spindrel
      additions: 120
      deletions: 18
      changed_files: 5
    template:
      v: 1
      components:
        - type: heading
          text: "PR #{{number}}: {{title}}"
          level: 2
        - type: status
          text: "{{state}}"
          color: "{{state | status_color}}"
        - type: properties
          layout: vertical
          items:
            - label: Author
              value: "{{user.login}}"
            - label: Branch
              value: "{{head.ref}} → {{base.ref}}"
            - label: Stats
              value: "+{{additions}} −{{deletions}} across {{changed_files}} files"
        - type: divider
          when: "{{state == 'open'}}"
        - type: button
          label: Merge
          variant: primary
          when: "{{state == 'open'}}"
          action:
            dispatch: tool
            tool: github_merge_pr
            args:
              owner: "{{base.repo.owner.login}}"
              repo: "{{base.repo.name}}"
              pull_number: "{{number}}"
        - type: button
          label: Close
          variant: danger
          when: "{{state == 'open'}}"
          action:
            dispatch: tool
            tool: github_update_pr
            args:
              owner: "{{base.repo.owner.login}}"
              repo: "{{base.repo.name}}"
              pull_number: "{{number}}"
              state: closed

  github_get_issue:
    content_type: application/vnd.spindrel.components+json
    display: inline
    sample_payload:
      number: 17
      title: Widget config editor should show accepted keys
      state: open
      user:
        login: mtoth
      created_at: "2026-04-18T10:00:00Z"
      updated_at: "2026-04-22T14:15:00Z"
      repository:
        name: agent-server
        owner:
          login: spindrel
    template:
      v: 1
      components:
        - type: heading
          text: "Issue #{{number}}: {{title}}"
          level: 2
        - type: status
          text: "{{state}}"
          color: "{{state | status_color}}"
        - type: properties
          layout: vertical
          items:
            - label: Author
              value: "{{user.login}}"
            - label: Created
              value: "{{created_at}}"
            - label: Updated
              value: "{{updated_at}}"
        - type: divider
        - type: button
          label: Close
          variant: danger
          when: "{{state == 'open'}}"
          action:
            dispatch: tool
            tool: github_set_issue_state
            args:
              repository: "{{repository.owner.login}}/{{repository.name}}"
              issue_number: "{{number}}"
              state: closed
              confirmed: true
        - type: button
          label: Reopen
          variant: default
          when: "{{state == 'closed'}}"
          action:
            dispatch: tool
            tool: github_set_issue_state
            args:
              repository: "{{repository.owner.login}}/{{repository.name}}"
              issue_number: "{{number}}"
              state: open
              confirmed: true

widget_presets:
  github-repo-dashboard:
    name: GitHub Repo Dashboard
    description: Repository command center with commits, PRs, issues, workflow runs, and issue triage.
    icon: Github
    layout_hints:
      preferred_zone: grid
      min_cells: {w: 6, h: 5}
    tool_name: github_repo_dashboard
    tool_family: github
    tool_dependencies: [github_repo_dashboard, github_repo_options, github_set_issue_state]
    binding_schema:
      type: object
      properties:
        repository:
          type: string
          title: Repository
          description: Select a bound repo or type owner/repo. Channel pins can leave this empty to infer the channel binding.
          ui:
            control: picker
            source: github.repositories
            allow_custom: true
        limit:
          type: integer
          title: Result limit
          description: Maximum commits, PRs, issues, and workflow runs to show.
          minimum: 5
          maximum: 50
          default: 20
        include_actions:
          type: boolean
          title: Include workflow runs
          description: Include recent GitHub Actions workflow runs.
          default: true
          ui:
            control: switch
    binding_sources:
      github.repositories:
        tool: github_repo_options
        args: {}
        transform: "integrations.github.bindings:repo_options"
    default_config:
      repository: ""
      limit: 20
      include_actions: true
    runtime:
      tool_args:
        repository: "{{config.repository}}"
        limit: "{{config.limit}}"
        include_actions: "{{config.include_actions}}"
