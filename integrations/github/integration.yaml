id: github
name: GitHub
icon: Code2
description: GitHub repository management — PR reviews, issue tracking, code push events, and release monitoring.
version: "1.0"

settings:
  - key: GITHUB_TOKEN
    type: string
    label: "PAT with repo scope"
    required: true
    secret: true
  - key: GITHUB_WEBHOOK_SECRET
    type: string
    label: "Webhook signature secret"
    required: true
    secret: true
  - key: GITHUB_BOT_LOGIN
    type: string
    label: "GitHub username of the bot/PAT owner (to ignore its own comments)"

dependencies:
  system:
    - binary: gh
      apt_package: gh
      install_hint: "Requires GitHub's apt repo. See https://github.com/cli/cli/blob/trunk/docs/install_linux.md"

api_permissions:
  - chat
  - bots:read
  - channels:read
  - channels:write
  - sessions:read
  - sessions:write

events:
  - { type: pull_request, label: Pull requests, description: "PR opened, closed, merged, or updated", category: webhook }
  - { type: push, label: Pushes, description: "Code pushed to a branch", category: webhook }
  - { type: issues, label: Issues, description: "Issue opened, closed, or updated", category: webhook }
  - { type: issue_comment, label: "Issue/PR comments", description: "Comment on an issue or pull request", category: webhook }
  - { type: pull_request_review, label: PR reviews, description: "Pull request review submitted", category: webhook }
  - { type: pull_request_review_comment, label: "PR review comments", category: webhook }
  - { type: release, label: Releases, description: "New release published", category: webhook }
  - { type: discussion, label: Discussions, category: webhook }
  - { type: discussion_comment, label: "Discussion comments", category: webhook }

webhook:
  path: /integrations/github/webhook
  description: "GitHub webhook receiver (push, PR, issue events)"

activation:
  requires_workspace: false
  description: "GitHub repository management — PR reviews, issue tracking, code push events, and release monitoring"

binding:
  client_id_prefix: "github:"
  client_id_placeholder: "github:owner/repo"
  client_id_description: "GitHub owner/repo (e.g. octocat/hello-world)"
  display_name_placeholder: "octocat/hello-world"
  config_fields:
    - key: event_filter
      type: multiselect
      label: Event Filter
      description: "Which GitHub events to process (empty = all)"
      # options auto-derived from top-level events: section

capabilities:
  - text
  - rich_text
  - mentions

provides:
  - target
  - renderer
  - router
  - tools
  - skills

# Interactive widget buttons for GitHub tools.
# These tools already emit _envelope with components from Python code —
# the _envelope opt-in takes priority over these YAML templates.
# These templates serve as the YAML-first definition for when the
# tools are migrated away from inline _envelope construction.
# For now, the mutation tools (update_pr, merge_pr, update_issue)
# are defined here so widget actions can dispatch to them.

tool_widgets:
  github_get_pr:
    content_type: application/vnd.spindrel.components+json
    display: inline
    template:
      v: 1
      components:
        - type: heading
          text: "PR #{{number}}: {{title}}"
          level: 2
        - type: status
          text: "{{state}}"
          color: "{{state | status_color}}"
        - type: properties
          layout: vertical
          items:
            - label: Author
              value: "{{user.login}}"
            - label: Branch
              value: "{{head.ref}} → {{base.ref}}"
            - label: Stats
              value: "+{{additions}} −{{deletions}} across {{changed_files}} files"
        - type: divider
          when: "{{state == 'open'}}"
        - type: button
          label: Merge
          variant: primary
          when: "{{state == 'open'}}"
          action:
            dispatch: tool
            tool: github_merge_pr
            args:
              owner: "{{base.repo.owner.login}}"
              repo: "{{base.repo.name}}"
              pull_number: "{{number}}"
        - type: button
          label: Close
          variant: danger
          when: "{{state == 'open'}}"
          action:
            dispatch: tool
            tool: github_update_pr
            args:
              owner: "{{base.repo.owner.login}}"
              repo: "{{base.repo.name}}"
              pull_number: "{{number}}"
              state: closed

  github_get_issue:
    content_type: application/vnd.spindrel.components+json
    display: inline
    template:
      v: 1
      components:
        - type: heading
          text: "Issue #{{number}}: {{title}}"
          level: 2
        - type: status
          text: "{{state}}"
          color: "{{state | status_color}}"
        - type: properties
          layout: vertical
          items:
            - label: Author
              value: "{{user.login}}"
            - label: Created
              value: "{{created_at}}"
            - label: Updated
              value: "{{updated_at}}"
        - type: divider
        - type: button
          label: Close
          variant: danger
          when: "{{state == 'open'}}"
          action:
            dispatch: tool
            tool: github_update_issue
            args:
              owner: "{{repository.owner.login}}"
              repo: "{{repository.name}}"
              issue_number: "{{number}}"
              state: closed
        - type: button
          label: Reopen
          variant: default
          when: "{{state == 'closed'}}"
          action:
            dispatch: tool
            tool: github_update_issue
            args:
              owner: "{{repository.owner.login}}"
              repo: "{{repository.name}}"
              issue_number: "{{number}}"
              state: open
