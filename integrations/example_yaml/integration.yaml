name: Example YAML Integration
id: example_yaml
icon: FlaskConical
description: Minimal example of a YAML-only integration — no Python code required.
version: "1.0"

# Integration-level settings (configured once in admin)
settings:
  - key: EXAMPLE_API_URL
    type: string
    label: API URL
    description: URL of the example service
    default: http://localhost:9090
  - key: EXAMPLE_API_KEY
    type: string
    label: API Key
    secret: true
    required: true

# MCP servers this integration provides
mcp_servers:
  - id: example-tools
    display_name: Example Tools
    url: http://localhost:9090/mcp
    # image: example/mcp-server:latest  # uncomment for container-based

# Typed dispatch target — auto-generates a frozen dataclass and registers
# it with the target registry. No target.py needed for simple cases.
# Use target.py instead when you need custom from_dispatch_config() logic.
target:
  type: example_yaml
  fields:
    channel_id: string
    api_key: string?          # optional (defaults to None)
    verbose: bool = false     # optional with default

# Background process — replaces process.py for simple cmd + env declarations.
# process:
#   cmd: ["python", "integrations/example_yaml/bot.py"]
#   description: "Example bot process"
#   required_env: ["EXAMPLE_API_KEY"]
#   watch_paths: ["integrations/example_yaml/"]

# Per-channel activation
activation:
  carapaces:
    - example-yaml
  requires_workspace: false
  description: Example integration demonstrating YAML-only setup
  config_fields:
    - key: project_name
      type: string
      label: Project Name
      description: Name of the project for this channel
