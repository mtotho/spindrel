<div id="root" style="display: block;">
  <div class="sd-frame" id="frame" style="min-height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 6px;">
    <div class="sd-frame-overlay" id="overlay">Loading…</div>
  </div>
  <div class="sd-hstack sd-hstack-sm" id="controls" style="padding: 6px 2px 2px; gap: 6px;">
    <span class="sd-meta" id="meta" style="flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
    <button class="sd-btn sd-btn-subtle" id="bbox" aria-pressed="true" type="button" style="padding: 3px 8px; font-size: 11px;">Boxes</button>
    <button class="sd-btn sd-btn-subtle" id="refresh" type="button" style="padding: 3px 8px; font-size: 11px;">Refresh</button>
  </div>
  <div class="sd-error" id="err" hidden style="padding: 4px 2px;"></div>
</div>
<script>
(function () {
  var metaEl = document.getElementById("meta");
  var frameEl = document.getElementById("frame");
  var overlayEl = document.getElementById("overlay");
  var bboxBtn = document.getElementById("bbox");
  var refreshBtn = document.getElementById("refresh");
  var errEl = document.getElementById("err");
  var currentImgUrl = null;
  // Reusable image tile — keeps DOM identity across snapshot swaps so the
  // skeleton only flashes on the first paint, not on every refresh. The
  // host-side spindrel.image helper owns the skeleton + blob fetch + fade-in.
  var imgTile = null;

  function setError(msg) {
    if (!msg) { errEl.hidden = true; errEl.textContent = ""; return; }
    errEl.hidden = false;
    errEl.textContent = msg;
  }

  function humanSize(bytes) {
    if (!bytes && bytes !== 0) return "";
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(2) + " MB";
  }

  function cameraFromFilename(filename) {
    if (!filename) return "";
    var m = /^(.*?)_snapshot\.jpg$/.exec(filename);
    return m ? m[1] : filename;
  }

  function render(data) {
    if (!data || typeof data !== "object") {
      overlayEl.textContent = "No snapshot yet.";
      return;
    }
    if (data.error) {
      setError(data.error);
      overlayEl.textContent = "Snapshot failed.";
      return;
    }
    setError("");

    var cam = cameraFromFilename(data.filename) || "";
    var bits = [];
    if (cam) bits.push(cam);
    if (data.size_bytes) bits.push(humanSize(data.size_bytes));
    bits.push(new Date().toLocaleTimeString());
    metaEl.textContent = bits.join(" · ");

    var attId = data.attachment_id;
    if (!attId) {
      overlayEl.textContent = "Snapshot has no attachment_id.";
      return;
    }
    var nextUrl = "/api/v1/attachments/" + encodeURIComponent(attId) + "/file";
    if (nextUrl === currentImgUrl) return;
    currentImgUrl = nextUrl;

    // spindrel.image renders an aspect-ratio skeleton while the blob fetch
    // is in flight, then fades the <img> in on load. Kills the broken-image
    // flash that came from appending a src-less <img> before the async fetch
    // resolved. Subsequent snapshot refreshes reuse the same tile via .update().
    if (!imgTile) {
      imgTile = window.spindrel.image(nextUrl, {
        aspectRatio: "16 / 9",
        alt: cam + " snapshot",
      });
      frameEl.innerHTML = "";
      frameEl.appendChild(imgTile);
    } else {
      imgTile.update(nextUrl);
    }
  }

  function refresh() {
    refreshBtn.disabled = true;
    refreshBtn.textContent = "…";
    window.spindrel
      .api("/api/v1/widget-actions/refresh", {
        method: "POST",
        body: JSON.stringify({
          tool_name: "frigate_snapshot",
          display_label: (window.spindrel.toolResult && window.spindrel.toolResult.filename) || "",
          bot_id: window.spindrel.botId,
          channel_id: window.spindrel.channelId,
          widget_config: { show_bbox: bboxBtn.getAttribute("aria-pressed") === "true" },
        }),
      })
      .then(function () {
        // Host extracts the fresh window.spindrel.toolResult from the returned
        // envelope and pushes it in via __setToolResult. Nothing else to do.
      })
      .catch(function (e) {
        setError("Refresh failed: " + (e && e.message));
      })
      .finally(function () {
        refreshBtn.disabled = false;
        refreshBtn.textContent = "Refresh";
      });
  }

  bboxBtn.addEventListener("click", function () {
    var next = bboxBtn.getAttribute("aria-pressed") !== "true";
    bboxBtn.setAttribute("aria-pressed", next ? "true" : "false");
    // Toggling bbox means the cached snapshot no longer matches the user's
    // choice; force a refresh with the new config.
    refresh();
  });
  refreshBtn.addEventListener("click", refresh);

  // Re-render whenever the host pushes a new tool result via
  // __setToolResult.
  window.addEventListener("spindrel:toolresult", function (ev) {
    render(ev.detail);
  });

  // Initial paint from the baked-in preamble.
  render(window.spindrel && window.spindrel.toolResult);
})();
</script>
