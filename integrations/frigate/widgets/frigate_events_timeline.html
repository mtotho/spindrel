<div class="sd-card" id="root">
  <header class="sd-card-header">
    <div class="sd-hstack sd-hstack-sm">
      <h3 class="sd-title">Frigate events</h3>
      <span class="sd-chip" id="count-chip">0</span>
    </div>
    <span class="sd-meta" id="range-meta"></span>
  </header>

  <div class="sd-hstack sd-hstack-sm" id="filter-bar">
    <span class="sd-subtitle">Labels</span>
    <div class="sd-hstack sd-hstack-sm" id="label-filters"></div>
    <div class="sd-spacer"></div>
    <button class="sd-btn sd-btn-subtle" id="refresh" type="button">Refresh</button>
  </div>

  <div class="sd-frame" id="timeline-frame">
    <svg id="timeline" width="100%" height="1" preserveAspectRatio="none"></svg>
  </div>

  <div class="sd-stack sd-stack-sm" id="detail-panel" hidden>
    <div class="sd-hstack sd-hstack-between">
      <div class="sd-hstack sd-hstack-sm">
        <span class="sd-chip" id="detail-label"></span>
        <span class="sd-meta" id="detail-camera"></span>
      </div>
      <button class="sd-btn sd-btn-subtle" id="detail-close" type="button">Close</button>
    </div>
    <div class="sd-meta" id="detail-time"></div>
    <div class="sd-meta" id="detail-extra"></div>
  </div>

  <div class="sd-empty" id="empty" hidden>No events in this window.</div>
  <div class="sd-error" id="err" hidden></div>
</div>
<script>
(function () {
  function getResult() {
    return (window.spindrel && (window.spindrel.result || window.spindrel.toolResult)) || null;
  }

  var countChip = document.getElementById("count-chip");
  var rangeMeta = document.getElementById("range-meta");
  var labelFilters = document.getElementById("label-filters");
  var refreshBtn = document.getElementById("refresh");
  var svg = document.getElementById("timeline");
  var frame = document.getElementById("timeline-frame");
  var empty = document.getElementById("empty");
  var errEl = document.getElementById("err");
  var detailPanel = document.getElementById("detail-panel");
  var detailLabel = document.getElementById("detail-label");
  var detailCamera = document.getElementById("detail-camera");
  var detailTime = document.getElementById("detail-time");
  var detailExtra = document.getElementById("detail-extra");
  var detailClose = document.getElementById("detail-close");

  var SVGNS = "http://www.w3.org/2000/svg";
  var LANE_H = 22;
  var LANE_GAP = 4;
  var AXIS_H = 18;
  var PAD_X = 8;

  // Local UI state — persists across state_poll refreshes because
  // srcDoc doesn't reload; only the widget data state is swapped.
  var activeLabels = Object.create(null);  // label -> true/false (false = hidden)
  var selectedEventId = null;

  function setError(msg) {
    if (!msg) { errEl.hidden = true; errEl.textContent = ""; return; }
    errEl.hidden = false;
    errEl.textContent = msg;
  }

  function formatClock(epochSec) {
    if (!epochSec) return "";
    return new Date(epochSec * 1000).toLocaleTimeString();
  }

  function formatRelative(epochSec) {
    if (!epochSec) return "";
    var secs = Math.max(0, Math.floor((Date.now() / 1000) - epochSec));
    if (secs < 60) return secs + "s ago";
    if (secs < 3600) return Math.floor(secs / 60) + "m ago";
    if (secs < 86400) return Math.floor(secs / 3600) + "h ago";
    return Math.floor(secs / 86400) + "d ago";
  }

  function formatDuration(startSec, endSec) {
    if (!startSec) return "";
    var end = endSec || (Date.now() / 1000);
    var dur = Math.max(0, end - startSec);
    if (dur < 60) return dur.toFixed(0) + "s";
    if (dur < 3600) return Math.floor(dur / 60) + "m " + Math.floor(dur % 60) + "s";
    return Math.floor(dur / 3600) + "h " + Math.floor((dur % 3600) / 60) + "m";
  }

  // Map Frigate labels to the theme color palette. Unknown labels fall
  // through to a neutral muted chip.
  var LABEL_CLASS = {
    person: "sd-chip-accent",
    car: "sd-chip-success",
    truck: "sd-chip-success",
    motorcycle: "sd-chip-success",
    dog: "sd-chip-warning",
    cat: "sd-chip-warning",
    bicycle: "sd-chip-purple",
  };
  function labelChipClass(label) {
    return LABEL_CLASS[label] || "sd-chip";
  }
  function labelColor(label) {
    var t = window.spindrel && window.spindrel.theme || {};
    switch (label) {
      case "person": return t.accent;
      case "car": case "truck": case "motorcycle": return t.success;
      case "dog": case "cat": return t.warning;
      case "bicycle": return t.purple;
      default: return t.textMuted;
    }
  }

  function uniqueCameras(events) {
    var seen = Object.create(null);
    var out = [];
    for (var i = 0; i < events.length; i++) {
      var cam = events[i].camera || "unknown";
      if (!seen[cam]) { seen[cam] = true; out.push(cam); }
    }
    return out.sort();
  }

  function uniqueLabels(events) {
    var seen = Object.create(null);
    for (var i = 0; i < events.length; i++) {
      var lab = events[i].label || "unknown";
      seen[lab] = true;
    }
    return Object.keys(seen).sort();
  }

  function renderFilterChips(labels) {
    labelFilters.innerHTML = "";
    if (!labels.length) return;
    labels.forEach(function (lab) {
      // Default: all labels visible unless explicitly hidden.
      var isVisible = activeLabels[lab] !== false;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "sd-btn " + labelChipClass(lab);
      btn.setAttribute("aria-pressed", isVisible ? "true" : "false");
      btn.textContent = lab;
      btn.style.opacity = isVisible ? "1" : "0.4";
      btn.addEventListener("click", function () {
        activeLabels[lab] = !isVisible;
        renderAll(lastData);
      });
      labelFilters.appendChild(btn);
    });
  }

  function selectEvent(ev) {
    selectedEventId = ev.id;
    detailLabel.textContent = ev.label || "event";
    detailLabel.className = "sd-chip " + labelChipClass(ev.label);
    detailCamera.textContent = ev.camera || "unknown camera";
    var bits = [
      formatClock(ev.start_time),
      formatDuration(ev.start_time, ev.end_time),
      (ev.score != null ? "score " + ev.score.toFixed(2) : ""),
    ].filter(Boolean);
    detailTime.textContent = bits.join(" · ");
    var extras = [];
    if (ev.sub_label) extras.push("sub_label: " + ev.sub_label);
    if (ev.license_plate) extras.push("plate: " + ev.license_plate);
    if (ev.zones && ev.zones.length) extras.push("zones: " + ev.zones.join(", "));
    if (ev.has_snapshot) extras.push("has snapshot");
    if (ev.has_clip) extras.push("has clip");
    detailExtra.textContent = extras.join(" · ");
    detailPanel.hidden = false;
    renderAll(lastData);  // re-stroke the selected pill
  }

  function clearSelection() {
    selectedEventId = null;
    detailPanel.hidden = true;
    renderAll(lastData);
  }

  detailClose.addEventListener("click", clearSelection);

  var lastData = null;

  function renderAll(data) {
    lastData = data;
    setError("");
    svg.innerHTML = "";

    if (data && data.error) {
      setError(data.error);
      empty.hidden = true;
      return;
    }

    var events = (data && data.events) || [];
    var allLabels = uniqueLabels(events);
    renderFilterChips(allLabels);

    var filtered = events.filter(function (ev) {
      return activeLabels[ev.label || "unknown"] !== false;
    });

    countChip.textContent = filtered.length + (events.length !== filtered.length ? " / " + events.length : "");

    if (!events.length) {
      empty.hidden = false;
      rangeMeta.textContent = "";
      svg.setAttribute("height", "1");
      return;
    }
    empty.hidden = true;

    var cams = uniqueCameras(events);
    if (!cams.length) { cams = ["unknown"]; }

    // Time window spans all events (not just filtered ones — so hiding a
    // label doesn't rescale the axis and lose spatial reference).
    var tMin = Infinity, tMax = -Infinity;
    for (var i = 0; i < events.length; i++) {
      var s = events[i].start_time;
      var e = events[i].end_time || s;
      if (s != null && s < tMin) tMin = s;
      if (e != null && e > tMax) tMax = e;
    }
    if (tMin === Infinity) {
      svg.setAttribute("height", "1");
      return;
    }
    // Pad window slightly and guarantee a minimum span (events happening
    // all at the same second shouldn't produce a degenerate axis).
    var span = Math.max(tMax - tMin, 1);
    var padSpan = span * 0.04;
    tMin -= padSpan;
    tMax += padSpan;
    span = tMax - tMin;

    rangeMeta.textContent = formatRelative(tMin) + " → " + formatRelative(tMax);

    var svgW = frame.clientWidth || 480;
    var contentW = Math.max(120, svgW - PAD_X * 2);
    var totalH = AXIS_H + cams.length * (LANE_H + LANE_GAP);

    svg.setAttribute("viewBox", "0 0 " + svgW + " " + totalH);
    svg.setAttribute("width", "100%");
    svg.setAttribute("height", totalH);

    var theme = (window.spindrel && window.spindrel.theme) || {};
    function timeToX(t) { return PAD_X + ((t - tMin) / span) * contentW; }

    // Lane backgrounds + camera labels
    cams.forEach(function (cam, idx) {
      var y = AXIS_H + idx * (LANE_H + LANE_GAP);
      var bg = document.createElementNS(SVGNS, "rect");
      bg.setAttribute("x", PAD_X);
      bg.setAttribute("y", y);
      bg.setAttribute("width", contentW);
      bg.setAttribute("height", LANE_H);
      bg.setAttribute("rx", 3);
      bg.setAttribute("fill", theme.surfaceOverlay || "#1e2029");
      svg.appendChild(bg);

      var label = document.createElementNS(SVGNS, "text");
      label.setAttribute("x", PAD_X + 6);
      label.setAttribute("y", y + LANE_H / 2 + 3);
      label.setAttribute("fill", theme.textMuted || "#999");
      label.setAttribute("font-size", "10");
      label.setAttribute("font-family", "var(--sd-font-sans)");
      label.setAttribute("pointer-events", "none");
      label.textContent = cam;
      svg.appendChild(label);
    });

    // Axis tick marks — ~4 evenly spaced labels across the span
    var tickCount = 4;
    for (var k = 0; k <= tickCount; k++) {
      var t = tMin + (span * k) / tickCount;
      var x = timeToX(t);
      var tick = document.createElementNS(SVGNS, "text");
      tick.setAttribute("x", x);
      tick.setAttribute("y", 11);
      tick.setAttribute("fill", theme.textDim || "#666");
      tick.setAttribute("font-size", "9");
      tick.setAttribute("text-anchor", k === 0 ? "start" : k === tickCount ? "end" : "middle");
      tick.setAttribute("font-family", "var(--sd-font-sans)");
      tick.textContent = formatClock(t);
      svg.appendChild(tick);
    }

    // Event pills
    filtered.forEach(function (ev) {
      var idx = cams.indexOf(ev.camera || "unknown");
      if (idx < 0) idx = 0;
      var y = AXIS_H + idx * (LANE_H + LANE_GAP) + 3;
      var h = LANE_H - 6;
      var s = ev.start_time || tMin;
      var e = ev.end_time || s + 2;
      var x1 = timeToX(s);
      var x2 = timeToX(e);
      var w = Math.max(4, x2 - x1);

      var pill = document.createElementNS(SVGNS, "rect");
      pill.setAttribute("x", x1);
      pill.setAttribute("y", y);
      pill.setAttribute("width", w);
      pill.setAttribute("height", h);
      pill.setAttribute("rx", 3);
      pill.setAttribute("fill", labelColor(ev.label));
      pill.setAttribute("fill-opacity", "0.75");
      if (ev.id === selectedEventId) {
        pill.setAttribute("stroke", theme.accent || "#3b82f6");
        pill.setAttribute("stroke-width", "2");
      }
      pill.style.cursor = "pointer";

      var title = document.createElementNS(SVGNS, "title");
      var titleBits = [
        ev.label || "event",
        ev.camera || "",
        formatClock(ev.start_time),
        (ev.score != null ? "score " + ev.score.toFixed(2) : ""),
      ].filter(Boolean);
      title.textContent = titleBits.join(" · ");
      pill.appendChild(title);

      pill.addEventListener("click", function () { selectEvent(ev); });
      svg.appendChild(pill);
    });
  }

  function refresh() {
    refreshBtn.disabled = true;
    refreshBtn.textContent = "Refreshing…";
    window.spindrel
      .api("/api/v1/widget-actions/refresh", {
        method: "POST",
        body: JSON.stringify({
          tool_name: "frigate_get_events",
          display_label: "",
          bot_id: window.spindrel.botId,
          channel_id: window.spindrel.channelId,
          widget_config: {},
        }),
      })
      .catch(function (e) {
        setError("Refresh failed: " + (e && e.message));
      })
      .finally(function () {
        refreshBtn.disabled = false;
        refreshBtn.textContent = "Refresh";
      });
  }

  refreshBtn.addEventListener("click", refresh);

  // Re-render on state_poll pushes — selection + filters persist because
  // srcDoc is not rebuilt.
  window.addEventListener("spindrel:toolresult", function (ev) {
    renderAll(getResult());
  });

  // Rescale SVG on iframe resize (dashboard pin size changes).
  window.addEventListener("resize", function () {
    if (lastData) renderAll(lastData);
  });

  // Initial paint from preamble.
  renderAll(getResult());
})();
</script>
