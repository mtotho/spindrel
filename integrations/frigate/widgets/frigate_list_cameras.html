<div class="sd-card" id="root">
  <header class="sd-card-header sd-hstack-between">
    <div class="sd-stack" style="gap: 0;">
      <h3 class="sd-title" id="title">Cameras</h3>
      <span class="sd-meta" id="summary"></span>
    </div>
    <div class="sd-hstack-sm">
      <button class="sd-btn sd-btn-subtle" id="bbox-toggle" aria-pressed="false" type="button" title="Overlay detection bounding boxes">Bounding boxes</button>
      <button class="sd-btn sd-btn-subtle" id="pause-toggle" aria-pressed="false" type="button" title="Pause live snapshot polling">⏸</button>
    </div>
  </header>
  <div class="sd-card-body">
    <div class="sd-error" id="err" hidden></div>
    <div id="grid" class="sd-grid" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: var(--sd-gap-sm);"></div>
    <div class="sd-empty" id="empty" hidden>No cameras configured.</div>
  </div>
</div>
<script>
(function () {
  var titleEl = document.getElementById("title");
  var summaryEl = document.getElementById("summary");
  var gridEl = document.getElementById("grid");
  var emptyEl = document.getElementById("empty");
  var errEl = document.getElementById("err");
  var bboxToggle = document.getElementById("bbox-toggle");
  var pauseToggle = document.getElementById("pause-toggle");

  var SNAPSHOT_INTERVAL_MS = 10000;
  var tilesByCamera = {};        // cameraName -> { tile, img, fetchInFlight, lastAttachmentUrl }
  var pollTimer = null;
  var paused = false;

  function setError(msg) {
    if (!msg) { errEl.hidden = true; errEl.textContent = ""; return; }
    errEl.hidden = false;
    errEl.textContent = msg;
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function openLightbox(imgUrl, camName) {
    var backdrop = document.createElement("div");
    backdrop.style.cssText = [
      "position: fixed", "inset: 0",
      "background: rgba(0,0,0,0.9)", "z-index: 9999",
      "display: flex", "flex-direction: column",
      "align-items: center", "justify-content: center",
      "padding: 24px", "cursor: zoom-out"
    ].join(";");
    var label = document.createElement("div");
    label.textContent = camName;
    label.style.cssText = "color: var(--sd-text); font-size: 16px; margin-bottom: 12px;";
    var img = document.createElement("img");
    img.src = imgUrl;
    img.alt = camName;
    img.style.cssText = "max-width: 100%; max-height: 82vh; border-radius: var(--sd-radius-md); object-fit: contain;";
    backdrop.appendChild(label);
    backdrop.appendChild(img);
    backdrop.addEventListener("click", function () { backdrop.remove(); });
    document.addEventListener("keydown", function onKey(ev) {
      if (ev.key === "Escape") { backdrop.remove(); document.removeEventListener("keydown", onKey); }
    });
    document.body.appendChild(backdrop);
  }

  function buildTile(cam) {
    var tile = document.createElement("div");
    tile.className = "sd-frame";
    tile.style.cssText = "aspect-ratio: 16/9; overflow: hidden; cursor: pointer; position: relative; background: var(--sd-surface-overlay);";
    var enabledChip = cam.enabled
      ? '<span class="sd-chip sd-chip-success" style="font-size: 10px;">live</span>'
      : '<span class="sd-chip sd-chip-warning" style="font-size: 10px;">disabled</span>';
    tile.innerHTML =
      '<div class="tile-img" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">' +
        '<div class="sd-spinner"></div>' +
      '</div>' +
      '<div class="sd-frame-overlay" style="position: absolute; bottom: 0; left: 0; right: 0; top: auto; ' +
           'background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); padding: 8px 10px; ' +
           'display: flex; justify-content: space-between; align-items: center; gap: 6px;">' +
        '<span style="color: white; font-size: 13px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.5);">' +
          escapeHtml(cam.name) +
        '</span>' +
        enabledChip +
      '</div>';
    return tile;
  }

  function renderCameras(data) {
    if (!data) { setError("No camera data"); return; }
    if (data.error) { setError(data.error); return; }
    setError("");

    var cameras = Array.isArray(data.cameras) ? data.cameras : [];
    titleEl.textContent = cameras.length === 1 ? "1 camera" : cameras.length + " cameras";
    var enabledCount = cameras.filter(function (c) { return c.enabled; }).length;
    summaryEl.textContent = enabledCount + " live · " + (cameras.length - enabledCount) + " disabled";

    if (!cameras.length) {
      emptyEl.hidden = false;
      gridEl.innerHTML = "";
      return;
    }
    emptyEl.hidden = true;

    // Prune removed cameras
    var seen = {};
    cameras.forEach(function (c) { seen[c.name] = true; });
    Object.keys(tilesByCamera).forEach(function (name) {
      if (!seen[name]) {
        var entry = tilesByCamera[name];
        if (entry && entry.tile && entry.tile.parentNode) entry.tile.parentNode.removeChild(entry.tile);
        delete tilesByCamera[name];
      }
    });

    // Add/update tiles
    cameras.forEach(function (cam) {
      var existing = tilesByCamera[cam.name];
      if (!existing) {
        var tile = buildTile(cam);
        gridEl.appendChild(tile);
        tilesByCamera[cam.name] = { tile: tile, img: null, fetchInFlight: false, lastAttachmentUrl: null, enabled: cam.enabled };
        tile.addEventListener("click", function () {
          var entry = tilesByCamera[cam.name];
          if (entry && entry.lastAttachmentUrl) openLightbox(entry.lastAttachmentUrl, cam.name);
        });
        if (cam.enabled) pollTile(cam.name);
      } else {
        existing.enabled = cam.enabled;
      }
    });
  }

  function pollTile(cameraName) {
    if (paused) return;
    var entry = tilesByCamera[cameraName];
    if (!entry || !entry.enabled || entry.fetchInFlight) return;
    entry.fetchInFlight = true;

    var body = {
      dispatch: "tool",
      tool: "frigate_snapshot",
      args: { camera: cameraName, bounding_box: bboxToggle.getAttribute("aria-pressed") === "true" },
      bot_id: window.spindrel.botId,
      channel_id: window.spindrel.channelId
    };
    window.spindrel
      .api("/api/v1/widget-actions", { method: "POST", body: JSON.stringify(body) })
      .then(function (resp) {
        var env = resp && resp.envelope;
        if (!env) return;
        // frigate_snapshot's envelope body is HTML (it has its own widget),
        // but the attachment_id lives in the tool_result JSON inside a
        // `window.spindrel.toolResult = {...}` preamble. Parse it out.
        var body = env.body || "";
        var m = body.match(/window\.spindrel\.toolResult\s*=\s*(\{[\s\S]*?\});/);
        if (!m) return;
        var data = JSON.parse(m[1].replace(/<\\\//g, "</"));
        if (!data || !data.attachment_id) return;
        var url = "/api/v1/attachments/" + encodeURIComponent(data.attachment_id) + "/file";
        if (url === entry.lastAttachmentUrl) return;
        return window.spindrel
          .apiFetch(url, { headers: { Accept: "image/*" } })
          .then(function (r) {
            if (!r || !r.ok) throw new Error("HTTP " + (r && r.status));
            return r.blob();
          })
          .then(function (blob) {
            var objUrl = URL.createObjectURL(blob);
            entry.lastAttachmentUrl = objUrl;
            var img = document.createElement("img");
            img.src = objUrl;
            img.alt = cameraName;
            img.style.cssText = "width: 100%; height: 100%; object-fit: cover; display: block;";
            var holder = entry.tile.querySelector(".tile-img");
            if (holder) { holder.innerHTML = ""; holder.appendChild(img); }
            if (entry.img && entry.img.src && entry.img.src.startsWith("blob:")) {
              try { URL.revokeObjectURL(entry.img.src); } catch (_) {}
            }
            entry.img = img;
          });
      })
      .catch(function (e) {
        var holder = entry.tile.querySelector(".tile-img");
        if (holder) {
          holder.innerHTML = '<div class="sd-empty" style="padding: 12px; font-size: 11px;">No snapshot</div>';
        }
        // Silent — per-tile errors are common (Frigate restart etc.)
        if (e && String(e.message).indexOf("configured") >= 0) setError(e.message);
      })
      .finally(function () { entry.fetchInFlight = false; });
  }

  function pollAll() {
    if (paused) return;
    Object.keys(tilesByCamera).forEach(function (name) { pollTile(name); });
  }

  function startPolling() {
    if (pollTimer) return;
    pollAll();
    pollTimer = setInterval(pollAll, SNAPSHOT_INTERVAL_MS);
  }

  function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  bboxToggle.addEventListener("click", function () {
    var next = bboxToggle.getAttribute("aria-pressed") !== "true";
    bboxToggle.setAttribute("aria-pressed", next ? "true" : "false");
    pollAll();
  });
  pauseToggle.addEventListener("click", function () {
    paused = !paused;
    pauseToggle.setAttribute("aria-pressed", paused ? "true" : "false");
    pauseToggle.textContent = paused ? "▶" : "⏸";
    pauseToggle.title = paused ? "Resume live snapshot polling" : "Pause live snapshot polling";
    if (paused) stopPolling(); else startPolling();
  });

  window.addEventListener("spindrel:toolresult", function (ev) { renderCameras(ev.detail); });
  renderCameras(window.spindrel && window.spindrel.toolResult);
  startPolling();
})();
</script>
