id: frigate
name: Frigate NVR
icon: Camera
description: Security camera monitoring with Frigate NVR -- live events, clip management, detection alerts, and camera status.
version: "1.0"

settings:
  - key: FRIGATE_URL
    type: string
    label: "Frigate NVR base URL (e.g. http://frigate:5000)"
    required: true
  - key: FRIGATE_API_KEY
    type: string
    label: "Bearer token for Frigate API auth"
    secret: true
  - key: FRIGATE_MAX_CLIP_BYTES
    type: string
    label: "Max clip download size (default 50MB)"
  - key: FRIGATE_MQTT_BROKER
    type: string
    label: "MQTT broker hostname for push events"
  - key: FRIGATE_MQTT_PORT
    type: string
    label: "MQTT broker port (default 1883)"
  - key: FRIGATE_MQTT_USERNAME
    type: string
    label: "MQTT auth username"
  - key: FRIGATE_MQTT_PASSWORD
    type: string
    label: "MQTT auth password"
    secret: true
  - key: FRIGATE_MQTT_TOPIC_PREFIX
    type: string
    label: "MQTT topic prefix (default: frigate)"
  - key: FRIGATE_MQTT_CAMERAS
    type: string
    label: "Global camera filter for MQTT listener (empty = all)"
  - key: FRIGATE_MQTT_LABELS
    type: string
    label: "Global label filter for MQTT listener (e.g. person,car)"
  - key: FRIGATE_MQTT_MIN_SCORE
    type: string
    label: "Global minimum detection score for MQTT listener (default 0.6)"
  - key: FRIGATE_MQTT_COOLDOWN
    type: string
    label: "Seconds between alerts for same camera+label (default 300)"
  - key: FRIGATE_WEBHOOK_TOKEN
    type: string
    label: "Bearer token for webhook authentication (optional)"
    secret: true

webhook:
  path: /integrations/frigate/webhook
  description: "Frigate event receiver (MQTT listener posts here for channel fan-out)"

events:
  - { type: object_detected, label: Object detected, description: "New object detection event from Frigate", category: webhook }

activation:
  requires_workspace: false
  description: "Security camera monitoring with Frigate NVR -- live events, clip management, detection alerts, and camera status"

binding:
  client_id_prefix: "frigate:"
  client_id_placeholder: "frigate:events"
  client_id_description: "Frigate event stream (typically frigate:events)"
  display_name_placeholder: "Frigate Events"
  config_fields:
    - key: cameras
      type: string
      label: Cameras
      description: "Comma-separated camera names (empty = all)"
      default: ""
    - key: labels
      type: string
      label: Labels
      description: "Comma-separated object labels (empty = all)"
      default: ""
    - key: min_score
      type: number
      label: Min Score
      description: "Minimum detection score (0-1)"
      default: 0.5

process:
  cmd: ["python", "integrations/frigate/mqtt_listener.py"]
  description: "Frigate MQTT event listener"
  required_env: ["FRIGATE_MQTT_BROKER"]
  watch_paths: ["integrations/frigate/"]

provides:
  - router
  - tools
  - skills

tool_families:
  frigate:
    label: Frigate NVR
    tools: [frigate_snapshot, frigate_get_events, frigate_list_cameras]

# Widget presets — guided binding flows exposed in the Presets tab of the
# widget builder. Each preset wraps one tool_widget below; the preset layer
# handles camera/label selection + default_config seeding, while the runtime
# (rendering on tool call / state_poll refresh) stays on tool_widgets.
widget_presets:
  frigate-camera:
    name: Camera Snapshot
    description: Live snapshot from one Frigate camera, auto-refreshing.
    icon: Camera
    layout_hints:
      preferred_zone: grid
      min_cells: {w: 4, h: 4}
    tool_name: frigate_snapshot
    tool_family: frigate
    tool_dependencies: [frigate_snapshot, frigate_list_cameras]
    binding_schema:
      type: object
      required: [camera]
      properties:
        camera:
          type: string
          title: Camera
          description: Pick a Frigate camera.
          ui:
            control: picker
            source: frigate.cameras
        show_bbox:
          type: boolean
          title: Show bounding boxes
          description: Overlay Frigate detection boxes on the snapshot.
          default: true
          ui:
            control: switch
    binding_sources:
      frigate.cameras:
        tool: frigate_list_cameras
        args: {}
        transform: "integrations.frigate.bindings:camera_options"
        params:
          enabled_only: true
    default_config:
      show_bbox: true
    runtime:
      # Tool args flow into the initial frigate_snapshot call for preview +
      # first render. state_poll then takes over with its own args template.
      tool_args:
        camera: "{{binding.camera}}"
        bounding_box: "{{binding.show_bbox}}"

  frigate-events:
    name: Events Timeline
    description: Detection events across cameras, grouped into per-camera lanes.
    icon: Activity
    layout_hints:
      preferred_zone: grid
      min_cells: {w: 6, h: 4}
    tool_name: frigate_get_events
    tool_family: frigate
    tool_dependencies: [frigate_get_events]
    binding_schema:
      type: object
      properties:
        camera:
          type: string
          title: Camera filter
          description: Limit the timeline to one camera (leave empty for all).
          ui:
            control: picker
            source: frigate.cameras
        label:
          type: string
          title: Object filter
          description: Limit the timeline to one object type (leave empty for all).
          ui:
            control: picker
            source: frigate.labels
        limit:
          type: integer
          title: Max events
          description: Cap on events returned per refresh.
          default: 40
          minimum: 1
          maximum: 200
    binding_sources:
      frigate.cameras:
        tool: frigate_list_cameras
        args: {}
        transform: "integrations.frigate.bindings:camera_options"
      frigate.labels:
        # label_options ignores its input — no upstream tool call needed,
        # but binding_sources requires a tool field. frigate_list_cameras
        # is cheap and already cached for the camera picker in most flows.
        tool: frigate_list_cameras
        args: {}
        transform: "integrations.frigate.bindings:label_options"
    default_config: {}
    runtime:
      tool_args:
        camera: "{{binding.camera}}"
        label: "{{binding.label}}"
        limit: "{{binding.limit}}"

  frigate-cameras-grid:
    name: Cameras Grid
    description: All Frigate cameras as a grid; click a tile to open its snapshot.
    icon: LayoutGrid
    layout_hints:
      preferred_zone: grid
      min_cells: {w: 6, h: 4}
    tool_name: frigate_list_cameras
    tool_family: frigate
    tool_dependencies: [frigate_list_cameras, frigate_snapshot]
    binding_schema:
      type: object
      properties:
        show_bbox:
          type: boolean
          title: Show bounding boxes on opened snapshots
          default: true
          ui:
            control: switch
    binding_sources: {}
    default_config:
      show_bbox: true
    runtime:
      tool_args: {}

# Tool widgets — YAML component templates using canonical primitives.
# See docs/widget-templates.md for the primitive reference.
tool_widgets:
  # Per-camera snapshot. Renders via the `image` v2 primitive with
  # auth: bearer (the attachment endpoint requires the viewer's token).
  # state_poll re-invokes frigate_snapshot every 60s; the bbox toggle
  # flips widget_config, which state_poll reads to request the next
  # frame with or without overlays.
  frigate_snapshot:
    content_type: application/vnd.spindrel.components+json
    display: inline
    # display_label resolves to the camera name so state_poll's
    # {{display_label}} substitution carries the right arg on auto-refresh.
    # The tool adds "camera" to its result dict for this purpose.
    display_label: "{{camera}}"
    default_config:
      show_bbox: true
    config_schema:
      type: object
      properties:
        show_bbox:
          type: boolean
          title: Show bounding boxes
          description: Overlay Frigate detection bounding boxes on the snapshot when available.
          default: true
    state_poll:
      tool: frigate_snapshot
      args:
        camera: "{{display_label}}"
        bounding_box: "{{widget_config.show_bbox}}"
      refresh_interval_seconds: 60
      # Same template as top-level — the component-mode state_poll requires
      # its own `template:` block. Changes to one must mirror into the other.
      template:
        v: 1
        components:
          - type: image
            url: "/api/v1/attachments/{{attachment_id}}/file"
            alt: "{{camera}} snapshot"
            aspect_ratio: "16 / 9"
            auth: bearer
            lightbox: true
    # Users flip bounding boxes via pin config (config_schema above) — no
    # inline toggle, since template `when:` lacks a negation operator and
    # adding both show/hide buttons would need a pre-substitution transform
    # that this tool widget doesn't otherwise need.
    template:
      v: 1
      components:
        - type: image
          url: "/api/v1/attachments/{{attachment_id}}/file"
          alt: "{{camera}} snapshot"
          aspect_ratio: "16 / 9"
          auth: bearer
          lightbox: true
    sample_payload:
      attachment_id: "00000000-0000-0000-0000-000000000000"
      filename: "driveway_snapshot.jpg"
      size_bytes: 84210
      camera: "driveway"

  # Events timeline. Two transforms cooperate:
  #   - Widget-level code transform `render_events_widget` builds the
  #     components list from raw tool data on initial render (coerces epoch
  #     floats → ISO 8601, maps labels → SemanticSlot colors, derives lanes
  #     from distinct cameras).
  #   - state_poll `events_view` returns the same reshape as a dict, which
  #     the state-poll template substitutes against.
  # Both paths share `_reshape_events` in widget_transforms.py so there's
  # one source of truth for the timeline shape.
  frigate_get_events:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "Frigate events"
    transform: "integrations.frigate.widget_transforms:render_events_widget"
    state_poll:
      tool: frigate_get_events
      args:
        limit: 40
      refresh_interval_seconds: 60
      transform: "integrations.frigate.widget_transforms:events_view"
      template:
        v: 1
        components:
          - type: status
            when: "{{error}}"
            text: "{{error}}"
            color: danger
          - type: status
            when: "{{has_events}}"
            text: "{{count}} events"
            color: info
          - type: timeline
            when: "{{has_events}}"
            lanes: "{{lanes}}"
            events: "{{events}}"
            on_event_click:
              dispatch: widget_config
              value_key: selected_event
            selected_event_id: "{{widget_config.selected_event}}"
          - type: text
            when: "{{has_events | not}}"
            content: "No events in this window."
            style: muted
    # Top-level template is a placeholder — the widget-level `transform:`
    # rebuilds components from raw data on initial render.
    template:
      v: 1
      components: []
    sample_payload:
      events:
        - id: "1713607200.123-abc"
          camera: "driveway"
          label: "person"
          score: 0.91
          start_time: 1713607200.5
          end_time: 1713607212.3
          zones: ["walkway"]
          has_snapshot: true
          has_clip: true
        - id: "1713607260.456-def"
          camera: "backyard"
          label: "dog"
          score: 0.82
          start_time: 1713607260.0
          end_time: 1713607268.0
          zones: []
          has_snapshot: true
          has_clip: false
        - id: "1713607300.789-ghi"
          camera: "driveway"
          label: "car"
          score: 0.97
          start_time: 1713607300.0
          end_time: 1713607340.0
          zones: ["driveway"]
          has_snapshot: true
          has_clip: true
          license_plate: "ABC 1234"
      count: 3

  # Cameras grid. Pre-tiles-v2 this was an HTML widget that polled
  # frigate_snapshot per-tile every 10s for live thumbnails. The port
  # drops that — the grid is a drill-down index now (tile click opens
  # the per-camera snapshot widget), and users who want a live wall
  # pin N frigate_snapshot widgets on a dashboard.
  frigate_list_cameras:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "Frigate cameras"
    default_config:
      show_bbox: true
    config_schema:
      type: object
      properties:
        show_bbox:
          type: boolean
          title: Show bounding boxes
          description: >
            Pass through bounding-box overlays when a tile is clicked to open
            a snapshot. Individual snapshot pins have their own show_bbox.
          default: true
    transform: "integrations.frigate.widget_transforms:render_cameras_widget"
    state_poll:
      tool: frigate_list_cameras
      args: {}
      refresh_interval_seconds: 300
      transform: "integrations.frigate.widget_transforms:cameras_view"
      template:
        v: 1
        components:
          - type: status
            when: "{{error}}"
            text: "{{error}}"
            color: danger
          - type: status
            when: "{{has_cameras}}"
            text: "{{summary}}"
            color: info
          - type: tiles
            when: "{{has_cameras}}"
            min_width: 220
            items: "{{tiles}}"
          - type: text
            when: "{{has_cameras | not}}"
            content: "No cameras configured."
            style: muted
    # Top-level template is a placeholder — the widget-level `transform:`
    # rebuilds components from raw data on initial render (same pattern as
    # frigate_get_events).
    template:
      v: 1
      components: []
    sample_payload:
      cameras:
        - name: "driveway"
          enabled: true
          width: 1920
          height: 1080
          fps: 5
          snapshot_url: "http://frigate:5000/api/driveway/latest.jpg"
        - name: "backyard"
          enabled: true
          width: 2560
          height: 1440
          fps: 5
          snapshot_url: "http://frigate:5000/api/backyard/latest.jpg"
        - name: "front_porch"
          enabled: true
          width: 1920
          height: 1080
          fps: 5
          snapshot_url: "http://frigate:5000/api/front_porch/latest.jpg"
        - name: "garage"
          enabled: false
          width: 1920
          height: 1080
          fps: 5
          snapshot_url: "http://frigate:5000/api/garage/latest.jpg"
