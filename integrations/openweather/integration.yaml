id: openweather
name: OpenWeather
icon: CloudSun
description: >-
  Current weather, hourly and daily forecasts, and government severe-weather
  alerts via OpenWeatherMap One Call 3.0. Accepts city names, US zip codes, or
  "City, State/Country" strings.
version: "1.0"

settings:
  - key: OPENWEATHERMAP_API_KEY
    type: string
    label: API Key
    secret: true
    required: true
    description: "OpenWeatherMap One Call 3.0 API key (free tier works)"
  - key: POLL_INTERVAL_MINUTES
    type: string
    label: Pinned widget refresh interval (minutes)
    description: "How often pinned weather widgets re-poll the API. Default 60."

provides:
  - tools

# Shared component tree — reused for the initial tool call and for state_poll
# refreshes. Both render the same raw get_weather JSON, so a single template
# keeps them byte-identical.
_weather_template: &weather_template
  v: 1
  components:
    - type: heading
      text: "{{location}}"
      level: 3
    # Error path
    - type: status
      when: "{{error | not_empty}}"
      text: "{{error}}"
      color: danger
    # Current conditions — big temp + description
    - type: heading
      when: "{{current.temperature | not_empty}}"
      text: "{{current.temperature}} · {{current.conditions}}"
      level: 2
    - type: properties
      layout: inline
      when: "{{current.temperature | not_empty}}"
      items:
        - label: Feels like
          value: "{{current.feels_like}}"
        - label: Humidity
          value: "{{current.humidity}}"
        - label: Wind
          value: "{{current.wind_speed}}"
        - label: Gust
          value: "{{current.wind_gust}}"
          when: "{{current.wind_gust | not_empty}}"
        - label: UV
          value: "{{current.uv_index}}"
          when: "{{current.uv_index | not_empty}}"
        - label: Clouds
          value: "{{current.cloud_cover}}"
          when: "{{current.cloud_cover | not_empty}}"
    # Severe-weather alerts
    - type: section
      label: "Active alerts"
      collapsible: true
      defaultOpen: true
      when: "{{alerts | not_empty}}"
      children:
        - type: table
          columns: ["Event", "Sender", "Start", "End"]
          compact: true
          rows:
            each: "{{alerts}}"
            template: ["{{_.event}}", "{{_.sender}}", "{{_.start}}", "{{_.end}}"]
    # Daily forecast — tiles that fit as many days per row as the panel allows.
    # Gated on config.show_forecast so the state_poll args also include_daily
    # match; when off, daily_forecast isn't in the API response and this hides.
    - type: tiles
      min_width: 84
      gap: 6
      when: "{{daily_forecast | not_empty}}"
      items:
        each: "{{daily_forecast}}"
        template:
          label: "{{_.date}}"
          value: "{{_.temp_max}}"
          caption: "{{_.conditions}}"
    # Subtle config toggles — two buttons, one per state; `when` picks the right
    # one. Invisible until the pinned widget card is hovered.
    - type: button
      label: "Show forecast"
      subtle: true
      when: "{{config.show_forecast | not}}"
      action:
        dispatch: widget_config
        config:
          show_forecast: true
    - type: button
      label: "Hide forecast"
      subtle: true
      when: "{{config.show_forecast | not_empty}}"
      action:
        dispatch: widget_config
        config:
          show_forecast: false

# Rich widget for get_weather results. Pinned widgets re-poll by recalling
# get_weather with the resolved location and config-driven flags.
tool_widgets:
  get_weather:
    content_type: application/vnd.spindrel.components+json
    display: inline
    display_label: "{{location}}"
    default_config:
      show_forecast: false
    state_poll:
      tool: get_weather
      # {{display_label}} resolves the location; {{config.show_forecast}}
      # follows the user's toggled preference and is re-substituted on each poll.
      args:
        location: "{{display_label}}"
        include_daily: "{{config.show_forecast}}"
      refresh_interval_seconds: 3600
      template: *weather_template
    template: *weather_template
