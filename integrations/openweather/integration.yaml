id: openweather
name: OpenWeather
icon: CloudSun
description: >-
  Current weather, hourly and daily forecasts, and government severe-weather
  alerts via OpenWeatherMap One Call 3.0. Accepts city names, US zip codes, or
  "City, State/Country" strings.
version: "1.0"

settings:
  - key: OPENWEATHERMAP_API_KEY
    type: string
    label: API Key
    secret: true
    required: true
    description: "OpenWeatherMap One Call 3.0 API key (free tier works)"
  - key: POLL_INTERVAL_MINUTES
    type: string
    label: Pinned widget refresh interval (minutes)
    description: "How often pinned weather widgets re-poll the API. Default 60."

provides:
  - tools

# Rich HTML widget for get_weather — SVG hourly chart, daily forecast tiles,
# alerts banner. Pinned widgets re-poll hourly with the resolved location,
# keeping `include_daily` / `include_hourly` on so the chart has full data.
tool_widgets:
  get_weather:
    content_type: application/vnd.spindrel.html+interactive
    display: inline
    display_label: "{{location}}"
    html_template:
      path: widgets/get_weather.html
    default_config:
      units: "imperial"
      show_feels_like: false
    state_poll:
      tool: get_weather
      args:
        location: "{{display_label}}"
        units: "{{config.units}}"
        include_daily: true
        include_hourly: true
      refresh_interval_seconds: 3600
    sample_payload:
      location: "Lambertville, NJ, US"
      units: "imperial"
      timezone: "America/New_York"
      current:
        conditions: "partly cloudy"
        icon: "03d"
        temperature: "68°F"
        feels_like: "66°F"
        humidity: "58%"
        wind_speed: "6 mph"
        wind_gust: "9 mph"
        uv_index: 4
        cloud_cover: "40%"
        visibility_m: 10000
      daily_forecast:
        - date: "Sat 04/19"
          summary: "Clearing skies late"
          conditions: "partly cloudy"
          temp_min: "52°F"
          temp_max: "71°F"
          temp_range: "52–71°F"
          precip_probability: "10%"
          humidity: "55%"
          wind_speed: 6.1
          uv_index: 4
        - date: "Sun 04/20"
          summary: "Mostly sunny"
          conditions: "sunny"
          temp_min: "55°F"
          temp_max: "74°F"
          temp_range: "55–74°F"
          precip_probability: "5%"
          humidity: "48%"
          wind_speed: 5.0
          uv_index: 6
        - date: "Mon 04/21"
          summary: "Afternoon showers"
          conditions: "light rain"
          temp_min: "58°F"
          temp_max: "70°F"
          temp_range: "58–70°F"
          precip_probability: "65%"
          humidity: "78%"
          wind_speed: 7.2
          uv_index: 3
      hourly_forecast:
        - { time: "14:00", conditions: "partly cloudy", temperature: "68°F", feels_like: "66°F", precip_probability: "10%" }
        - { time: "15:00", conditions: "partly cloudy", temperature: "69°F", feels_like: "67°F", precip_probability: "10%" }
        - { time: "16:00", conditions: "sunny",         temperature: "70°F", feels_like: "68°F", precip_probability: "5%"  }
        - { time: "17:00", conditions: "sunny",         temperature: "70°F", feels_like: "68°F", precip_probability: "5%"  }
        - { time: "18:00", conditions: "partly cloudy", temperature: "68°F", feels_like: "66°F", precip_probability: "10%" }
        - { time: "19:00", conditions: "partly cloudy", temperature: "65°F", feels_like: "63°F", precip_probability: "15%" }
        - { time: "20:00", conditions: "light rain",    temperature: "62°F", feels_like: "60°F", precip_probability: "50%" }
        - { time: "21:00", conditions: "light rain",    temperature: "60°F", feels_like: "58°F", precip_probability: "60%" }
        - { time: "22:00", conditions: "light rain",    temperature: "59°F", feels_like: "57°F", precip_probability: "45%" }
        - { time: "23:00", conditions: "cloudy",        temperature: "58°F", feels_like: "56°F", precip_probability: "20%" }
        - { time: "00:00", conditions: "cloudy",        temperature: "57°F", feels_like: "55°F", precip_probability: "10%" }
        - { time: "01:00", conditions: "cloudy",        temperature: "56°F", feels_like: "54°F", precip_probability: "10%" }
      alerts: []
