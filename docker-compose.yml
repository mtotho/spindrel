name: "agent-server"
services:
  agent-server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - FASTEMBED_CACHE_DIR=/app/.fastembed-cache
    volumes:
      - ./bots:/app/bots
      - ./skills:/app/skills
      - ./tools:/app/tools
      # MCP servers are managed via Admin UI.
      # Uncomment to seed from mcp.yaml on first boot (file must exist on host):
      # - ./mcp.yaml:/app/mcp.yaml:ro
      # External integrations (uncomment and adjust path):
      # - /path/to/my-integrations:/app/ext-integrations:ro
      - /var/run/docker.sock:/var/run/docker.sock        # sibling container management
      - ${WORKSPACE_HOST_DIR:-~/.agent-workspaces}:/workspace-data  # workspace files
      - fastembed-cache:/app/.fastembed-cache  # local embedding model cache
      # Config state auto-export: uncomment after first run creates the file
      # (bind-mounting a non-existent file makes Docker create a directory)
      # - ./config-state.json:/app/config-state.json
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agentdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  searxng:
    image: searxng/searxng
    profiles: [web-search]
    ports:
      - "8080:8080"
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped

  playwright:
    image: ghcr.io/browserless/chromium
    profiles: [web-search]
    ports:
      - "3000:3000"
    environment:
      - TIMEOUT=60000
      - CONCURRENT=5
    restart: unless-stopped

  ui:
    build: ./ui
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  pgdata:
  fastembed-cache:
