server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — cache aggressively (hashed filenames)
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Client-side routing — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
