server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent wrong-port redirects when running behind port mapping (e.g. 8081:80)
    absolute_redirect off;

    # Static assets — cache aggressively (hashed filenames)
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Client-side routing — serve index.html for all non-file routes
    location / {
        try_files $uri /index.html;
    }

    # Prevent browsers from caching index.html — it references hashed bundles
    # that change on each build, so stale HTML → 404 on JS/CSS assets.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
