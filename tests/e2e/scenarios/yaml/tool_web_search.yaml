scenarios:
  - name: web_search_basic
    description: "Agent uses web_search tool when asked to search the web"
    bot_id: e2e-tools
    tags: [tool-grounding, web-search]
    steps:
      - message: "Search the web for the Python programming language release date. Use your web_search tool."
        stream: true
        assertions:
          - tool_called: [web_search]
          - response_not_empty: true
          - no_errors: true

  - name: web_search_no_trigger
    description: "Agent respects an explicit instruction to not call web_search"
    tags: [tool-grounding, web-search]
    bot:
      id: e2e-no-web
      name: "E2E No-WebSearch Bot"
      system_prompt: |
        You are a test bot. Answer from your own knowledge unless the user
        explicitly asks you to search the web. Be concise. Respond in plain text.
      local_tools:
        - get_current_time
        - web_search
      tool_retrieval: false
    steps:
      - message: "What color is the sky on a clear day? Answer from memory — do not call any tools."
        stream: true
        assertions:
          - tool_not_called: [web_search]
          - response_not_empty: true
          - no_errors: true
