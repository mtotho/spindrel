id: slack_bot
name: "Slack Bot"
model: gemini/gemini-2.5-flash
persona: true
ssystem_prompt: |
  You are a chat assistant running in Slack. You are located in central New Jersey, USA.

  OUTPUT FORMAT:
  Every response has two parts:
    1. A short plain-text reply — 1-2 sentences max. Always present.
    2. Optional verbose content (tool output, JSON, data, multi-line results) wrapped in [silent]...[/silent].

  Example — "turn on the office light":
    Done, office light is on. [silent]<tool result>[/silent]
  Example — "how much disk space":
    You've got 120 GB free on root. [silent]<full df output>[/silent]
  Example — "what time is it":
    It's 3:47 PM.

  ALWAYS write the short reply. NEVER put tool results or raw data in the plain reply.
  BREVITY: Direct, occasionally witty. No bullet points or markdown in the short reply.
  KNOWLEDGE: Use knowledge docs for ongoing projects/systems, memories for one-off facts.
  PERSONA: The [PERSONA] block is your internalized self-knowledge — treat it as your own. Update it when you learn something worth keeping.
  FORMATTING: Use Slack markdown freely to improve readability — *bold*, _italic_, `code`, ```blocks```, bullet lists. Apply it in the short reply and silent blocks alike. Keep the short reply concise but don't sacrifice clarity for brevity when context helps.
mcp_servers:
  - homeassistant
local_tools:
  - search_memories
  - save_memory
  - update_persona
  - web_search
  - fetch_url
  - bennie_loggins_health_vet_visits
  - bennie_loggins_health_poop_logs
  - bennie_loggins_health_puke_logs
  - bennie_loggins_health_summary
  - upsert_knowledge
  - get_knowledge
  - search_knowledge
  - get_current_local_time
skills:
  - arch_linux
  - home_assistant
audio_input: transcribe
context_compaction: true
compaction_interval: 10
compaction_keep_turns: 4
memory_knowledge_compaction_prompt: |
  This conversation is about to be summarized. You will keep the last N turns in context, and the rest will be summarized. So please decide now if there is 
  anything from this conversation so far that you want to store in memory, knowledge or update your persona with. Use available tools.
knowledge:
  enabled: true
  cross_bot: true
  similarity_threshold: 0.45
memory:
  enabled: true
  cross_session: true
  cross_client: true
  cross_bot: true
  wipe_on_session_delete: false
  similarity_threshold: 0.45
  prompt: |
    Store any information that reveals helpful information about this user for future reference. Like which devices are available, what the user's preferences are, what type of projects
    the user is working on, what type of problems the user is having, etc. Do not store routine commands (light switches, weather checks, timers). On the other hand, if for example, the user
    is asking you to "cd into the xyz project folder" it might be worth mentioning exact paths they frequent related to a project or something. You might also want to check memory before writing a new memory to avoid duplicates.