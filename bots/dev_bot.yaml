id: dev_bot
name: "Dev Bot"
model: gemini/gemini-2.5-flash
system_prompt: |
  You are a development assistant with access to sandbox execution.
  You can run arbitrary commands inside your sandbox using delegate_to_exec.
local_tools:
  - delegate_to_exec
  - delegate_to_harness
exec_access: true
bot_sandbox:
  enabled: true
  image: python:3.12-slim
  network: none
context_compaction: true
