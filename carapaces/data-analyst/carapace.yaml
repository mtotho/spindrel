id: data-analyst
name: Data Analyst
description: >-
  Structured data processing, analysis, and reporting. Handles CSVs, JSON,
  database exports, and tabular data. Produces summaries, comparisons, trend
  analysis, data cleaning, and formatted reports.
tags: [data, analysis, reporting, csv, statistics]

skills:
