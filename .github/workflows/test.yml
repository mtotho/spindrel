name: Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Build test image
        run: docker build -f Dockerfile.test -t agent-test .
      - name: Run tests
        run: docker run --rm agent-test

  ui-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install UI dependencies
        working-directory: ui
        run: npm ci
      - name: Typecheck
        working-directory: ui
        run: npx tsc --noEmit

  dep-audit:
    runs-on: ubuntu-latest
    # Surfaces known CVEs in pinned dependencies. Non-blocking: advisories
    # are visible in the run summary but don't gate merges, since fixes
    # often require coordinated upgrades that shouldn't stall feature work.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: pip-audit (requirements.lock)
        run: pip-audit -r requirements.lock --strict --disable-pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: npm audit (production)
        working-directory: ui
        run: npm audit --omit=dev --audit-level=high
