name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.2.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Resolve version from tag
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.tag.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/mtotho/spindrel:${{ steps.version.outputs.version }}
            ghcr.io/mtotho/spindrel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Resolve version from tag
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.tag.outputs.ref }}

      - name: Compose release body
        id: body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.ref }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          manual=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if (index($0, "[" ver "]")) { in_section = 1; next }
            }
            in_section && /^\[[^]]+\]:[[:space:]]/ { exit }
            in_section { print }
          ' CHANGELOG.md)

          if [ -z "${manual// }" ]; then
            manual="_No high-level summary provided in CHANGELOG.md for this release._"
          fi

          auto_notes=$(gh api -X POST \
            "repos/$REPO/releases/generate-notes" \
            -f tag_name="$TAG" \
            --jq .body || echo "")

          {
            echo "body<<RELEASE_BODY_EOF"
            echo "$manual"
            echo ""
            if [ -n "$auto_notes" ]; then
              echo "---"
              echo ""
              echo "<details><summary>Detailed changes (auto-generated from merged PRs)</summary>"
              echo ""
              echo "$auto_notes"
              echo ""
              echo "</details>"
              echo ""
            fi
            echo "**Container image:** \`ghcr.io/mtotho/spindrel:$VERSION\`"
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.ref, '-') }}
          make_latest: ${{ !contains(steps.tag.outputs.ref, '-') && 'true' || 'false' }}
