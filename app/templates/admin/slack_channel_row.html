{% set row_id = "slack-row-" ~ channel_id %}
<tr class="border-b border-gray-700 hover:bg-gray-750" id="{{ row_id }}">
  <td class="px-5 py-2.5">
    <span class="font-mono text-xs text-gray-300">{{ channel_id }}</span>
    {% if channel_name %}
    <span class="ml-2 text-xs text-gray-500">#{{ channel_name }}</span>
    {% endif %}
  </td>
  <td class="px-5 py-2.5">
    {% if cfg %}
    <span class="text-indigo-400 text-xs font-mono">{{ cfg.bot_id }}</span>
    {% if cfg.description %}
    <span class="ml-2 text-xs text-gray-500 italic">{{ cfg.description }}</span>
    {% endif %}
    {% else %}
    <span class="text-gray-500 text-xs italic">{{ default_bot }} (default)</span>
    {% endif %}
  </td>
  <td class="px-5 py-2.5 text-right flex items-center justify-end gap-3">
    {% if cfg %}
    <button
      hx-delete="/admin/slack/channels/{{ cfg.id }}"
      hx-confirm="Remove mapping for {{ channel_id }}?"
      hx-target="closest tr"
      hx-swap="outerHTML"
      class="text-xs text-red-400 hover:text-red-300">Remove</button>
    {% endif %}
    <button
      hx-get="/admin/slack/channels/{{ channel_id }}/edit-form"
      hx-target="#slack-edit-{{ channel_id }} td"
      hx-swap="innerHTML"
      class="text-xs text-indigo-400 hover:text-indigo-300">
      {% if cfg %}Edit{% else %}Assign{% endif %}
    </button>
  </td>
</tr>
<tr id="slack-edit-{{ channel_id }}"><td colspan="3" class="p-0"></td></tr>
