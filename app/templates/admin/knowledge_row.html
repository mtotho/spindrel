<tr id="knowledge-row-{{ entry.id }}">
  <td class="px-4 py-3">
    <div class="font-medium text-gray-200">{{ entry.name }}</div>
    <div class="text-xs text-gray-500 mt-0.5 truncate max-w-xs">{{ entry.content[:100] }}{% if entry.content|length > 100 %}…{% endif %}</div>
  </td>
  <td class="px-4 py-3 text-gray-400 text-xs">{{ entry.bot_id or '(shared)' }}</td>
  <td class="px-4 py-3 text-gray-400 text-xs font-mono">{{ entry.client_id or '(shared)' }}</td>
  <td class="px-4 py-3 text-gray-400 text-xs">{{ entry.updated_at | fmt_dt }}</td>
  <td class="px-4 py-3">
    <div class="flex items-center gap-2">
      <button
        hx-get="/admin/knowledge/{{ entry.id }}/edit"
        hx-target="#knowledge-edit-{{ entry.id }}"
        hx-swap="innerHTML"
        class="text-xs text-indigo-400 hover:text-indigo-300">Quick edit</button>
      <a href="/admin/knowledge/{{ entry.id }}/edit-full"
         class="text-xs text-indigo-300 hover:text-indigo-100">Full editor</a>
      <button
        hx-delete="/admin/knowledge/{{ entry.id }}"
        hx-target="#knowledge-row-{{ entry.id }}"
        hx-swap="outerHTML"
        hx-confirm="Delete '{{ entry.name }}'?"
        class="text-xs text-red-400 hover:text-red-300">Delete</button>
    </div>
  </td>
</tr>
<tr id="knowledge-edit-{{ entry.id }}"></tr>
