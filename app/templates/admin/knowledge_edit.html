<td colspan="5" class="px-4 py-4 bg-gray-900">
  <form
    hx-put="/admin/knowledge/{{ entry.id }}"
    hx-target="#knowledge-row-{{ entry.id }}"
    hx-swap="outerHTML"
    class="space-y-3">
    <div>
      <label class="text-xs text-gray-400 block mb-1">Name: <span class="text-gray-200 font-medium">{{ entry.name }}</span></label>
    </div>
    <div>
      <label class="text-xs text-gray-400 block mb-1">Content</label>
      <textarea name="content" rows="8"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 resize-y font-mono">{{ entry.content }}</textarea>
    </div>
    <div class="flex justify-end gap-3">
      <button type="button"
        hx-get=""
        onclick="document.getElementById('knowledge-edit-{{ entry.id }}').innerHTML=''"
        class="px-4 py-1.5 text-sm text-gray-400 hover:text-gray-200">Cancel</button>
      <button type="submit"
        class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-1.5 text-sm">Save &amp; Re-embed</button>
    </div>
  </form>
</td>
