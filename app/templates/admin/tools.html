{% extends "admin/_base.html" %}
{% block title %}Tools{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">Tool Embeddings</h1>
  <button
    hx-post="/admin/tools/reindex"
    hx-target="#tools-table-body"
    hx-swap="innerHTML"
    hx-indicator="#reindex-spinner"
    class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-2 text-sm flex items-center gap-2">
    <span id="reindex-spinner" class="htmx-indicator">⟳</span>
    Re-index All
  </button>
</div>

<div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-gray-700 text-gray-400 text-xs uppercase tracking-wider">
        <th class="px-4 py-3 text-left">Tool</th>
        <th class="px-4 py-3 text-left">Type / Server</th>
        <th class="px-4 py-3 text-left">Source</th>
        <th class="px-4 py-3 text-left">Indexed At</th>
      </tr>
    </thead>
    <tbody id="tools-table-body" class="divide-y divide-gray-700">
      {% include "admin/tools_table.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
