<div class="p-4 bg-gray-900 space-y-3">
  <div class="flex items-center gap-3 text-xs text-gray-400">
    <span class="font-mono text-gray-300">{{ idx.root }}</span>
    <span class="px-1.5 py-0.5 rounded
      {% if idx.scope == 'global' %}bg-purple-900 text-purple-300
      {% elif idx.scope == 'channel' %}bg-blue-900 text-blue-300
      {% elif idx.scope == 'bot' %}bg-indigo-900 text-indigo-300
      {% else %}bg-gray-700 text-gray-400{% endif %}">{{ idx.scope }}</span>
    {% if idx.bot_id %}
    <span class="text-gray-500">bot: {{ idx.bot_id }}</span>
    {% endif %}
    {% if idx.client_id %}
    <span class="text-gray-500">channel: {{ idx.client_id }}</span>
    {% endif %}
  </div>

  <form hx-post="/admin/filesystem/save-edit"
        hx-target="#fs-edit-{{ idx.row_key }} td"
        hx-swap="innerHTML"
        class="space-y-3">
    <input type="hidden" name="root" value="{{ idx.root }}" />
    <input type="hidden" name="bot_id" value="{{ idx.bot_id or '' }}" />
    <input type="hidden" name="client_id" value="{{ idx.client_id or '' }}" />

    <div>
      <label class="text-xs text-gray-400 block mb-1">
        Patterns <span class="text-gray-500">(one glob per line)</span>
      </label>
      <textarea name="patterns" rows="4"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200 focus:outline-none focus:border-indigo-500 resize-y font-mono">{{ idx.patterns | join('\n') }}</textarea>
    </div>

    <div class="flex items-center gap-6">
      <div>
        <label class="text-xs text-gray-400 block mb-1">Cooldown (seconds)</label>
        <input type="number" name="cooldown_seconds" value="{{ idx.cooldown_seconds }}" min="0"
          class="w-24 bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-200 focus:outline-none focus:border-indigo-500" />
      </div>
      <div class="flex items-center gap-2 mt-4">
        <input type="checkbox" name="watch" id="watch-{{ idx.row_key }}"
          {% if idx.watch %}checked{% endif %}
          class="rounded border-gray-600 bg-gray-800 text-indigo-500 focus:ring-indigo-500" />
        <label for="watch-{{ idx.row_key }}" class="text-sm text-gray-300">Watch for file changes</label>
      </div>
    </div>

    <div class="flex justify-end gap-3">
      <button type="button"
        onclick="document.querySelector('#fs-edit-{{ idx.row_key }} td').innerHTML = ''"
        class="px-4 py-1.5 text-sm text-gray-400 hover:text-gray-200">Cancel</button>
      <button type="submit"
        class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-1.5 text-sm">
        Save &amp; Re-index
      </button>
    </div>
  </form>
</div>
