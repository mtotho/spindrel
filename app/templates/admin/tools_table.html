{% for tool in tools %}
<tr class="hover:bg-gray-750">
  <td class="px-4 py-3">
    <div class="font-mono text-indigo-300 text-sm">{{ tool.tool_name }}</div>
    <div class="text-xs text-gray-500 mt-0.5 truncate max-w-xs">{{ tool.schema_.get('function', {}).get('description', '') }}</div>
  </td>
  <td class="px-4 py-3 text-xs">
    {% if tool.server_name %}
    <span class="bg-purple-900/50 text-purple-300 px-2 py-0.5 rounded font-mono">mcp: {{ tool.server_name }}</span>
    {% else %}
    <span class="bg-indigo-900/50 text-indigo-300 px-2 py-0.5 rounded">local</span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-xs text-gray-500 font-mono truncate max-w-xs">{{ tool.source_dir or '—' }}</td>
  <td class="px-4 py-3 text-xs text-gray-400">{{ tool.indexed_at | fmt_dt }}</td>
</tr>
{% else %}
<tr><td colspan="4" class="px-4 py-6 text-gray-500 text-center">No tools indexed.</td></tr>
{% endfor %}
