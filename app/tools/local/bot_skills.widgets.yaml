# Widget template for manage_bot_skill (list action only).
# Only renders when the result contains a "skills" key (list action).
# Write/create/delete actions don't have this key — all components are
# guarded by when: so nothing renders and it falls back to badge.

manage_bot_skill:
  content_type: application/vnd.spindrel.components+json
  display: inline
  template:
    v: 1
    components:
      - type: heading
        text: "Bot Skills ({{total}})"
        level: 3
        when: "{{skills}}"
      - type: table
        columns: ["Skill", "Category", "Surfaced"]
        rows:
          each: "{{skills}}"
          template: ["{{_.name}}", "{{_.category | default: —}}", "{{_.surface_count | default: 0}}"]
        compact: true
        when: "{{skills | not_empty}}"
