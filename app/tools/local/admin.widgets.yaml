# Widget template for get_system_status

get_system_status:
  content_type: application/vnd.spindrel.components+json
  display: inline
  template:
    v: 1
    components:
      - type: heading
        text: System Status
        level: 3
      - type: status
        text: "{{bots | count}} bots · {{channels | count}} channels · {{integrations | count}} integrations"
        color: success
        when: "{{bots | not_empty}}"
      - type: status
        text: Fresh install
        color: warning
        when: "{{is_fresh_install}}"
      - type: section
        label: "Bots"
        collapsible: true
        defaultOpen: true
        when: "{{bots | not_empty}}"
        children:
          - type: table
            columns: ["Name", "Model"]
            rows:
              each: "{{bots}}"
              template: ["{{_.name | default: _.id}}", "{{_.model | default: —}}"]
            compact: true
      - type: section
        label: "Integrations"
        collapsible: true
        defaultOpen: true
        when: "{{integrations | not_empty}}"
        children:
          - type: table
            columns: ["Integration", "Status"]
            rows:
              each: "{{integrations}}"
              template: ["{{_.id}}", "{{_.status | default: —}}"]
            compact: true
      - type: section
        label: "Channels"
        collapsible: true
        defaultOpen: false
        when: "{{channels | not_empty}}"
        children:
          - type: table
            columns: ["Channel", "Bot"]
            rows:
              each: "{{channels}}"
              template: ["{{_.name}}", "{{_.bot_id | default: —}}"]
            compact: true
      - type: section
        label: Config
        collapsible: true
        defaultOpen: false
        children:
          - type: properties
            layout: inline
            items:
              - label: Timezone
                value: "{{config.timezone | default: —}}"
              - label: Embedding model
                value: "{{config.embedding_model | default: —}}"
