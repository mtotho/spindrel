<!--

name: MC Timeline
description: Chronological feed of Mission Control events — shares data with MC Kanban and MC Tasks on the same dashboard.
display_label: Timeline
version: 1.0.0
author: spindrel
tags: [mission-control, timeline, spindrel-sdk, suite]
icon: clock
suite_id: mission-control
---
-->
<style>
  #mct-root .mct-list { max-height: 420px; overflow-y: auto; }
  #mct-root .mct-row { padding: 8px 0; border-top: 1px solid var(--sd-border-subtle); }
  #mct-root .mct-row:first-child { border-top: none; }
  #mct-root .mct-title { font-weight: 600; font-size: 13px; }
  #mct-root .mct-body { font-size: 12px; color: var(--sd-text-muted); white-space: pre-wrap; margin-top: 2px; }
  #mct-root .mct-meta { font-size: 11px; color: var(--sd-text-muted); margin-top: 2px; display: flex; justify-content: space-between; gap: 8px; }
  #mct-root .mct-badge { text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; color: var(--sd-text-muted); }
  #mct-root .mct-empty { padding: 16px 0; text-align: center; color: var(--sd-text-muted); font-size: 12px; }
  #mct-root .mct-input { display: flex; gap: 6px; }
  #mct-root .mct-input input { flex: 1; }
</style>
<div class="sd-card" id="mct-root">
  <header class="sd-card-header sd-hstack-between">
    <div class="sd-stack" style="gap: 0;">
      <h3 class="sd-title">Timeline</h3>
      <span class="sd-meta" id="mct-sub">Mission Control feed</span>
    </div>
    <span class="sd-chip" id="mct-count">0</span>
  </header>
  <div class="sd-card-body sd-stack">
    <form class="mct-input" id="mct-form">
      <input type="text" class="sd-input" id="mct-title" placeholder="What happened?" maxlength="200" required />
      <button type="submit" class="sd-btn sd-btn-primary" id="mct-submit">Add</button>
    </form>
    <div class="mct-list" id="mct-list">
      <div class="mct-empty" id="mct-empty">No events yet. Add one above, or move a card in Kanban.</div>
    </div>
  </div>
</div>
<script>
(function () {
  const sp = window.spindrel;
  const listEl = document.getElementById("mct-list");
  const emptyEl = document.getElementById("mct-empty");
  const countEl = document.getElementById("mct-count");
  const formEl = document.getElementById("mct-form");
  const titleEl = document.getElementById("mct-title");
  const submitEl = document.getElementById("mct-submit");

  function fmtWhen(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString();
  }

  function esc(s) {
    return String(s || "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function render(rows) {
    countEl.textContent = String(rows.length);
    if (rows.length === 0) {
      emptyEl.hidden = false;
      // Clear any previous rows.
      Array.from(listEl.querySelectorAll(".mct-row")).forEach((n) => n.remove());
      return;
    }
    emptyEl.hidden = true;
    const html = rows.map((r) => {
      const badge = r.source_kind ? `<span class="mct-badge">${esc(r.source_kind)}</span>` : "";
      const body = r.body ? `<div class="mct-body">${esc(r.body)}</div>` : "";
      return `
        <div class="mct-row" data-id="${esc(r.id)}">
          <div class="mct-title">${esc(r.title)}</div>
          ${body}
          <div class="mct-meta">
            <span>${esc(fmtWhen(r.created_at))}</span>
            ${badge}
          </div>
        </div>
      `;
    }).join("");
    // Replace existing row nodes.
    Array.from(listEl.querySelectorAll(".mct-row")).forEach((n) => n.remove());
    const frag = document.createElement("div");
    frag.innerHTML = html;
    while (frag.firstChild) listEl.appendChild(frag.firstChild);
  }

  async function loadAndRender() {
    const rows = await sp.db.query(
      "SELECT id, title, body, source_kind, created_at FROM items "
      + "WHERE kind = 'timeline_event' "
      + "ORDER BY datetime(created_at) DESC LIMIT 100",
    );
    render(rows);
  }

  formEl.addEventListener("submit", async (e) => {
    e.preventDefault();
    const title = titleEl.value.trim();
    if (!title) return;
    submitEl.disabled = true;
    try {
      await sp.callHandler("add_event", { title });
      titleEl.value = "";
    } catch (err) {
      sp.notify("error", "Add failed: " + (err && err.message));
    } finally {
      submitEl.disabled = false;
    }
  });

  sp.autoReload(loadAndRender);
})();
</script>
