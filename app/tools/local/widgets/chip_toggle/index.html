name: Chip — Toggle
display_label: Toggle
description: Reference chip widget — 180×32 label + on/off switch backed by spindrel.state so the chip remembers its position across reloads.
version: 1.0.0
author: spindrel
tags: [chip, reference, spindrel-sdk]
icon: toggle-right
---
-->
<style>
  #chip-toggle-root { display: flex; align-items: center; gap: 8px; font: 12px/1 system-ui, sans-serif; color: var(--sd-text); cursor: pointer; user-select: none; }
  #chip-toggle-root[data-layout="chip"] { height: 32px; padding: 0 10px; }
  #chip-toggle-root:not([data-layout="chip"]) { padding: 10px 12px; gap: 12px; }
  .ct-label { font-weight: 500; white-space: nowrap; }
  .ct-switch { width: 28px; height: 16px; border-radius: 999px; background: var(--sd-surface-border, #3f3f46); position: relative; transition: background 120ms ease; flex-shrink: 0; }
  .ct-switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 999px; background: #fff; transition: transform 120ms ease; }
  .ct-switch[data-on="true"] { background: var(--sd-accent, #6366f1); }
  .ct-switch[data-on="true"]::after { transform: translateX(12px); }
</style>
<div id="chip-toggle-root" role="switch" aria-checked="false" tabindex="0">
  <span class="ct-label" id="ct-label">Notifications</span>
  <span class="ct-switch" id="ct-switch" data-on="false" aria-hidden="true"></span>
</div>
<script>
(function () {
  const sp = window.spindrel;
  const root = document.getElementById("chip-toggle-root");
  root.dataset.layout = sp && sp.layout ? sp.layout : "grid";

  const sw = document.getElementById("ct-switch");
  let on = false;

  function render() {
    sw.dataset.on = String(on);
    root.setAttribute("aria-checked", String(on));
  }

  async function load() {
    if (!sp || !sp.state) return;
    try {
      const s = await sp.state.load();
      on = !!(s && s.on);
      render();
    } catch (_) { /* first load — state is empty */ }
  }

  async function toggle() {
    on = !on;
    render();
    // Persist through state.save so the chip's position survives reload.
    // Dashboard pins with dashboardPinId get pin-scoped storage; inline
    // chat renders get an ephemeral per-iframe store.
    if (sp && sp.state) {
      try { await sp.state.save({ on }); } catch (_) {}
    }
  }

  root.addEventListener("click", toggle);
  root.addEventListener("keydown", (e) => {
    if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggle(); }
  });
  load();
})();
</script>
