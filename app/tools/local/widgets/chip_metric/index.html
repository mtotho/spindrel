<style>
  #chip-metric-root { display: flex; align-items: center; gap: 8px; font: 12px/1 system-ui, sans-serif; color: var(--sd-text); }
  #chip-metric-root[data-layout="chip"] { height: 32px; padding: 0 10px; }
  #chip-metric-root:not([data-layout="chip"]) { padding: 10px 12px; gap: 12px; }
  .cm-label { font-size: 11px; color: var(--sd-text-muted); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  .cm-value { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .cm-delta { font-size: 11px; font-variant-numeric: tabular-nums; color: var(--sd-text-muted); }
  .cm-delta.up { color: var(--sd-success, #22c55e); }
  .cm-delta.down { color: var(--sd-danger, #ef4444); }
</style>
<div id="chip-metric-root">
  <span class="cm-label" id="cm-label">Unread</span>
  <span class="cm-value" id="cm-value">—</span>
  <span class="cm-delta" id="cm-delta"></span>
</div>
<script>
(function () {
  const sp = window.spindrel;
  const root = document.getElementById("chip-metric-root");
  root.dataset.layout = sp && sp.layout ? sp.layout : "grid";

  const valueEl = document.getElementById("cm-value");
  const deltaEl = document.getElementById("cm-delta");

  // Demo: fake a value + delta. Real widgets would read from state,
  // a cron-refreshed handler, or a streamed subscription.
  function setMetric(value, delta) {
    valueEl.textContent = String(value);
    if (delta == null) { deltaEl.textContent = ""; deltaEl.className = "cm-delta"; return; }
    const sign = delta > 0 ? "+" : "";
    deltaEl.textContent = sign + delta;
    deltaEl.className = "cm-delta " + (delta > 0 ? "up" : delta < 0 ? "down" : "");
  }
  setMetric(12, 3);
})();
</script>
