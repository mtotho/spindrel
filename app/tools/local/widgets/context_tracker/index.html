<!--

name: Context Tracker
description: Live channel context snapshot — window fill gauge, per-category breakdown, and turn activity from the channel event bus
display_label: Context tracker
version: 1.1.0
author: spindrel
tags: [observability, context, live, spindrel-sdk]
icon: gauge
---
-->
<style>
  #ctx-root { font: inherit; }
  #ctx-root .ctx-bots { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 4px 10px; align-items: center; font-size: var(--sd-font-size-sm); }
  #ctx-root .ctx-bots .ctx-bot-util { font-variant-numeric: tabular-nums; color: var(--sd-text-muted); }
  #ctx-root .ctx-bots .ctx-bot-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #ctx-root .ctx-activity li { display: grid; grid-template-columns: 60px 1fr auto; gap: 8px; font-size: var(--sd-font-size-sm); padding: 2px 0; border-bottom: 1px dashed var(--sd-surface-border); }
  #ctx-root .ctx-activity li:last-child { border-bottom: none; }
  #ctx-root .ctx-activity .ctx-act-time { color: var(--sd-text-muted); font-variant-numeric: tabular-nums; }
  #ctx-root .ctx-activity .ctx-act-meta { color: var(--sd-text-muted); font-variant-numeric: tabular-nums; }
  #ctx-root .ctx-activity ul { list-style: none; padding: 0; margin: 0; }
  #ctx-root .ctx-status { display: inline-flex; align-items: center; gap: 6px; }
  #ctx-root .ctx-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sd-text-muted); }
  #ctx-root .ctx-dot-live { background: var(--sd-success); box-shadow: 0 0 0 0 var(--sd-success); animation: ctx-pulse 1.6s ease-out infinite; }
  #ctx-root .ctx-dot-tool { background: var(--sd-warning); }
  #ctx-root .ctx-dot-err  { background: var(--sd-danger); }
  @keyframes ctx-pulse { 0% { box-shadow: 0 0 0 0 rgba(0,180,0,0.35); } 100% { box-shadow: 0 0 0 6px rgba(0,180,0,0); } }
  #ctx-root .ctx-pct { font-variant-numeric: tabular-nums; font-weight: 600; }
  #ctx-root .ctx-spark-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--sd-text-muted); font-variant-numeric: tabular-nums; margin-top: 2px; }
  #ctx-root .ctx-spark-host { min-height: 36px; }
  #ctx-root .ctx-warn { background: color-mix(in srgb, var(--sd-warning-subtle) 60%, transparent 40%); border: 1px solid var(--sd-warning-border); color: var(--sd-text); padding: 10px 12px; border-radius: var(--sd-radius-md); font-size: var(--sd-font-size-sm); }
</style>
<div class="sd-card" id="ctx-root">
  <header class="sd-card-header sd-hstack-between">
    <div class="sd-stack" style="gap: 0;">
      <h3 class="sd-title">Context tracker</h3>
      <span class="sd-meta ctx-status">
        <span class="ctx-dot" id="ctx-dot"></span>
        <span id="ctx-status-label">idle</span>
      </span>
    </div>
    <span class="sd-chip" id="ctx-model" title="Model">—</span>
  </header>
  <div class="sd-card-body sd-stack">
    <section class="sd-section">
      <div class="sd-hstack-between" style="align-items: baseline; margin-bottom: 4px;">
        <span class="sd-label">Window fill</span>
        <span class="ctx-pct" id="ctx-util-pct">—</span>
      </div>
      <div class="sd-progress" id="ctx-bar" style="--p: 0"></div>
      <div class="sd-hstack-between" style="margin-top: 4px;">
        <span class="sd-meta" id="ctx-tokens">—</span>
        <span class="sd-meta" id="ctx-session">—</span>
      </div>
      <div class="ctx-spark-host" id="ctx-spark" style="margin-top: 6px;"></div>
      <div class="ctx-spark-meta" id="ctx-spark-meta" hidden>
        <span>oldest</span>
        <span id="ctx-spark-range">—</span>
        <span>now</span>
      </div>
    </section>

    <section class="sd-section">
      <div class="sd-section__header">
        <h4 class="sd-label">Breakdown</h4>
      </div>
      <div id="ctx-breakdown"></div>
    </section>

    <section class="sd-section">
      <div class="sd-section__header">
        <h4 class="sd-label">Recent turns</h4>
      </div>
      <div id="ctx-activity"></div>
    </section>
  </div>
</div>
<script>
(function () {
  const sp = window.spindrel;
  const root = document.getElementById("ctx-root");
  const dot = document.getElementById("ctx-dot");
  const statusEl = document.getElementById("ctx-status-label");
  const modelEl = document.getElementById("ctx-model");
  const pctEl = document.getElementById("ctx-util-pct");
  const barEl = document.getElementById("ctx-bar");
  const tokensEl = document.getElementById("ctx-tokens");
  const sessionEl = document.getElementById("ctx-session");
  const breakdownEl = document.getElementById("ctx-breakdown");
  const activityEl = document.getElementById("ctx-activity");

  if (!sp.channelId) {
    sp.ui.status(root, "empty", {
      message: "Bind this widget to a channel dashboard to see live context usage.",
    });
    return;
  }

  // Per-turn running state for the status dot + activity list (live overlay).
  const turns = new Map();
  // Recent activity — newest first, cap 8.
  const activity = [];
  // Utilization sparkline series — oldest → newest, cap 20.
  const util = [];
  const UTIL_CAP = 20;

  let pollTimer = null;
  let pollInFlight = false;
  let pollingDisabled = false;
  const POLL_MS = 15_000;
  const sessionId = typeof sp.sessionId === "string" && sp.sessionId ? sp.sessionId : null;

  function scopedApiPath(path) {
    if (!sessionId) return path;
    const url = new URL(path, window.location.origin);
    url.searchParams.set("session_id", sessionId);
    return url.pathname + url.search;
  }

  const fmtPct = (u) => (u == null ? "—" : (u * 100).toFixed(0) + "%");
  const fmtTokens = (c, t) => (c || 0).toLocaleString() + " / " + (t || 0).toLocaleString();
  const fmtChars = (c) => {
    const n = Number(c || 0);
    if (Math.abs(n) >= 1000) return (n / 1000).toFixed(1) + "k";
    return String(n);
  };

  function setStatus(label, tone) {
    statusEl.textContent = label;
    dot.className = "ctx-dot";
    if (tone === "live") dot.classList.add("ctx-dot-live");
    else if (tone === "tool") dot.classList.add("ctx-dot-tool");
    else if (tone === "err") dot.classList.add("ctx-dot-err");
  }

  function barToneClass(u) {
    if (u >= 0.9) return "sd-progress-danger";
    if (u >= 0.75) return "sd-progress-warning";
    return "";
  }

  function renderGauge(budget) {
    const u = Math.max(0, Math.min(1, budget && typeof budget.utilization === "number" ? budget.utilization : 0));
    pctEl.textContent = fmtPct(budget && budget.utilization);
    barEl.style.setProperty("--p", String(Math.round(u * 100)));
    barEl.className = "sd-progress " + barToneClass(u);
    tokensEl.textContent = budget && budget.total_tokens
      ? fmtTokens(budget.consumed_tokens, budget.total_tokens)
      : "no turns yet";
    sessionEl.textContent = sessionId
      ? "session " + sessionId.slice(0, 8)
      : "active session";
  }

  const sparkEl = document.getElementById("ctx-spark");
  const sparkMetaEl = document.getElementById("ctx-spark-meta");
  const sparkRangeEl = document.getElementById("ctx-spark-range");

  function pushUtil(u) {
    if (u == null || Number.isNaN(u)) return;
    util.push(Math.max(0, Math.min(1, u)));
    if (util.length > UTIL_CAP) util.splice(0, util.length - UTIL_CAP);
    renderSpark();
  }

  function renderSpark() {
    if (util.length < 2) {
      sparkEl.innerHTML = "";
      sparkMetaEl.hidden = true;
      return;
    }
    sp.ui.chart(sparkEl, util, {
      type: "area",
      height: 36,
      min: 0,
      max: 1,
      strokeWidth: 1.5,
      label: "Window fill over last " + util.length + " snapshots",
    });
    sparkMetaEl.hidden = false;
    sparkRangeEl.textContent = util.length + " pts · " + fmtPct(util[util.length - 1]);
  }

  function renderBreakdown(breakdown) {
    if (!breakdown || !Array.isArray(breakdown.categories) || breakdown.categories.length === 0) {
      sp.ui.status(breakdownEl, "empty", { message: "No categories reported." });
      return;
    }
    const total = breakdown.total_chars || 0;
    const frag = document.createElement("div");
    frag.className = "ctx-bots";
    for (const cat of breakdown.categories) {
      const pct = total > 0 ? (cat.chars / total) : 0;
      const name = document.createElement("span");
      name.className = "ctx-bot-name";
      name.textContent = cat.label || cat.key;
      name.title = cat.description || cat.key;
      const chars = document.createElement("span");
      chars.className = "ctx-bot-util";
      chars.textContent = fmtChars(cat.chars);
      const share = document.createElement("span");
      share.className = "ctx-pct";
      share.textContent = (pct * 100).toFixed(0) + "%";
      if (pct >= 0.5) share.style.color = "var(--sd-warning)";
      frag.appendChild(name);
      frag.appendChild(chars);
      frag.appendChild(share);
    }
    breakdownEl.innerHTML = "";
    breakdownEl.appendChild(frag);
  }

  function renderActivity() {
    if (!activity.length) {
      sp.ui.status(activityEl, "empty", { message: "No turns yet." });
      return;
    }
    const ul = document.createElement("ul");
    for (const a of activity) {
      const li = document.createElement("li");
      const t = document.createElement("span"); t.className = "ctx-act-time"; t.textContent = new Date(a.ts).toLocaleTimeString();
      const body = document.createElement("span"); body.textContent = a.label;
      const meta = document.createElement("span"); meta.className = "ctx-act-meta"; meta.textContent = a.meta || "";
      li.appendChild(t); li.appendChild(body); li.appendChild(meta);
      ul.appendChild(li);
    }
    activityEl.innerHTML = "";
    activityEl.className = "ctx-activity";
    activityEl.appendChild(ul);
  }

  function pushActivity(label, meta) {
    activity.unshift({ ts: Date.now(), label, meta: meta || "" });
    if (activity.length > 8) activity.length = 8;
    renderActivity();
  }

  function showScopeWarning(message) {
    pollingDisabled = true;
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    breakdownEl.innerHTML = "";
    const warn = document.createElement("div");
    warn.className = "ctx-warn";
    warn.textContent = message;
    breakdownEl.appendChild(warn);
  }

  async function pollOnce() {
    if (pollInFlight || pollingDisabled) return;
    pollInFlight = true;
    try {
      const [budget, breakdown] = await Promise.all([
        sp.api(scopedApiPath("/api/v1/channels/" + encodeURIComponent(sp.channelId) + "/context-budget")),
        sp.api(scopedApiPath("/api/v1/channels/" + encodeURIComponent(sp.channelId) + "/context-breakdown")),
      ]);
      renderGauge(budget);
      if (budget && typeof budget.utilization === "number") pushUtil(budget.utilization);
      renderBreakdown(breakdown);
      if (!sessionId && breakdown && breakdown.bot_id) {
        sessionEl.textContent = breakdown.bot_id;
      }
    } catch (err) {
      const msg = String(err && err.message || err);
      if (msg.indexOf("API 403") === 0) {
        showScopeWarning(
          "This bot is missing the `channels:read` scope. Grant it under Admin → Bots → Permissions, then reload.",
        );
      } else if (msg.indexOf("API 404") === 0) {
        // Active session may not exist yet — benign, retry on next tick.
      } else {
        setStatus("error", "err");
      }
    } finally {
      pollInFlight = false;
    }
  }

  function startPolling() {
    if (pollingDisabled) return;
    pollOnce();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollOnce, POLL_MS);
  }
  function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") stopPolling();
    else startPolling();
  });

  // Kick off steady-state render immediately — do not wait for a turn to fire.
  startPolling();
  renderActivity();

  // Live overlay: turn events drive the status dot + recent-turns list; a
  // `context_budget` event triggers an immediate refetch so the gauge stays
  // consistent with the server-computed snapshot (rather than maintaining a
  // parallel in-widget derivation).
  sp.stream(
    ["context_budget", "turn_started", "turn_ended", "turn_stream_tool_start"],
    (event) => {
      const p = event.payload || {};
      if (event.kind === "context_budget") {
        if (p.model) modelEl.textContent = p.model;
        pollOnce();
        return;
      }
      if (event.kind === "turn_started") {
        const tid = p.turn_id;
        if (tid) turns.set(tid, { bot_id: p.bot_id, started: Date.now() });
        setStatus((p.bot_id || "bot") + " thinking…", "live");
        pushActivity("▶ " + (p.bot_id || "bot") + " started", p.reason || "");
        return;
      }
      if (event.kind === "turn_stream_tool_start") {
        setStatus((p.bot_id || "bot") + " · " + (p.tool_name || "tool"), "tool");
        return;
      }
      if (event.kind === "turn_ended") {
        const tid = p.turn_id;
        const started = turns.get(tid);
        turns.delete(tid);
        const elapsed = started ? ((Date.now() - started.started) / 1000).toFixed(1) + "s" : "";
        const ok = !p.error;
        setStatus("idle", ok ? "" : "err");
        pushActivity(
          (ok ? "■ " : "✕ ") + (p.bot_id || "bot") + (ok ? " finished" : " failed"),
          elapsed,
        );
        // Refetch after turn end so the breakdown reflects the new state
        // (compaction may have fired, new messages landed, etc.).
        pollOnce();
        return;
      }
    },
  );
})();
</script>
