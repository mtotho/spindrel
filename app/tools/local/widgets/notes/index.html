<style>
  #notes-root {
    display: flex;
    flex-direction: column;
    min-height: 100%;
    gap: var(--sd-gap-md);
  }
  #notes-root .notes-header-copy { gap: 2px; }
  #notes-root .notes-header-copy .sd-meta { max-width: 28ch; }
  #notes-root .notes-shell {
    display: flex;
    flex-direction: column;
    gap: var(--sd-gap-md);
    min-height: 0;
  }
  #notes-root .notes-body {
    min-height: 120px;
  }
  #notes-root .notes-rendered { font-size: 13px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; color: var(--sd-text); }
  #notes-root .notes-rendered.empty { color: var(--sd-text-muted); font-style: normal; }
  #notes-root .notes-rendered > :first-child { margin-top: 0; }
  #notes-root .notes-rendered > :last-child { margin-bottom: 0; }
  #notes-root .notes-chip { font-variant-numeric: tabular-nums; white-space: nowrap; }
  #notes-root .notes-chip svg { opacity: 0.8; }
  #notes-root .notes-edit {
    padding: 0;
  }
  #notes-root .notes-edit-header {
    display: flex;
    justify-content: space-between;
    gap: var(--sd-gap-md);
    align-items: flex-start;
  }
  #notes-root .notes-edit-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #notes-root .notes-meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--sd-gap-sm);
    font-size: var(--sd-font-size-sm);
    color: var(--sd-text-muted);
    flex-wrap: wrap;
  }
  #notes-root .notes-meta-actions { display: inline-flex; gap: var(--sd-gap-xs); }
  #notes-root .notes-footer {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: var(--sd-gap-sm);
  }
  #notes-root .notes-footer-main {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--sd-gap-xs);
  }
  #notes-root .notes-empty-cta {
    display: inline-flex;
    margin-top: var(--sd-gap-md);
  }
  #notes-root .sd-textarea {
    min-height: 160px;
    max-height: 320px;
    font-size: 13px;
    line-height: 1.6;
  }
  #notes-root .notes-shortcut {
    white-space: nowrap;
  }
</style>
<div class="sd-card" id="notes-root">
  <header class="sd-card-header">
    <div class="sd-stack notes-header-copy">
      <h3 class="sd-title">Notes</h3>
      <span class="sd-meta" id="notes-sub">Pinned-channel scratchpad</span>
    </div>
    <span class="sd-tag notes-chip" id="notes-version" title="state.json schema version">
      <svg class="sd-icon sd-icon--sm"><use href="#sd-icon-pencil"/></svg>
      v—
    </span>
  </header>
  <div class="sd-card-body notes-shell">
    <div class="notes-body" id="notes-body">
      <div class="notes-rendered empty" id="notes-rendered">Loading…</div>
    </div>
    <div class="notes-edit sd-stack sd-stack-sm" id="notes-edit" hidden>
      <div class="notes-edit-header">
        <div class="notes-edit-copy">
          <span class="sd-subtitle">Editing</span>
          <span class="sd-meta">Markdown supported. Save to switch back to the rendered view.</span>
        </div>
      </div>
      <textarea
        id="notes-textarea"
        class="sd-textarea"
        placeholder="Write in markdown — supports **bold**, *italic*, `code`, lists, headings."
      ></textarea>
      <div class="notes-footer">
        <div class="notes-footer-main">
          <span id="notes-meta-updated">—</span>
          <span class="sd-kbd notes-shortcut">⌘/Ctrl+Enter</span>
          <span class="sd-meta">save</span>
        </div>
        <span class="notes-meta-actions">
          <button type="button" class="sd-btn sd-btn-subtle" id="notes-cancel">Cancel</button>
          <button type="button" class="sd-btn sd-btn-primary" id="notes-save">Save</button>
        </span>
      </div>
    </div>
    <div class="notes-meta-row" id="notes-display-meta">
      <div class="notes-footer-main">
        <span id="notes-meta-summary">—</span>
        <span class="sd-meta" id="notes-created-meta">Created —</span>
      </div>
      <div class="notes-meta-actions">
        <button type="button" class="sd-btn sd-btn-subtle" id="notes-copy-btn">
          <svg class="sd-icon sd-icon--sm"><use href="#sd-icon-copy"/></svg>
          Copy
        </button>
        <button type="button" class="sd-btn" id="notes-edit-btn">
          <svg class="sd-icon sd-icon--sm"><use href="#sd-icon-pencil"/></svg>
          Edit note
        </button>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  const sp = window.spindrel;
  const root = document.getElementById("notes-root");
  const renderedEl = document.getElementById("notes-rendered");
  const subEl = document.getElementById("notes-sub");
  const versionEl = document.getElementById("notes-version");
  const editEl = document.getElementById("notes-edit");
  const textareaEl = document.getElementById("notes-textarea");
  const editBtn = document.getElementById("notes-edit-btn");
  const saveBtn = document.getElementById("notes-save");
  const cancelBtn = document.getElementById("notes-cancel");
  const displayMeta = document.getElementById("notes-display-meta");
  const updatedMeta = document.getElementById("notes-meta-updated");
  const summaryMeta = document.getElementById("notes-meta-summary");
  const createdMeta = document.getElementById("notes-created-meta");
  const copyBtn = document.getElementById("notes-copy-btn");

  if (!sp.channelId) {
    sp.ui.status(root, "empty", { message: "Pin this widget on a channel to write notes." });
    return;
  }

  // Schema history (showcase — the file could live at v1 before upgrade):
  //   v1: { text: string }
  //   v2: { markdown: string, createdAt: number, updatedAt: number }
  // The declared bundle version is 2; files written under v1 get migrated.
  const STATE_PATH = "./state.json";
  const SPEC = {
    schema_version: 2,
    defaults: { markdown: "", createdAt: 0, updatedAt: 0 },
    migrations: [
      {
        from: 1,
        to: 2,
        apply: (s) => ({
          markdown: s.text || "",
          createdAt: s.createdAt || Date.now(),
          updatedAt: Date.now(),
        }),
      },
    ],
  };

  let current = { markdown: "", createdAt: 0, updatedAt: 0 };

  function fmtWhen(ts) {
    if (!ts) return "never";
    const d = new Date(ts);
    return d.toLocaleString();
  }

  function render() {
    const md = current.markdown || "";
    if (!md.trim()) {
      renderedEl.innerHTML =
        '<div class="sd-empty">' +
          '<svg class="sd-icon sd-icon--xl sd-empty__icon"><use href="#sd-icon-pencil"/></svg>' +
          '<div class="sd-empty__title">No notes yet</div>' +
          '<div class="sd-empty__subtitle">Use this pinned scratchpad for quick context, reminders, or handoff notes.</div>' +
          '<div class="sd-empty__cta notes-empty-cta">' +
            '<button type="button" class="sd-btn sd-btn-primary" id="notes-empty-edit">' +
              '<svg class="sd-icon sd-icon--sm"><use href="#sd-icon-pencil"/></svg>' +
              'Start writing' +
            '</button>' +
          '</div>' +
        '</div>';
      renderedEl.classList.add("empty");
      const emptyEditBtn = document.getElementById("notes-empty-edit");
      if (emptyEditBtn) emptyEditBtn.addEventListener("click", enterEdit);
    } else {
      renderedEl.classList.remove("empty");
      renderedEl.innerHTML = "";
      renderedEl.className = "notes-rendered";
      const fragHost = document.createElement("div");
      fragHost.innerHTML = sp.renderMarkdown(md);
      renderedEl.appendChild(fragHost);
    }
    summaryMeta.textContent = "Updated " + fmtWhen(current.updatedAt);
    createdMeta.textContent = "Created " + fmtWhen(current.createdAt);
    versionEl.textContent = "v" + (current.__schema_version__ || 2);
    copyBtn.disabled = !md.trim();
  }

  let autogrowTeardown = null;
  function enterEdit() {
    textareaEl.value = current.markdown || "";
    updatedMeta.textContent = current.updatedAt
      ? "Last saved " + fmtWhen(current.updatedAt)
      : "Unsaved";
    editEl.hidden = false;
    displayMeta.hidden = true;
    textareaEl.focus();
    if (!autogrowTeardown && sp.ui && sp.ui.autogrow) {
      autogrowTeardown = sp.ui.autogrow(textareaEl, { maxHeight: 320 });
    }
  }

  function exitEdit(ev) {
    if (ev) {
      ev.preventDefault();
      ev.stopPropagation();
    }
    textareaEl.value = current.markdown || "";
    editEl.hidden = true;
    displayMeta.hidden = false;
    updatedMeta.textContent = "—";
    textareaEl.blur();
    sp.log.info("notes: edit cancelled");
  }

  async function save() {
    const next = textareaEl.value;
    saveBtn.disabled = true;
    saveBtn.textContent = "Saving…";
    try {
      const saved = await sp.state.save(STATE_PATH, {
        markdown: next,
        createdAt: current.createdAt || Date.now(),
        updatedAt: Date.now(),
        __schema_version__: 2,
      });
      current = saved;
      render();
      exitEdit();
      sp.log.info("notes: saved", next.length, "chars");
    } catch (e) {
      sp.notify("error", "Notes save failed: " + (e && e.message));
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = "Save";
    }
  }

  editBtn.addEventListener("click", enterEdit);
  cancelBtn.addEventListener("click", exitEdit);
  saveBtn.addEventListener("click", save);
  copyBtn.addEventListener("click", async () => {
    const md = current.markdown || "";
    if (!md.trim() || !navigator.clipboard || !navigator.clipboard.writeText) return;
    try {
      await navigator.clipboard.writeText(md);
      sp.notify("success", "Notes copied");
    } catch (e) {
      sp.notify("error", "Copy failed: " + ((e && e.message) || e));
    }
  });
  textareaEl.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); save(); }
    if (e.key === "Escape") { e.preventDefault(); exitEdit(); }
  });

  (async function boot() {
    try {
      current = await sp.state.load(STATE_PATH, SPEC);
      subEl.textContent = current.createdAt
        ? "Created " + fmtWhen(current.createdAt)
        : "New pinned scratchpad";
      render();
    } catch (e) {
      sp.log.error("notes: load failed", e && e.message);
      sp.ui.status(root, "error", {
        message: "Notes failed to load: " + (e && e.message),
      });
    }
  })();
})();
</script>
