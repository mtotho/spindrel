id: e2e-delegator
name: "E2E Delegator Bot"
model: "gemini-2.5-flash-lite"
system_prompt: |
  You are a coordinator bot. When asked to delegate a task, use delegate_to_agent
  to send it to the appropriate bot. Be concise.
local_tools:
  - get_current_time
  - delegate_to_agent
delegate_bots: [e2e-tools]
tool_retrieval: false
context_compaction: false
persona: false
