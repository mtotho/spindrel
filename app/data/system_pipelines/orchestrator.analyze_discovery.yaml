# System pipeline: orchestrator — discovery-behavior audit.
#
# Reads recent `discovery_summary` trace events (emitted by the
# per-turn discovery pass) and proposes description/trigger rewrites
# for tools/skills that are being under- or over-selected.
id: orchestrator.analyze_discovery
bot_id: orchestrator
title: Analyze Discovery
task_type: pipeline
client_id: "orchestrator:home"
prompt: "[System pipeline: analyze discovery]"
execution_config:
  featured: true
  description: >-
    Review recent discovery (tool/skill selection) behavior and propose
    description or trigger rewrites for under- or over-selected items.
steps:
  - id: fetch_traces
    type: tool
    tool_name: get_trace
    tool_args:
      event_type: discovery_summary
      limit: 50

  - id: analyze
    type: agent
    prompt: |
      Review the discovery_summary events in prior step `fetch_traces`.
      Identify tools or skills that were selected repeatedly for the
      wrong reasons, never selected when they should have been, or
      consistently out-ranked.

      For each, propose a description/trigger rewrite as a JSON patch.
      Return ONLY valid JSON:

      {
        "proposals": [
          {
            "id": "...",
            "scope": "skills" | "tools",
            "target_method": "PATCH",
            "target_path": "/api/v1/admin/skills/<id>" | "/api/v1/admin/tools/<id>",
            "patch_body": { ... },
            "rationale": "...",
            "diff_preview": "..."
          }
        ]
      }

      If discovery behavior looks healthy, return {"proposals": []}.

  - id: review
    type: user_prompt
    title: Review discovery tuning proposals
    widget_template:
      kind: approval_review
      title: Discovery tuning
      proposals_ref: "{{steps.analyze.result.proposals}}"
    response_schema:
      type: multi_item
      items_ref: "{{steps.analyze.result.proposals}}"

  - id: apply
    type: foreach
    over: "{{steps.analyze.result.proposals}}"
    on_failure: continue
    do:
      - type: tool
        tool_name: call_api
        when:
          step: review
          output_contains: "approve"
        tool_args:
          method: "{{item.target_method}}"
          path: "{{item.target_path}}"
          body: "{{item.patch_body}}"
