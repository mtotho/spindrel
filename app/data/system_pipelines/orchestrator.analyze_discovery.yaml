# System pipeline: orchestrator — discovery-behavior audit for one bot.
#
# Reads recent `discovery_summary` trace events for a specific bot and
# proposes description/trigger rewrites for tools/skills that are being
# under- or over-selected. Launched with a `bot_id` param — without
# scope, the analysis has no denominator and proposals are mush.
id: orchestrator.analyze_discovery
bot_id: orchestrator
title: Analyze Discovery
task_type: pipeline
prompt: "[System pipeline: analyze discovery]"
execution_config:
  featured: true
  description: >-
    Audit one bot's discovery behavior (which skills/tools it picked per
    turn) over the last ~100 turns and propose trigger/description rewrites
    for under- or over-selected items.
  requires_channel: true
  params_schema:
    - name: bot_id
      required: true
      description: Bot whose discovery traces should be audited.
steps:
  - id: fetch_traces
    type: tool
    tool_name: get_trace
    tool_args:
      event_type: discovery_summary
      bot_id: "{{params.bot_id}}"
      limit: 100
      include_user_message: true

  - id: fetch_bot
    type: tool
    tool_name: call_api
    tool_args:
      method: GET
      path: "/api/v1/admin/bots/{{params.bot_id}}"

  - id: analyze
    type: agent
    prompt: |
      Audit discovery behavior for bot `{{params.bot_id}}`.

      Prior step `fetch_traces` is a JSON array of `discovery_summary`
      events — one per turn. Each entry's `data` has TWO branches —
      `data.tools` (tool retrieval) and `data.skills` (skill
      enrollment + auto-injection). Both matter for proposals.

      `data.tools` shape:
        - `threshold` — the tool_similarity_threshold frozen for that turn
        - `top_candidates[:5]` — tool candidates with their similarity scores
        - `retrieved` — tools that cleared the threshold and were loaded
        - `pinned`, `included`, `enrolled_working_set` — always-on tools
        - `best_similarity`, `pool_total`, `unretrieved_count`
        - `tool_retrieval_enabled`, `tool_discovery_enabled` — feature gates;
          if either is false on a turn, that turn carries no tool signal

      `data.skills` shape:
        - `enrolled_count`, `enrolled_in_context` — how many enrolled
          skills were active vs admitted to context this turn
        - `relevant_count` — enrolled skills judged relevant by the ranker
        - `auto_injected[]` — `[{"skill_id", "similarity"}]` for skills the
          ranker injected without explicit user request
        - `discoverable_unenrolled_count` — unenrolled skills that *could*
          have helped this turn
        - `auto_inject_threshold`, `auto_inject_max`, `ranking_enabled` —
          current skill ranker config
        - `history_fetched[]` — skill_ids whose history was loaded

      Each entry also carries a `user_message` field — the first user
      message on that turn, truncated to ~400 chars. Use it to judge
      whether a missed tool/skill was actually relevant to user intent
      or whether a retrieved item fired for an unrelated reason.
      Prior step `fetch_bot` gives you the bot's current skills,
      pinned_tools, and tool_similarity_threshold so you can read the
      *current* values before proposing a change.

      Look for these dysfunction patterns and emit the matching proposal
      shape. Emit NOTHING that doesn't fit one of the four shapes below.

      ─────────────────────────────────────────────────────────────────
      Pattern 1: CALIBRATION DRIFT (bot-level threshold)
      ─────────────────────────────────────────────────────────────────
      Signal: across ≥5 diverse turns, relevant-looking
      `data.tools.top_candidates` consistently score in a band 0.02–0.10
      BELOW the turn's `data.tools.threshold` and are not retrieved. The
      ranker is working; the cutoff is too tight for this bot's tool pool
      size.

      Proposal shape:
        target_kind: "bots"
        target_path: "/api/v1/admin/bots/{{params.bot_id}}"
        patch_body: {"tool_similarity_threshold": <float in [0.15, 0.55]>}
      Pick the new threshold so it would have retrieved the missed
      candidates. Do NOT propose any other bot field in this patch.

      ─────────────────────────────────────────────────────────────────
      Pattern 2: PIN-WORTHY TOOL (bot-level pinned_tools append)
      ─────────────────────────────────────────────────────────────────
      Signal: a tool appears in `data.tools.retrieved` in ≥70% of turns
      where it was in the candidate pool, and is not already in
      `data.tools.pinned`. Pinning saves the ranker cost and guarantees
      availability.

      Proposal shape:
        target_kind: "bots"
        target_path: "/api/v1/admin/bots/{{params.bot_id}}"
        patch_body: {"pinned_tools": [<current pinned list>, "<new_tool>"]}
      Append only — never remove existing pins. Do NOT propose any other
      bot field in this patch.

      ─────────────────────────────────────────────────────────────────
      Pattern 3: ITEM DESCRIPTION / TRIGGER REWRITE (skill-level)
      ─────────────────────────────────────────────────────────────────
      Read `data.skills` for these. Signals (any one is enough):
        - A skill present in `data.skills.auto_injected` on ≥70% of turns
          where it was eligible — pin-worthy, or its triggers are firing
          everywhere and need scoping down.
        - A skill in the bot's enrolled set (`fetch_bot.skills`) whose id
          NEVER appears in `data.skills.auto_injected` despite obvious
          intent in `user_message` — triggers/description too narrow.
        - High `data.skills.discoverable_unenrolled_count` across turns
          where `user_message` clearly maps to a known unenrolled skill —
          its triggers are too narrow to surface it as discoverable.
        - A skill whose `auto_injected[].similarity` consistently sits
          0.02–0.10 below `data.skills.auto_inject_threshold` despite
          relevant user intent — its description/triggers are weak.

      Proposal shape:
        target_kind: "skills"
        target_path: "/api/v1/admin/skills/<skill_id>"
        patch_body: {"description": "...", "triggers": [...]}   # one or both
      Only these two fields. Do NOT touch skill body/content here.

      ─────────────────────────────────────────────────────────────────
      Pattern 4: TOOL DESCRIPTION DRIFT (advisory)
      ─────────────────────────────────────────────────────────────────
      Signal: same as Pattern 3 but for a tool — read against
      `data.tools.top_candidates` / `data.tools.retrieved`. Tool
      descriptions live in integration packages / code — there's no
      writable endpoint, so these are advisory-only in the review UI.

      Proposal shape:
        target_kind: "tools"
        target_path: "/api/v1/admin/tools/<tool_id>"
        patch_body: {"description": "..."}

      ─────────────────────────────────────────────────────────────────
      Evidence rule (applies to ALL patterns)
      ─────────────────────────────────────────────────────────────────
      Every proposal MUST cite at least 2 real `correlation_id` values
      copied from `fetch_traces` in its `evidence` array. Each evidence
      entry's `signal` field must quote a concrete observation (scores,
      retrieval outcome, user intent). If you cannot cite 2 traces, do
      NOT emit the proposal.

      Return ONLY valid JSON:

      {
        "proposals": [
          {
            "id": "<stable-slug>",
            "scope": {
              "target_kind": "bots" | "skills" | "tools",
              "target_id": "<bot_id | skill_id | tool_id>",
              "bots_affected": ["{{params.bot_id}}"]
            },
            "target_method": "PATCH",
            "target_path": "<as specified per pattern>",
            "patch_body": { ... },
            "rationale": "<one sentence naming the pattern>",
            "evidence": [
              {"correlation_id": "<uuid>", "bot_id": "{{params.bot_id}}", "signal": "<concrete observation>"},
              {"correlation_id": "<uuid>", "bot_id": "{{params.bot_id}}", "signal": "<concrete observation>"}
            ],
            "diff_preview": "before: ... / after: ..."
          }
        ]
      }

      If discovery behavior looks healthy, return {"proposals": []}.
    result_max_chars: 10000

  - id: review
    type: user_prompt
    title: Review discovery tuning proposals for {{params.bot_id}}
    widget_template:
      kind: approval_review
      title: Discovery tuning — {{params.bot_id}}
      proposals_ref: "{{steps.analyze.result.proposals}}"
    response_schema:
      type: multi_item
      items_ref: "{{steps.analyze.result.proposals}}"

  - id: apply
    type: foreach
    over: "{{steps.analyze.result.proposals}}"
    on_failure: continue
    do:
      - type: tool
        tool_name: call_api
        # Per-item gate: only fire when the review step's by-id verdict
        # for THIS proposal is "approve".
        when:
          step: review
          output_contains: '"{{item.id}}": "approve"'
        tool_args:
          method: "{{item.target_method}}"
          path: "{{item.target_path}}"
          body: "{{item.patch_body}}"
