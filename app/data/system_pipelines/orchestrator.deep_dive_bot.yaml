# System pipeline: orchestrator — deep-dive a single bot.
#
# Same shape as full_scan but scoped to one bot via {{params.bot_id}}.
id: orchestrator.deep_dive_bot
bot_id: orchestrator
title: Deep Dive Bot
task_type: pipeline
prompt: "[System pipeline: deep-dive bot]"
execution_config:
  featured: false
  description: >-
    Deep dive on a single bot's configuration, skill set, and recent
    activity, then propose tuning patches for review.
  requires_channel: true
  params_schema:
    - name: bot_id
      required: true
      description: Bot id to analyze.
steps:
  - id: fetch_bot
    type: tool
    tool_name: call_api
    tool_args:
      method: GET
      path: "/api/v1/admin/bots/{{params.bot_id}}"

  - id: analyze
    type: agent
    prompt: |
      Analyze bot `{{params.bot_id}}` using the record returned by prior
      step `fetch_bot`. Look for obvious configuration drift.

      You MAY only propose changes to these fields (whitelist):

        - system_prompt       → only when current is empty, < 40 chars,
                                or verbatim default placeholder. Never
                                rewrite an existing non-trivial prompt.
        - memory_scheme       → set to "workspace-files" if null and the
                                bot has an active workspace.
        - pinned_tools        → append only; never remove existing pins.
        - api_permissions     → add scopes only; never remove.

      Do NOT propose changes to: model, model_provider_id, fallback_models,
      persona_content, display_name, avatar_url, compaction_*, memory_*,
      skill_review_*, tool_similarity_threshold, or any field not in the
      whitelist above. For discovery/threshold tuning, the caller should
      use `Analyze Discovery` instead.

      Every proposal MUST cite at least 2 concrete signals in its
      `evidence` array — quote the specific config field values from
      `fetch_bot` that justify the change. If you cannot cite 2 concrete
      signals, do NOT emit the proposal.

      Return ONLY valid JSON:

      {
        "proposals": [
          {
            "id": "<stable-slug>",
            "scope": {
              "target_kind": "bots",
              "target_id": "{{params.bot_id}}",
              "bots_affected": ["{{params.bot_id}}"]
            },
            "target_method": "PATCH",
            "target_path": "/api/v1/admin/bots/{{params.bot_id}}",
            "patch_body": { ... },
            "rationale": "<one sentence>",
            "evidence": [
              {"correlation_id": "", "bot_id": "{{params.bot_id}}", "signal": "<quoted config value>"},
              {"correlation_id": "", "bot_id": "{{params.bot_id}}", "signal": "<quoted config value>"}
            ],
            "diff_preview": "before: ... / after: ..."
          }
        ]
      }

      If the bot looks healthy, return {"proposals": []}.

  - id: review
    type: user_prompt
    title: Review proposed changes for {{params.bot_id}}
    widget_template:
      kind: approval_review
      title: Tuning for {{params.bot_id}}
      proposals_ref: "{{steps.analyze.result.proposals}}"
    response_schema:
      type: multi_item
      items_ref: "{{steps.analyze.result.proposals}}"

  - id: apply
    type: foreach
    over: "{{steps.analyze.result.proposals}}"
    on_failure: continue
    do:
      - type: tool
        tool_name: call_api
        # Per-item gate: only fire when the review step's by-id verdict
        # for THIS proposal is "approve".
        when:
          step: review
          output_contains: '"{{item.id}}": "approve"'
        tool_args:
          method: "{{item.target_method}}"
          path: "{{item.target_path}}"
          body: "{{item.patch_body}}"
