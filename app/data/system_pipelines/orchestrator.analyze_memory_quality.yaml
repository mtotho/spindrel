# System pipeline: orchestrator — memory & compaction audit for one bot.
#
# Reads recent compaction trace events and proposes compaction interval
# or memory-hygiene tuning. Separate from analyze_discovery (tool RAG)
# and analyze_skill_quality (skill content).
id: orchestrator.analyze_memory_quality
bot_id: orchestrator
title: Analyze Memory Quality
task_type: pipeline
prompt: "[System pipeline: analyze memory quality]"
execution_config:
  featured: true
  description: >-
    Audit a bot's compaction cadence and memory hygiene — is compaction
    thrashing, overdue, or producing low-value diffs? Propose interval
    or hygiene-prompt changes.
  requires_channel: true
  params_schema:
    - name: bot_id
      required: true
      description: Bot whose memory/compaction behavior should be audited.
steps:
  - id: fetch_compaction
    type: tool
    tool_name: get_trace
    tool_args:
      event_type: compaction
      bot_id: "{{params.bot_id}}"
      limit: 100

  - id: fetch_hygiene
    type: tool
    tool_name: get_trace
    tool_args:
      event_type: memory_hygiene
      bot_id: "{{params.bot_id}}"
      limit: 50

  - id: fetch_bot
    type: tool
    tool_name: call_api
    tool_args:
      method: GET
      path: "/api/v1/admin/bots/{{params.bot_id}}"

  - id: analyze
    type: agent
    prompt: |
      Audit memory & compaction behavior for bot `{{params.bot_id}}`.

      Prior step `fetch_compaction` is a JSON array of recent compaction
      events — one per compaction trigger. Each entry's `data` typically
      includes input/output token counts, kept-turn counts, and the
      trigger reason.
      Prior step `fetch_hygiene` is the recent `memory_hygiene` trace
      events — one per hygiene run.
      Prior step `fetch_bot` shows the current values of compaction_*,
      memory_*, and memory_hygiene_* fields so you can read before
      proposing.

      Look for these patterns. Emit nothing outside these shapes.

      ─────────────────────────────────────────────────────────────────
      Pattern 1: COMPACTION CADENCE (too aggressive or too lax)
      ─────────────────────────────────────────────────────────────────
      Signal — thrashing: compaction fires ≥3× within any 10-turn window
      and each run discards ≤20% of input tokens. Current
      `compaction_interval` too low.
      Signal — overdue: average input-token count at compaction trigger
      is ≥80% of model context window, meaning interval is too high.

      Proposal shape:
        target_kind: "bots"
        target_path: "/api/v1/admin/bots/{{params.bot_id}}"
        patch_body: {"compaction_interval": <int>}
        OR
        patch_body: {"compaction_keep_turns": <int>}
      One field per proposal. Do NOT touch other bot fields in this patch.

      ─────────────────────────────────────────────────────────────────
      Pattern 2: MEMORY INJECTION BUDGET
      ─────────────────────────────────────────────────────────────────
      Signal: memory context is truncated in ≥30% of turns (trace will
      show a `skipped_budget` or similar hint) — the cap is too low for
      this bot's usage pattern.

      Proposal shape:
        target_kind: "bots"
        target_path: "/api/v1/admin/bots/{{params.bot_id}}"
        patch_body: {"memory_max_inject_chars": <int>}

      ─────────────────────────────────────────────────────────────────
      Pattern 3: HYGIENE INTERVAL
      ─────────────────────────────────────────────────────────────────
      Signal: hygiene runs produce empty or near-empty diffs consistently
      (interval too frequent), OR runs produce large backlogs of unsorted
      memory each cycle (interval too slow).

      Proposal shape:
        target_kind: "bots"
        target_path: "/api/v1/admin/bots/{{params.bot_id}}"
        patch_body: {"memory_hygiene_interval_hours": <int>}

      Do NOT propose changes to: memory_scheme, memory_hygiene_prompt,
      memory_hygiene_model, compaction_model, or any field outside the
      three patterns above.

      ─────────────────────────────────────────────────────────────────
      Evidence rule
      ─────────────────────────────────────────────────────────────────
      Every proposal MUST cite at least 2 real `correlation_id` values
      from `fetch_compaction` or `fetch_hygiene`. Each `signal` must
      quote a concrete token count, frequency, or diff size. If you
      cannot cite 2 traces, do NOT emit the proposal.

      Return ONLY valid JSON:

      {
        "proposals": [
          {
            "id": "<stable-slug>",
            "scope": {
              "target_kind": "bots",
              "target_id": "{{params.bot_id}}",
              "bots_affected": ["{{params.bot_id}}"]
            },
            "target_method": "PATCH",
            "target_path": "/api/v1/admin/bots/{{params.bot_id}}",
            "patch_body": { ... },
            "rationale": "<one sentence>",
            "evidence": [
              {"correlation_id": "<uuid>", "bot_id": "{{params.bot_id}}", "signal": "<concrete observation>"},
              {"correlation_id": "<uuid>", "bot_id": "{{params.bot_id}}", "signal": "<concrete observation>"}
            ],
            "diff_preview": "before: ... / after: ..."
          }
        ]
      }

      If memory/compaction looks healthy, return {"proposals": []}.
    result_max_chars: 10000

  - id: review
    type: user_prompt
    title: Review memory/compaction proposals for {{params.bot_id}}
    widget_template:
      kind: approval_review
      title: Memory quality — {{params.bot_id}}
      proposals_ref: "{{steps.analyze.result.proposals}}"
    response_schema:
      type: multi_item
      items_ref: "{{steps.analyze.result.proposals}}"

  - id: apply
    type: foreach
    over: "{{steps.analyze.result.proposals}}"
    on_failure: continue
    do:
      - type: tool
        tool_name: call_api
        when:
          step: review
          output_contains: '"{{item.id}}": "approve"'
        tool_args:
          method: "{{item.target_method}}"
          path: "{{item.target_path}}"
          body: "{{item.patch_body}}"
