# System pipeline: orchestrator — skill quality audit for one bot.
#
# Reads recent `skill_index` trace events plus the bot's enrolled skill
# bodies and proposes description/trigger rewrites or enrollment pruning.
# Sibling to analyze_discovery (which tunes the bot-level threshold);
# this one tunes the skills themselves.
id: orchestrator.analyze_skill_quality
bot_id: orchestrator
title: Analyze Skill Quality
task_type: pipeline
prompt: "[System pipeline: analyze skill quality]"
execution_config:
  featured: true
  description: >-
    Audit a bot's enrolled skills — which ones ranked high but were
    never fetched, which fired on the wrong turns, which drifted stale —
    and propose rewrites or enrollment changes.
  requires_channel: true
  params_schema:
    - name: bot_id
      required: true
      description: Bot whose skill index should be audited.
steps:
  - id: fetch_traces
    type: tool
    tool_name: get_trace
    tool_args:
      event_type: skill_index
      bot_id: "{{params.bot_id}}"
      limit: 100
      include_user_message: true

  - id: fetch_bot
    type: tool
    tool_name: call_api
    tool_args:
      method: GET
      path: "/api/v1/admin/bots/{{params.bot_id}}"

  - id: fetch_skills
    type: tool
    tool_name: call_api
    tool_args:
      method: GET
      path: "/api/v1/admin/skills"

  - id: analyze
    type: agent
    prompt: |
      Audit skill quality for bot `{{params.bot_id}}`.

      Prior step `fetch_traces` is a JSON array of `skill_index` events —
      one per turn. Each entry's `data` shows:
        - `enrolled_ids` / `suggested_ids` — ranking output for this turn
        - `ranking_scores` — all candidate skills with similarity floats
        - `skills_in_history` — which skills were actually fetched on
          the turn via get_skill()
        - `relevance_threshold` — frozen from this turn's settings
      Each entry also carries a `user_message` field — the first user
      message on that turn. This is the critical evidence for judging
      whether a skill *should* have fired — the scores alone don't tell
      you what the user was actually asking for.
      Prior step `fetch_bot` shows the bot's current enrollments.
      Prior step `fetch_skills` gives you every skill's current
      description and triggers so you can read before you propose.

      Look for these patterns. Emit nothing that doesn't fit a shape below.

      ─────────────────────────────────────────────────────────────────
      Pattern 1: TRIGGER / DESCRIPTION REWRITE (skill content)
      ─────────────────────────────────────────────────────────────────
      Signal: a skill is ranked above `relevance_threshold` repeatedly
      but rarely appears in `skills_in_history` (description too
      generic), OR ranked below threshold despite obvious user intent in
      the trace (triggers missing keywords), OR fetched on turns
      unrelated to its purpose (triggers too aggressive).

      Proposal shape:
        target_kind: "skills"
        target_path: "/api/v1/admin/skills/<skill_id>"
        patch_body: {"description": "...", "triggers": [...]}   # one or both
      Only these two fields. Do NOT touch skill body/content.

      ─────────────────────────────────────────────────────────────────
      Pattern 2: PRUNE ENROLLMENT (bot-level skills list)
      ─────────────────────────────────────────────────────────────────
      Signal: a skill is enrolled on this bot but never appears in
      `ranking_scores` at any usable similarity across ≥20 turns, AND
      never in `skills_in_history`. Zombie enrollment.

      Proposal shape:
        target_kind: "bots"
        target_path: "/api/v1/admin/bots/{{params.bot_id}}"
        patch_body: {"skills": [<current list minus the dead one>]}
      Prune only — never add enrollments here (that belongs to
      auto-enrollment, not an audit pipeline).

      ─────────────────────────────────────────────────────────────────
      Evidence rule (applies to ALL patterns)
      ─────────────────────────────────────────────────────────────────
      Every proposal MUST cite at least 2 real `correlation_id` values
      from `fetch_traces` in `evidence`. Each `signal` must quote a
      concrete ranking score or fetched/not-fetched observation. If you
      cannot cite 2 traces, do NOT emit the proposal.

      Return ONLY valid JSON:

      {
        "proposals": [
          {
            "id": "<stable-slug>",
            "scope": {
              "target_kind": "skills" | "bots",
              "target_id": "<skill_id | bot_id>",
              "bots_affected": ["{{params.bot_id}}"]
            },
            "target_method": "PATCH",
            "target_path": "<as specified per pattern>",
            "patch_body": { ... },
            "rationale": "<one sentence naming the pattern>",
            "evidence": [
              {"correlation_id": "<uuid>", "bot_id": "{{params.bot_id}}", "signal": "<concrete observation>"},
              {"correlation_id": "<uuid>", "bot_id": "{{params.bot_id}}", "signal": "<concrete observation>"}
            ],
            "diff_preview": "before: ... / after: ..."
          }
        ]
      }

      If skill quality looks healthy, return {"proposals": []}.
    result_max_chars: 10000

  - id: review
    type: user_prompt
    title: Review skill quality proposals for {{params.bot_id}}
    widget_template:
      kind: approval_review
      title: Skill quality — {{params.bot_id}}
      proposals_ref: "{{steps.analyze.result.proposals}}"
    response_schema:
      type: multi_item
      items_ref: "{{steps.analyze.result.proposals}}"

  - id: apply
    type: foreach
    over: "{{steps.analyze.result.proposals}}"
    on_failure: continue
    do:
      - type: tool
        tool_name: call_api
        when:
          step: review
          output_contains: '"{{item.id}}": "approve"'
        tool_args:
          method: "{{item.target_method}}"
          path: "{{item.target_path}}"
          body: "{{item.patch_body}}"
