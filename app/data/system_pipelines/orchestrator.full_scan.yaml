# System pipeline: orchestrator — full scan of bot configuration drift.
#
# Audits every bot's *configuration* (system_prompt, memory_scheme,
# pinned_tools, api_permissions) for drift and proposes fixes. Does NOT
# analyze discovery / selection behavior — that is Analyze Discovery's
# job, scoped to one bot at a time.
id: orchestrator.full_scan
bot_id: orchestrator
title: Full System Scan
task_type: pipeline
prompt: "[System pipeline: orchestrator full scan]"
execution_config:
  featured: true
  description: >-
    Audit every bot's configuration (system_prompt, memory_scheme,
    pinned_tools) for drift and propose fixes.
  # Must be launched from a channel — the run's anchor message posts
  # back into the caller's channel, and the approval widget needs a
  # surface to render in. Launcher supplies channel_id at POST /run time.
  requires_channel: true
steps:
  - id: fetch_bots
    type: tool
    tool_name: call_api
    tool_args:
      method: GET
      path: /api/v1/admin/bots

  - id: fetch_endpoints
    type: tool
    tool_name: list_api_endpoints
    tool_args:
      scope: bots

  - id: analyze
    type: agent
    prompt: |
      Audit the bots returned in prior step `fetch_bots` for configuration
      drift. Do NOT analyze discovery / selection behavior — `Analyze
      Discovery` handles that, scoped to one bot at a time.

      For each bot that has an obviously missing or drift-prone
      configuration field, propose a single JSON patch. You MAY only
      propose changes to these fields (whitelist):

        - system_prompt       → only when current is empty, < 40 chars,
                                or verbatim default placeholder. Never
                                rewrite an existing non-trivial prompt.
        - memory_scheme       → set to "workspace-files" if null and the
                                bot has an active workspace. Never change
                                an already-set value.
        - pinned_tools        → append only; never remove existing pins.
        - api_permissions     → add scopes only; never remove.

      Do NOT propose changes to: model, model_provider_id, fallback_models,
      persona_content, display_name, avatar_url, compaction_*, memory_*,
      skill_review_*, tool_similarity_threshold, or any field not in the
      whitelist above.

      Every proposal MUST cite at least 2 concrete signals in its
      `evidence` array. For config-drift proposals, the `correlation_id`
      field may be left empty; use the `signal` field to quote the
      specific config value from `fetch_bots` that justifies the change.
      If you cannot cite 2 concrete signals, do NOT emit the proposal.

      Return ONLY valid JSON:

      {
        "proposals": [
          {
            "id": "<stable-slug>",
            "scope": {
              "target_kind": "bots",
              "target_id": "<bot_id>",
              "bots_affected": ["<bot_id>"]
            },
            "target_method": "PATCH",
            "target_path": "/api/v1/admin/bots/<bot_id>",
            "patch_body": { ... },
            "rationale": "<one sentence>",
            "evidence": [
              {"correlation_id": "", "bot_id": "<bot_id>", "signal": "<quoted config value>"},
              {"correlation_id": "", "bot_id": "<bot_id>", "signal": "<quoted config value>"}
            ],
            "diff_preview": "before: ... / after: ..."
          }
        ]
      }

      If nothing needs changing, return {"proposals": []}.
    result_max_chars: 8000

  - id: review
    type: user_prompt
    title: Review proposed configuration changes
    widget_template:
      kind: approval_review
      title: Proposed bot configuration changes
      proposals_ref: "{{steps.analyze.result.proposals}}"
    response_schema:
      type: multi_item
      items_ref: "{{steps.analyze.result.proposals}}"

  - id: apply
    type: foreach
    over: "{{steps.analyze.result.proposals}}"
    on_failure: continue
    do:
      - type: tool
        tool_name: call_api
        # Per-item gate: only fire when the review step's by-id verdict
        # for THIS proposal is "approve". {{item.id}} is rendered before
        # the gate runs (see _run_foreach_step in step_executor.py).
        when:
          step: review
          output_contains: '"{{item.id}}": "approve"'
        tool_args:
          method: "{{item.target_method}}"
          path: "{{item.target_path}}"
          body: "{{item.patch_body}}"
