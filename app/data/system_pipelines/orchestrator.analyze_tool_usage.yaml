# System pipeline: orchestrator — tool usage audit for one bot.
#
# Reads aggregated ToolCall stats for one bot (from /api/v1/tool-calls)
# and proposes pinning / pruning changes. Distinct from analyze_discovery
# which audits the ranker's selection behavior — this one audits what
# actually got called across many turns.
id: orchestrator.analyze_tool_usage
bot_id: orchestrator
title: Analyze Tool Usage
task_type: pipeline
prompt: "[System pipeline: analyze tool usage]"
execution_config:
  featured: true
  description: >-
    Audit which tools a bot actually calls — zombies never called,
    always-called pin candidates, error-heavy tools. Propose pinned_tools
    and local_tools changes.
  requires_channel: true
  params_schema:
    - name: bot_id
      required: true
      description: Bot whose tool-call history should be audited.
steps:
  - id: fetch_stats
    type: tool
    tool_name: call_api
    tool_args:
      method: GET
      path: "/api/v1/tool-calls/stats?group_by=tool_name&bot_id={{params.bot_id}}"

  - id: fetch_recent_errors
    type: tool
    tool_name: call_api
    tool_args:
      method: GET
      path: "/api/v1/tool-calls?bot_id={{params.bot_id}}&error_only=true&limit=50"

  - id: fetch_bot
    type: tool
    tool_name: call_api
    tool_args:
      method: GET
      path: "/api/v1/admin/bots/{{params.bot_id}}"

  - id: analyze
    type: agent
    prompt: |
      Audit tool-call history for bot `{{params.bot_id}}`.

      Prior step `fetch_stats` is a `ToolCallStatsResponse` — an array of
      per-tool aggregates: {key (tool_name), count, total_duration_ms,
      avg_duration_ms, error_count}. Tools NOT in this list have never
      been called by this bot.
      Prior step `fetch_recent_errors` is up to 50 recent errored calls
      for this bot with their arguments and error messages.
      Prior step `fetch_bot` gives you the bot's current `local_tools`,
      `pinned_tools`, and `tool_discovery` so you read before proposing.

      Look for these patterns. Emit nothing outside these shapes.

      ─────────────────────────────────────────────────────────────────
      Pattern 1: PIN-WORTHY TOOL (high call volume)
      ─────────────────────────────────────────────────────────────────
      Signal: a tool's `count` in `fetch_stats` is in the top 3 for this
      bot AND it is NOT already in `fetch_bot.pinned_tools`. Pinning
      skips the ranker cost.

      Proposal shape:
        target_kind: "bots"
        target_path: "/api/v1/admin/bots/{{params.bot_id}}"
        patch_body: {"pinned_tools": [<current pins>, "<tool_name>"]}
      Append only.

      ─────────────────────────────────────────────────────────────────
      Pattern 2: ZOMBIE TOOL (never called)
      ─────────────────────────────────────────────────────────────────
      Signal: a tool listed in `fetch_bot.local_tools` does NOT appear
      in `fetch_stats` at all, indicating it's been available for the
      audit window but never selected. Candidate for removal — keeps
      the bot's tool surface smaller for the ranker.

      Proposal shape:
        target_kind: "bots"
        target_path: "/api/v1/admin/bots/{{params.bot_id}}"
        patch_body: {"local_tools": [<current list minus the zombie>]}
      Only prune one tool per proposal.

      ─────────────────────────────────────────────────────────────────
      Pattern 3: ERROR-HEAVY TOOL (description drift)
      ─────────────────────────────────────────────────────────────────
      Signal: a tool's `error_count / count` ratio is ≥0.3 in `fetch_stats`,
      AND `fetch_recent_errors` shows the errors are argument-shape
      issues (wrong field names, missing required fields) rather than
      external failures. The description is misleading the LLM.

      Proposal shape:
        target_kind: "tools"
        target_path: "/api/v1/admin/tools/<tool_name>"
        patch_body: {"description": "..."}
      Advisory — tool descriptions live in integration packages; the
      review UI will mark it as such. Still useful as a record.

      Do NOT propose changes to: model, system_prompt, compaction_*,
      memory_*, skill_review_*, or any field outside the shapes above.

      ─────────────────────────────────────────────────────────────────
      Evidence rule
      ─────────────────────────────────────────────────────────────────
      Every proposal MUST cite at least 2 concrete signals in `evidence`.
      Aggregate-based signals (from `fetch_stats`) may leave
      `correlation_id` empty; quote the stat row in `signal`. Error
      proposals SHOULD cite 2+ `correlation_id` values from recent
      errored calls. If you cannot cite 2 concrete signals, do NOT emit
      the proposal.

      Return ONLY valid JSON:

      {
        "proposals": [
          {
            "id": "<stable-slug>",
            "scope": {
              "target_kind": "bots" | "tools",
              "target_id": "<bot_id | tool_name>",
              "bots_affected": ["{{params.bot_id}}"]
            },
            "target_method": "PATCH",
            "target_path": "<as specified per pattern>",
            "patch_body": { ... },
            "rationale": "<one sentence>",
            "evidence": [
              {"correlation_id": "", "bot_id": "{{params.bot_id}}", "signal": "<quoted stat or error>"},
              {"correlation_id": "", "bot_id": "{{params.bot_id}}", "signal": "<quoted stat or error>"}
            ],
            "diff_preview": "before: ... / after: ..."
          }
        ]
      }

      If tool usage looks healthy, return {"proposals": []}.
    result_max_chars: 10000

  - id: review
    type: user_prompt
    title: Review tool usage proposals for {{params.bot_id}}
    widget_template:
      kind: approval_review
      title: Tool usage — {{params.bot_id}}
      proposals_ref: "{{steps.analyze.result.proposals}}"
    response_schema:
      type: multi_item
      items_ref: "{{steps.analyze.result.proposals}}"

  - id: apply
    type: foreach
    over: "{{steps.analyze.result.proposals}}"
    on_failure: continue
    do:
      - type: tool
        tool_name: call_api
        when:
          step: review
          output_contains: '"{{item.id}}": "approve"'
        tool_args:
          method: "{{item.target_method}}"
          path: "{{item.target_path}}"
          body: "{{item.patch_body}}"
